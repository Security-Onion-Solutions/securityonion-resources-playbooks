name: ET SHELLCODE Rothenberg Shellcode
id: 22009247
description: |
  Detects specific byte patterns characteristic of Rothenberg shellcode in network traffic.
  May trigger on legitimate software with similar byte sequences or encrypted protocols with coincidental patterns.
type: detection
detection_id: 2009247
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2024-01-15
questions:
  - question: What was the complete network payload containing the Rothenberg shellcode pattern?
    context: Reveals the full context and delivery method of the detected shellcode bytes.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: connection

  - question: Does this host normally communicate with the destination containing the shellcode pattern?
    context: Determines if the connection represents normal business traffic or anomalous behavior.
    range: -7d
    query:
      template: network_baseline_analysis

  - question: What process established the connection that contained the shellcode bytes?
    context: Identifies the application or service involved in transmitting the Rothenberg pattern.
    range: +/-15m
    query:
      template: process_initiated_connection

  - question: Were any executable files created on the host after the shellcode pattern was detected?
    context: Assesses whether the shellcode successfully delivered additional payloads.
    range: +1h
    query:
      template: executable_file_activity

  - question: Did the host establish additional external connections after the shellcode detection?
    context: Determines if the shellcode enabled further communication or data exfiltration.
    range: +2h
    query:
      template: other_external_connections

  - question: What DNS queries occurred before the connection containing the shellcode pattern?
    context: Reveals how the host discovered or was directed to the shellcode source.
    range: -30m
    query:
      template: dns_before_activity

  - question: Were any new processes spawned after the shellcode pattern was observed?
    context: Identifies potential code execution resulting from the Rothenberg shellcode.
    range: +30m
    query:
      template: search_by_image
      params:
        image_names: ["cmd.exe", "powershell.exe", "rundll32.exe", "regsvr32.exe", "mshta.exe"]

  - question: Are other hosts receiving traffic with similar Rothenberg shellcode patterns?
    context: Determines if this is part of a coordinated attack campaign using the same shellcode.
    range: +/-6h
    query:
      template: campaign_detection

  - question: What registry modifications occurred after the shellcode pattern detection?
    context: Identifies persistence mechanisms or system changes following potential code execution.
    range: +2h
    query:
      template: persistence_registry

  - question: Did the host attempt to access any file-sharing or command-and-control domains?
    context: Reveals potential follow-up activities after successful shellcode execution.
    range: +4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - paste
            - upload
            - share
            - temp
            - bit.ly
            - tinyurl
            - t.co
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip