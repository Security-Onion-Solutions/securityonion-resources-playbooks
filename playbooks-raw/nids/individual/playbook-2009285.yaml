name: ET SHELLCODE Bindshell2 Decoder Shellcode (UDP)
id: 22009285
description: |
  Detects UDP traffic containing specific byte patterns associated with Bindshell2 decoder shellcode.
  May trigger on legitimate applications using similar binary patterns or compressed data transfers.
type: detection
detection_id: 2009285
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2024-01-15
questions:
  - question: What was the complete UDP payload containing the Bindshell2 decoder pattern?
    context: Reveals the full shellcode payload and structure for analysis.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: connection

  - question: Does this host normally receive UDP traffic on this destination port?
    context: Determines if this UDP communication represents normal network behavior.
    range: -7d
    query:
      template: port_usage_history

  - question: What process was listening on the destination port that received this shellcode?
    context: Identifies the application that processed the potential shellcode payload.
    range: +/-15m
    query:
      template: process_initiated_connection

  - question: Did the host establish new network connections after receiving the shellcode pattern?
    context: Assesses whether the shellcode execution resulted in additional network activity.
    range: +30m
    query:
      template: other_external_connections

  - question: Were executable files created on the host after this UDP communication?
    context: Identifies files that may have been dropped through shellcode execution.
    range: +1h
    query:
      template: executable_file_activity

  - question: Did the receiving host initiate any lateral movement attempts after this activity?
    context: Determines if the potential shellcode led to internal network reconnaissance.
    range: +2h
    query:
      template: lateral_movement_check

  - question: What registry modifications occurred after the UDP shellcode pattern was received?
    context: Identifies persistence mechanisms that may have been established.
    range: +1h
    query:
      template: persistence_registry

  - question: Are other internal hosts receiving similar UDP traffic with shellcode patterns?
    context: Determines if this is part of a broader attack campaign.
    range: +/-6h
    query:
      template: campaign_detection

  - question: What was the bidirectional communication pattern for this UDP connection?
    context: Analyzes the full conversation to understand shellcode behavior.
    range: +/-30m
    query:
      template: communication_pattern

  - question: Did any script execution occur on the host during this timeframe?
    context: Identifies potential script-based payloads delivered through the shellcode.
    range: +1h
    query:
      template: script_file_activity