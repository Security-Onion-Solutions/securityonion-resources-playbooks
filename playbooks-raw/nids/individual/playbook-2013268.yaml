name: ET SHELLCODE Hex Obfuscated JavaScript Heap Spray 0b0b0b0b
id: 22013268
description: |
  Detects HTTP responses containing hex-encoded JavaScript patterns (0b0b0b0b) commonly used in heap spray attacks.
  May trigger on legitimate JavaScript code using similar hex encoding patterns or security testing tools.
type: detection
detection_id: 2013268
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2024-01-15
questions:
  - question: What was the complete HTTP response containing the hex-encoded 0b0b0b0b pattern?
    context: Reveals the full JavaScript payload and context of the potential heap spray attack.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: http

  - question: Does this host normally receive JavaScript content from this external source?
    context: Determines if this represents a deviation from normal web browsing patterns.
    range: -7d
    query:
      template: http_baseline_analysis

  - question: What web browser or application requested the content containing the hex-encoded pattern?
    context: Identifies the specific client application that received the potential exploit payload.
    range: +/-15m
    query:
      template: process_initiated_connection

  - question: Did the host exhibit suspicious behavior after receiving the hex-encoded JavaScript?
    context: Assesses whether the heap spray attempt resulted in successful exploitation.
    range: +30m
    query:
      template: other_external_connections

  - question: Were any executable files created after the JavaScript with hex patterns was received?
    context: Identifies files that may have been dropped through successful heap spray exploitation.
    range: +1h
    query:
      template: executable_file_activity

  - question: What script files were created or modified following the hex-encoded JavaScript delivery?
    context: Reveals script-based persistence or additional payloads related to the heap spray.
    range: +1h
    query:
      template: script_file_activity

  - question: Did the browser process spawn unusual child processes after receiving this content?
    context: Detects process execution that may indicate successful JavaScript exploitation.
    range: +30m
    query:
      template: search_by_image
      params:
        image_names: ["powershell.exe", "cmd.exe", "wscript.exe", "cscript.exe", "regsvr32.exe"]

  - question: Were registry modifications made that could indicate persistence mechanisms?
    context: Identifies registry changes that may establish persistence after successful exploitation.
    range: +1h
    query:
      template: persistence_registry

  - question: Are other internal hosts receiving similar hex-encoded JavaScript patterns?
    context: Determines if this is part of a broader attack campaign targeting multiple users.
    range: +/-6h
    query:
      template: campaign_detection

  - question: What was the user activity that led to requesting content from this suspicious source?
    context: Traces the attack vector that delivered the hex-encoded JavaScript payload.
    range: -30m
    query:
      template: host_network_activity