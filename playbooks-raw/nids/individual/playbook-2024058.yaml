name: ET SHELLCODE Linux/x86-64 - Polymorphic Setuid(0) & Execve(/bin/sh) Shellcode
id: 22024058
description: |
  Detects specific byte patterns matching Linux x86-64 shellcode that performs setuid(0) and execve(/bin/sh) operations.
  May trigger on legitimate binary transfers, encrypted traffic, or file formats containing similar byte sequences.
type: detection
detection_id: 2024058
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2024-01-15
questions:
  - question: What was the complete network request containing the shellcode byte pattern?
    context: Reveals the full context of how the polymorphic shellcode pattern was transmitted.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: http

  - question: Does this host normally transfer binary files or encrypted content?
    context: Determines if binary data transfer represents normal operational patterns.
    range: -7d
    query:
      template: network_baseline_analysis

  - question: What process initiated the connection that contained the shellcode pattern?
    context: Identifies the application responsible for transmitting the suspected shellcode.
    range: +/-15m
    query:
      template: process_initiated_connection

  - question: Did the receiving host execute any shell processes after this network activity?
    context: Assesses whether the shellcode pattern resulted in shell execution as intended.
    range: +30m
    query:
      template: search_by_image
      params:
        image_names: ["/bin/sh", "/bin/bash", "sh", "bash"]

  - question: Were any processes spawned with elevated privileges after receiving this traffic?
    context: Identifies potential successful exploitation through setuid(0) shellcode execution.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          User: "root"
        condition: selection
      fields:
        - host.ip
        - User
        - Image
        - CommandLine
        - ParentImage

  - question: What executable files were created on the target host after receiving the shellcode?
    context: Reveals files that may have been created through successful shellcode execution.
    range: +1h
    query:
      template: executable_file_activity

  - question: Did the target host establish new external connections after the shellcode transmission?
    context: Identifies potential reverse shell or callback connections following exploitation.
    range: +1h
    query:
      template: other_external_connections

  - question: What other network protocols were used between these hosts during this timeframe?
    context: Reveals additional communication channels that may be part of the exploitation sequence.
    range: +/-30m
    query:
      template: host_network_activity

  - question: Are other hosts receiving similar traffic patterns with shellcode signatures?
    context: Determines if this represents a broader campaign targeting multiple Linux systems.
    range: +/-6h
    query:
      template: campaign_detection

  - question: Were any system files or directories accessed after the shellcode pattern was detected?
    context: Identifies file system access that may indicate successful privilege escalation.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          file.path|startswith:
            - "/etc/"
            - "/root/"
            - "/var/"
            - "/usr/bin/"
            - "/bin/"
        condition: selection
      fields:
        - host.ip
        - file.path
        - file.name
        - Image
        - User

  - question: What was the bidirectional communication pattern between the source and destination?
    context: Analyzes the complete traffic flow to understand the shellcode delivery mechanism.
    range: +/-1h
    query:
      template: communication_pattern