name: ET INFO Observed Discord Domain (discord .com in TLS SNI)
id: 22035463
description: |
  Detects TLS connections to Discord domains through SNI field analysis.
  May represent legitimate Discord usage or potential data exfiltration via Discord channels.
type: detection
detection_id: 2035463
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2024-01-15
questions:
  - question: What was the complete TLS connection to the Discord domain?
    context: Reveals the specific Discord subdomain and connection details.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: ssl
        
  - question: Does this user normally access Discord during business hours?
    context: Determines if Discord usage represents normal behavior for this user.
    range: -7d
    query:
      template: network_baseline_analysis
      
  - question: What application initiated the connection to Discord?
    context: Identifies the specific process making the Discord connection.
    range: +/-15m
    query:
      template: process_initiated_connection
      
  - question: What other external connections occurred from this host during the same timeframe?
    context: Reveals broader communication patterns that may indicate data exfiltration.
    range: +/-30m
    query:
      template: other_external_connections
      
  - question: Were any files uploaded or downloaded during the Discord session?
    context: Assesses whether Discord was used for file transfer activities.
    range: +/-1h
    query:
      template: document_file_activity
      
  - question: What DNS queries preceded the Discord connection?
    context: Shows the DNS resolution process and any related domain lookups.
    range: -5m
    query:
      template: dns_before_activity
      
  - question: Did this host access any other communication platforms during this session?
    context: Identifies use of multiple communication channels which may indicate coordinated activity.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          ssl.server_name|contains:
            - telegram
            - whatsapp
            - signal
            - slack
            - teams
            - zoom
            - skype
        filter:
          ssl.server_name|contains: discord
        condition: selection and not filter
      fields:
        - ssl.server_name
        - dst_ip
        - dst_port
        
  - question: Are other internal hosts also connecting to Discord domains?
    context: Determines if Discord usage is isolated or part of broader organizational activity.
    range: +/-24h
    query:
      template: campaign_detection
      
  - question: What was the duration and data volume of the Discord connection?
    context: Assesses the extent of Discord usage and potential data transfer.
    range: +/-1h
    query:
      template: communication_pattern