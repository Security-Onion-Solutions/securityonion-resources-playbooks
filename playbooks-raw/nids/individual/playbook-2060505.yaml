name: ET INFO Observed Discord Service Domain (discord.com) in TLS SNI
id: 22060505
description: |
  Detects TLS connections to Discord service domain through SNI analysis.
  May represent legitimate chat application usage or potential data exfiltration channel.
type: detection
detection_id: 2060505
detection_category: ""
detection_type: nids
contributors: [SecurityOnionSolutions]
created: 2025-02-28
questions:
  - question: What was the complete TLS connection to the Discord domain?
    context: Reveals the specific TLS handshake details and connection parameters.
    range: +/-15m
    query:
      template: complete_request
      params:
        service: ssl

  - question: Does this host normally connect to Discord services?
    context: Determines if Discord access represents normal user behavior patterns.
    range: -7d
    query:
      template: network_baseline_analysis

  - question: What application initiated the Discord connection?
    context: Identifies the specific process establishing the encrypted channel to Discord.
    range: +/-15m
    query:
      template: process_initiated_connection

  - question: What other chat or communication services did this host access?
    context: Reveals broader communication patterns that may indicate data exfiltration.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          ssl.server_name|contains:
            - slack
            - teams
            - telegram
            - whatsapp
            - signal
            - skype
            - zoom
        condition: selection
      fields:
        - ssl.server_name
        - dst_ip
        - dst_port

  - question: What data transfer patterns occurred during the Discord connection?
    context: Assesses the volume and frequency of data exchange through the encrypted channel.
    range: +/-30m
    query:
      template: communication_pattern

  - question: Were any files accessed before the Discord connection was established?
    context: Identifies potential data staging before transmission through the encrypted channel.
    range: -30m
    query:
      template: document_file_activity

  - question: What DNS queries preceded the Discord connection?
    context: Shows the domain resolution activity leading to the encrypted channel establishment.
    range: -15m
    query:
      template: dns_before_activity

  - question: Did this host establish connections to other external services after Discord access?
    context: Reveals additional external communication that may be part of coordinated activity.
    range: +1h
    query:
      template: other_external_connections

  - question: Are other hosts in the network accessing Discord services?
    context: Determines if Discord usage is part of normal organizational communication patterns.
    range: +/-24h
    query:
      template: campaign_detection

  - question: What is the timing pattern of Discord connections from this host?
    context: Analyzes connection frequency to identify potential automated or scripted access.
    range: -24h
    query:
      template: network_destination_history