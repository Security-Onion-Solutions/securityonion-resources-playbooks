name: ET P2P BitTorrent peer sync
id: 22000334
description: |
  Detects BitTorrent peer synchronization traffic indicating P2P file sharing activity.
  May represent policy violations in corporate environments or legitimate P2P usage.
type: detection
detection_id: 2000334
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What specific BitTorrent peer synchronization occurred?
    context: Reveals the exact P2P communication pattern and protocol details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: Is BitTorrent usage authorized for this user during business hours?
    context: Determines if this violates organizational policy regarding P2P file sharing.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - src_ip
  - question: What application initiated this BitTorrent peer connection?
    context: Identifies the specific P2P client software being used for file sharing.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: How many other BitTorrent peers is this host communicating with?
    context: Assesses the scale of P2P activity and potential bandwidth impact.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files are being shared or downloaded via BitTorrent?
    context: Identifies potentially unauthorized or malicious content being transferred.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .torrent
            - .avi
            - .mkv
            - .mp4
            - .zip
            - .rar
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there indicators of malware distribution through this P2P activity?
    context: Determines if BitTorrent is being used to spread malicious software.
    range: +2h
    query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n  selection:\n    host.ip|expand: '%src_ip%'\n    file.name|endswith:\n      - \".exe\"\n      - \".scr\" \n      - \".pif\"\n      - \".com\"\n      - \".bat\"\n  condition: selection\nfields:\n  - file.path\n  - file.name\n  - file.size\n"
  - question: What BitTorrent tracker servers is this host communicating with?
    context: Reveals the P2P infrastructure being used for file coordination.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.uri|contains:
            - "announce"
            - "scrape"
            - "tracker"
        condition: selection
      fields:
        - http.virtual_host
        - http.uri
        - dst_ip
  - question: Is this part of a broader P2P file sharing pattern across our network?
    context: Assesses organizational compliance with P2P usage policies.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What DNS queries preceded this BitTorrent activity?
    context: Reveals tracker discovery and peer resolution patterns.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
