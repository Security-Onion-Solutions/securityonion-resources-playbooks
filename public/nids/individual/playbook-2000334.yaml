name: ET P2P BitTorrent peer sync
id: 22000334
description: |
  Detects BitTorrent peer synchronization traffic based on protocol handshake patterns.
  May indicate policy violations or legitimate P2P file sharing depending on organizational policy.
type: detection
detection_id: 2000334
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What network connection established this BitTorrent communication?
    context: Connection metadata reveals the peer relationship and data transfer patterns.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - connection.history
        - connection.state
        - network.bytes
        - network.packets

  - question: Is BitTorrent usage authorized on this system?
    context: Determines if this represents a policy violation requiring action.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port|contains:
            - 6881
            - 6882
            - 6883
            - 6884
            - 6885
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - network.bytes

  - question: What process initiated this BitTorrent connection?
    context: Identifies the specific application responsible for P2P activity.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - ProcessGuid
        - connection.state

  - question: What DNS queries were made for tracker or peer discovery?
    context: BitTorrent clients often resolve tracker domains and DHT bootstrap nodes.
    range: -15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name

  - question: How much data has been transferred through P2P connections?
    context: Large data transfers may indicate significant file sharing activity.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          network.bytes|gte: 1048576
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - network.bytes
        - connection.duration

  - question: Are there signs of BitTorrent client installation or execution?
    context: Recent process creation may indicate new P2P software installation.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          Image|contains:
            - "torrent"
            - "utorrent"
            - "bittorrent"
            - "qbittorrent"
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage

  - question: What file system activity indicates torrent file handling?
    context: Torrent files and download directories reveal content being shared.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          file.name|endswith: ".torrent"
        condition: selection
      fields:
        - file.path
        - file.name
        - Image

  - question: Are multiple peers being contacted simultaneously?
    context: High peer connectivity indicates active participation in torrent swarms.
    range: +/-30m
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state

  - question: What HTTP connections were made to torrent-related sites?
    context: Web browsing may reveal torrent sites or magnet link interactions.
    range: -2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host|contains:
            - "torrent"
            - "tracker"
            - "pirate"
        condition: selection
      fields:
        - http.virtual_host
        - url.path
        - http.user_agent

  - question: Are other systems on the network engaging in P2P activity?
    context: Widespread P2P usage may indicate policy enforcement gaps.
    range: +/-4h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: "BitTorrent"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - alert.category

  - question: What registry modifications indicate P2P client configuration?
    context: Registry changes may show P2P software installation or configuration.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          TargetObject|contains:
            - "torrent"
            - "BitTorrent"
            - "uTorrent"
        condition: selection
      fields:
        - TargetObject
        - Details
        - EventType
        - Image