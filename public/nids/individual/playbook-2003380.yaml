name: ET USER_AGENTS Suspicious User-Agent - Possible Trojan Downloader (ver18/ver19 etc)
id: 22003380
description: |
  Detects suspicious HTTP user-agent strings containing version patterns used by trojan downloaders.
  May indicate malware C2 communication or legitimate software with similar naming conventions.
type: detection
detection_id: 2003380
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request with the suspicious trojan user-agent?
    context: Reveals the specific malware communication and C2 server interaction details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Does this host normally generate HTTP traffic with custom user-agents?
    context: Determines if this represents a deviation from normal browser-based activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            http.user_agent|expand: '%http.user_agent%'
          condition: selection
        fields:
          - http.user_agent
  - question: What process or application generated this suspicious HTTP request?
    context: Identifies the specific malware or trojan making the C2 communication.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the trojan successfully download any payloads from the C2 server?
    context: Assesses whether the malware communication resulted in additional payload retrieval.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%dst_ip%'
          http.status_code:
            - 200
            - 201
          http.method: "GET"
        condition: selection
      fields:
        - http.uri
        - http.user_agent
        - http.status_code
  - question: What executable files were created during or after this trojan communication?
    context: Identifies downloaded malware payloads or additional trojan components.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .scr
            - .bat
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: What persistence mechanisms did the trojan establish on this system?
    context: Reveals how the malware maintains access across system reboots.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: What other C2 servers is this trojan communicating with?
    context: Maps the complete malware infrastructure and command channels.
    range: +/-6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are other hosts in our network infected with the same trojan family?
    context: Determines the scope of the malware infection across the enterprise.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What sensitive data or credentials might this trojan have accessed?
    context: Assesses the potential impact and data exposure from the trojan infection.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .txt
            - .doc
            - .pdf
            - .xls
            - .pst
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did the trojan attempt any lateral movement to other internal systems?
    context: Reveals the trojan's attempts to spread within the network environment.
    range: +6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What DNS queries occurred before this trojan C2 communication?
    context: Reveals the domain resolution that led to the malware communication.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
