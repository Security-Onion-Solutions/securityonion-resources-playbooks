name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: |
  Detects HTTP requests with malformed Internet Explorer user-agent strings typical of Hiloti malware family.
  May occasionally trigger on legitimate but misconfigured browser clients or testing tools.
type: detection
detection_id: 2012612
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the exact malformed user-agent string and target PHP script?
    context: The specific user-agent pattern and PHP endpoint reveal the malware variant and C2 communication structure.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.user_agent
        - url.full
        - http.request.method
        - http.request.headers

  - question: Is this user-agent pattern consistent with legitimate browser traffic?
    context: Comparing against normal browser patterns helps distinguish between genuine IE clients and malware mimicry.
    range: -24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.user_agent|contains: "MSIE"
        condition: selection
      fields:
        - http.user_agent
        - url.domain
        - http.response.status_code

  - question: What process generated this HTTP request?
    context: Identifying the source process helps distinguish between browser-based and malware-generated requests.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: What response was received from the PHP script?
    context: Server responses reveal whether C2 communication was successful and what commands or data were exchanged.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.response.status_code
        - http.response.body.content
        - http.response.body.bytes
        - http.response.mime_type

  - question: Are there other suspicious HTTP requests from this host?
    context: Hiloti malware typically makes multiple C2 requests with consistent user-agent patterns.
    range: +4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          url.path|contains: ".php"
        condition: selection
      fields:
        - dst_ip
        - url.full
        - http.user_agent
        - http.response.status_code

  - question: What DNS queries were made for the C2 domain?
    context: DNS resolution patterns can reveal domain generation algorithms or hardcoded C2 infrastructure.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: When was the malware process first executed on this system?
    context: Understanding the infection timeline helps determine the scope and duration of compromise.
    range: -7d
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: Are there signs of data exfiltration or additional payload downloads?
    context: Hiloti variants often perform data theft or download additional malware components.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.request.method: "POST"
        condition: selection
      fields:
        - url.full
        - http.request.body.bytes
        - http.response.status_code

  - question: Has the infected system established persistence mechanisms?
    context: Successful malware installation typically involves creating persistence through registry or file system modifications.
    range: +24h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          TargetObject|contains:
            - "Run"
            - "RunOnce"
            - "Services"
        condition: selection
      fields:
        - TargetObject
        - Details
        - Image
        - EventType

  - question: Are there other systems showing similar Hiloti-style traffic patterns?
    context: Hiloti campaigns often target multiple systems within an organization simultaneously.
    range: -12h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: "Hiloti"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - alert.severity_label

  - question: What files were created or modified around the time of infection?
    context: File system changes can reveal malware installation paths and additional components.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid

  - question: Are there connections to other malicious infrastructure from this host?
    context: Compromised systems often communicate with multiple C2 servers or download additional payloads.
    range: +6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - connection.history
