name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: |
  Detects suspicious HTTP requests with malformed Internet Explorer headers characteristic of Hiloti malware family.
  May occasionally trigger on legitimate but misconfigured applications.
type: detection
detection_id: 2012612
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What specific PHP endpoint was accessed with these malformed headers?
    context: Identifies the target resource and potential web shell or malicious script.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Does this host normally access PHP applications with Internet Explorer?
    context: Establishes if this represents a change from typical user browsing patterns.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            http.user_agent|expand: '%http.user_agent%'
          condition: selection
        fields:
          - http.user_agent
  - question: What process or application generated this suspicious HTTP request?
    context: Determines if this was browser-initiated or from malware automation.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did this suspicious request receive a successful response from the server?
    context: Indicates whether the malicious communication was successful.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
          http.status_code: ["200", "301", "302"]
      condition: selection
      fields:
        - http.status_code
        - http.response.body.length
        - dst_ip
  - question: Are there other hosts making similar requests with malformed MSIE headers?
    context: Identifies the scope of potential Hiloti malware infections.
    range: +/-6h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other suspicious network activity originated from this compromised host?
    context: Reveals additional malicious communications beyond the initial detection.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Did this host download any executables before making these suspicious requests?
    context: Identifies the potential infection vector or malware dropper.
    range: -4h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .scr
            - .bat
            - .com
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: What DNS queries were made to resolve the suspicious PHP server?
    context: Shows the domain resolution chain and potential DNS tunneling.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Has this host established any unauthorized internal network connections?
    context: Assesses potential lateral movement from the compromised system.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: Are there similar malformed header patterns targeting other web applications?
    context: Identifies broader scanning or exploitation attempts across the network.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.user_agent|contains: "Mozilla/4.0"
          http.user_agent|contains: "MSIE"
          http.uri|contains: ".php"
        filter:
          dst_ip|expand: '%dst_ip%'
      condition: selection and not filter
      fields:
        - dst_ip
        - http.virtual_host
        - http.uri
        - http.user_agent
  - question: Are there related alerts indicating web application compromise or exploitation?
    context: Correlates with other security events showing successful web-based attacks.
    range: +/-6h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
