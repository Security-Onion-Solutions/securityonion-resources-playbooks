name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: |
  Detects suspicious HTTP requests with specific MSIE user agent patterns targeting PHP endpoints.
  May indicate malware communication or automated exploitation attempts mimicking Internet Explorer.
type: detection
detection_id: 2012612
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request that triggered this alert?
    context: Understanding the full request reveals the suspicious user agent and URI patterns.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this user agent pattern normal for this host?
    context: Determines if this is legitimate browser activity or malware communication.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process initiated this HTTP connection?
    context: Identifies if a legitimate browser or malicious process made the request.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What DNS queries preceded this HTTP request?
    context: Reveals how the host resolved the target domain.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What other external connections occurred from this host?
    context: Identifies additional C2 channels or malicious communications.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Has this host shown signs of lateral movement?
    context: Determines if the compromised host is spreading internally.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What files were downloaded or created during this timeframe?
    context: Reveals potential malware payloads or artifacts.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .php
            - .bat
            - .ps1
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there persistence mechanisms being established?
    context: Identifies if malware is establishing persistence on the system.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What other hosts are communicating with the same external server?
    context: Identifies scope of potential campaign or botnet activity.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there related alerts from this host indicating broader compromise?
    context: Provides context on other suspicious activities from the same source.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Is this part of a broader campaign targeting multiple hosts?
    context: Determines if this is isolated activity or part of coordinated attack.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
