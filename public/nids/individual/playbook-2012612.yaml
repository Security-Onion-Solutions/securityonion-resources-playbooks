name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: |
  Detects HTTP requests with suspicious User-Agent patterns characteristic of Hiloti malware.
  This signature identifies outdated Internet Explorer user agents making requests to PHP scripts,
  which may indicate malware communication or compromised systems.
type: detection
detection_id: 2012612
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request including URI and headers?
    context: Understanding the full request reveals the target PHP script and malicious payload structure.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What process on the compromised host initiated this suspicious HTTP request?
    context: Identifies the malware executable or compromised application making the request.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Is this User-Agent pattern normal for this host and user?
    context: Determines if this is legitimate IE usage or malicious activity masquerading as a browser.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this potentially compromised host?
    context: Identifies additional C2 channels or data exfiltration attempts beyond the detected request.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there other hosts in the network exhibiting similar User-Agent patterns?
    context: Determines campaign scope and identifies other potentially infected systems.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What DNS queries preceded this HTTP request?
    context: Reveals domain resolution that led to this connection and potential DNS tunneling.
    range: -15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What file modifications occurred around the time of this request?
    context: Identifies payload downloads or configuration changes associated with malware activity.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
            - .bin
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of lateral movement from this compromised host?
    context: Determines if the malware is attempting to spread to other internal systems.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What persistence mechanisms were established after this communication?
    context: Identifies survival techniques used by the malware for complete remediation.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: How frequently is this host making similar suspicious requests?
    context: Determines if this is part of regular C2 beaconing or a one-time event.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What scheduled tasks were created following this network activity?
    context: Identifies task-based persistence mechanisms commonly used by malware.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
