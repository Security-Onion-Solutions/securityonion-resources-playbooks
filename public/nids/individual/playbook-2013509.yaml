name: ET MALWARE W32/Lalus Trojan Downloader Checkin
id: 22013509
description: |
  Detects W32/Lalus trojan downloader command and control communication via HTTP requests with specific parameter patterns.
  Legitimate software may rarely use similar parameter combinations but this specific pattern is strongly associated with malware.
type: detection
detection_id: 2013509
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request showing the Lalus C2 communication pattern?
    context: Reveals the full C2 checkin URL with parameters that indicate malware variant and victim information.
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What process initiated this HTTP connection to the malware C2 server?
    context: Identifies the malicious executable responsible for the C2 communication.
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other external connections occurred from this infected host?
    context: Discovers additional C2 servers or payload download attempts from the same compromised system.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files were created or modified around the time of this C2 communication?
    context: Identifies downloaded payloads, configuration files, or artifacts created by the trojan.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .vbs
            - .ps1
            - .tmp
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of persistence mechanisms created by this malware?
    context: Determines how the malware maintains access for complete remediation.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What DNS queries preceded this C2 communication?
    context: Reveals the domain resolution that enabled the malware to contact its command server.
    range: -5m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Has this malware attempted lateral movement within the network?
    context: Determines if the infection is spreading to other internal systems.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What is the frequency pattern of these C2 checkins from this host?
    context: Understanding communication intervals helps identify the malware's operational behavior.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: Are other hosts in the network showing similar Lalus trojan activity?
    context: Identifies the scope of infection across the enterprise.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What child processes were spawned by the trojan downloader?
    context: Reveals secondary payloads or tools deployed after the initial infection.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            ParentProcessGuid|expand: '%ProcessGuid%'
          condition: selection
        fields:
          - Image
          - CommandLine
          - ProcessGuid
          - User
          - ParentImage
  - question: What scheduled tasks were created that might be related to this malware?
    context: Identifies persistence mechanisms using Windows task scheduler.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
