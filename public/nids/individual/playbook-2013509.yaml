name: ET MALWARE W32/Lalus Trojan Downloader Checkin
id: 22013509
description: |
  Detects W32/Lalus trojan communicating with command and control servers using specific URL parameters.
  May trigger on legitimate applications using similar parameter patterns in rare cases.
type: detection
detection_id: 2013509
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete malicious HTTP request with the trojan parameters?
    context: Reveals the specific C2 communication pattern and victim system identifiers.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this host authorized to make external HTTP requests to unknown domains?
    context: Determines if this represents unauthorized malware communication versus legitimate business activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process initiated this suspicious HTTP connection to the C2 server?
    context: Identifies the malicious executable responsible for the trojan communication.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the trojan successfully download additional malware payloads?
    context: Assesses whether the downloader accomplished its primary function of retrieving secondary payloads.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What executable files were downloaded or created during this trojan activity?
    context: Identifies malicious payloads retrieved by the W32/Lalus downloader.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .scr
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: How did the W32/Lalus trojan achieve persistence on this system?
    context: Reveals the persistence mechanism used to maintain access across reboots.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Did the trojan attempt to spread to other internal systems?
    context: Determines if the malware has lateral movement capabilities beyond its downloader function.
    range: +6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: Are other hosts in our network infected with the same W32/Lalus variant?
    context: Assesses the scope of infection and identifies other compromised systems.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What DNS queries preceded this C2 communication?
    context: Reveals the domain resolution pattern used by the trojan for C2 server discovery.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
