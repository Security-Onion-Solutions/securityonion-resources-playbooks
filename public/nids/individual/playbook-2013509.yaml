name: ET MALWARE W32/Lalus Trojan Downloader Checkin
id: 22013509
description: |
  Detects W32/Lalus trojan downloader communication with command and control servers.
  Characterized by specific HTTP URI parameters including guid, version, and affiliate ID.
type: detection
detection_id: 2013509
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request containing the Lalus trojan parameters?
    context: The full URI and headers reveal the specific trojan variant and configuration.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.method
        - url.full
        - http.user_agent
        - http.request.body.content

  - question: Is this a legitimate application making similar parameter requests?
    context: Some software updaters may use similar parameter patterns for version checking.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: "GET"
        condition: selection
      fields:
        - url.path
        - http.user_agent
        - dst_ip

  - question: What triggered this malware communication attempt?
    context: Understanding the parent process helps identify initial infection vector.
    range: -15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - ParentCommandLine

  - question: What network connections were established around this time?
    context: Reveals additional C2 communications or data exfiltration attempts.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - dst_ip
        - dst_port
        - Image
        - connection.state

  - question: Has this system been compromised by additional malware?
    context: Lalus often downloads additional payloads after initial communication.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid

  - question: What DNS queries preceded this HTTP communication?
    context: DNS resolution patterns may reveal the C2 infrastructure.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name

  - question: Are there signs of data collection or system reconnaissance?
    context: Lalus may gather system information before downloading additional components.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          Image|contains:
            - "systeminfo"
            - "whoami"
            - "net.exe"
            - "wmic"
        condition: selection
      fields:
        - Image
        - CommandLine
        - ProcessGuid

  - question: What SSL/TLS connections were made to external hosts?
    context: Modern malware often uses encrypted channels for secondary communications.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dst_ip
        - ssl.server_name
        - ssl.established
        - ssl.version

  - question: Are there registry modifications indicating persistence mechanisms?
    context: Lalus typically establishes persistence through registry modifications.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          TargetObject|contains:
            - "\\Run"
            - "\\RunOnce"
            - "\\Services"
        condition: selection
      fields:
        - TargetObject
        - Details
        - EventType
        - Image

  - question: Are other systems in the network showing similar trojan activity?
    context: Determines if this is an isolated incident or part of broader campaign.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: "Lalus"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - alert.severity_label

  - question: What file downloads occurred after the initial C2 communication?
    context: Lalus is a downloader that fetches additional malicious payloads.
    range: +4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: "GET"
        condition: selection
      fields:
        - url.full
        - http.response.status_code
        - http.response.body.bytes