name: ET MALWARE W32/LetsGo.APT Sleep CnC Beacon
id: 22016568
description: |
  Detects HTTP requests matching W32/LetsGo APT beacon patterns with sleep user-agent and specific URI structure.
  May indicate APT command and control communication or testing of security controls.
type: detection
detection_id: 2016568
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2013-03-14
questions:
  - question: What was the complete HTTP request containing the sleep user-agent pattern?
    context: Reveals the full W32/LetsGo beacon structure including URI parameters and headers.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this host authorized to communicate with external servers using custom applications?
    context: Determines if the sleep beacon pattern represents approved software or unauthorized activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process initiated the connection with the sleep user-agent?
    context: Identifies the specific executable making the W32/LetsGo beacon request.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the host establish ongoing communication patterns after the initial sleep beacon?
    context: Assesses whether the W32/LetsGo pattern resulted in sustained C2 communication.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%related_ip%'
            dst_ip|expand: '%related_ip%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.protocol
          - event.duration
          - client.ip_bytes
          - server.ip_bytes
          - connection.state_description
  - question: What files were created or modified around the time of the sleep beacon activity?
    context: Identifies potential W32/LetsGo malware files or payloads associated with the APT activity.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Were registry keys modified that match W32/LetsGo persistence patterns?
    context: Reveals persistence mechanisms commonly used by the W32/LetsGo APT family.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: What other hosts show similar sleep user-agent beacon patterns?
    context: Determines the scope of potential W32/LetsGo APT compromise across the network.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          http.user_agent|startswith: "sleep "
          http.uri|re: "\.html\?[0-9]{10}$"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - http.user_agent
        - http.uri
  - question: Did the host access internal systems after the sleep beacon communication?
    context: Assesses potential lateral movement following W32/LetsGo APT initial compromise.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What was the response from the server to the sleep beacon request?
    context: Reveals potential command delivery or next-stage payload information from the C2 server.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.status_code
        - http.response.body.length
        - http.method
  - question: Are there other connections to the same C2 infrastructure from different hosts?
    context: Identifies the broader scope of W32/LetsGo APT campaign targeting the organization.
    range: +/-48h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What scheduled tasks were created that might maintain persistence for W32/LetsGo?
    context: Reveals task scheduler persistence mechanisms associated with the APT activity.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
