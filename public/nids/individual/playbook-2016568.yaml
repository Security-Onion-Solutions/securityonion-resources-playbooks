name: ET MALWARE W32/LetsGo.APT Sleep CnC Beacon
id: 22016568
description: |
  Detects W32/LetsGo APT malware communicating with command and control servers using characteristic sleep beacon patterns.
  This is highly suspicious activity indicating APT compromise.
type: detection
detection_id: 2016568
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What are the exact C2 beacon parameters and sleep intervals used by this malware?
    context: Reveals the specific command and control communication pattern and timing.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this host authorized to make automated HTTP requests to external sites?
    context: Determines if this represents a deviation from normal host behavior patterns.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process is generating these malicious C2 communications?
    context: Identifies the infected executable responsible for the APT beacon traffic.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: How long has this APT malware been beaconing to the C2 server?
    context: Establishes the timeline and persistence of the compromise.
    range: -24h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%related_ip%'
            dst_ip|expand: '%related_ip%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.protocol
          - event.duration
          - client.ip_bytes
          - server.ip_bytes
          - connection.state_description
  - question: What sensitive internal systems has this compromised host attempted to access?
    context: Assesses the scope of lateral movement and data access by the APT.
    range: +/-6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: Are there other hosts infected with this same W32/LetsGo APT malware?
    context: Determines the breadth of the APT campaign within the organization.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files or executables were created around the time of initial infection?
    context: Identifies the APT malware components and potential dropper files.
    range: -2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .bat
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did this APT malware establish persistence mechanisms on the infected system?
    context: Reveals how the malware maintains persistence across system reboots.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: What DNS queries preceded the initial C2 communication?
    context: Shows the domain resolution pattern used to locate the C2 infrastructure.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Has this C2 server been used in other APT campaigns against our organization?
    context: Correlates with historical threat intelligence to identify repeat targeting.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
          http.uri|contains: ".html"
          http.user_agent|startswith: "sleep "
      condition: selection
      fields:
        - src_ip
        - http.uri
        - http.user_agent
  - question: Are there related security alerts indicating data exfiltration or credential theft?
    context: Assesses the impact and success of the APT attack beyond initial compromise.
    range: +/-12h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
