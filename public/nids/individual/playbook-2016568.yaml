name: ET MALWARE W32/LetsGo.APT Sleep CnC Beacon
id: 22016568
description: |
  Detects W32/LetsGo APT malware command and control beacon traffic.
  Characterized by specific URI patterns and "sleep" user agent strings.
  Legitimate traffic would not exhibit this combination of indicators.
type: detection
detection_id: 2016568
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request containing the beacon pattern?
    context: Understanding the full beacon request reveals C2 communication structure and timing parameters.
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What other external connections occurred from this compromised host?
    context: Identifies additional C2 channels or other APT infrastructure being contacted.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What process initiated this malicious C2 beacon?
    context: Identifies the specific malware process conducting command and control communication.
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What is the frequency pattern of these beacon communications?
    context: APT malware typically follows regular beacon intervals that can reveal operational patterns.
    range: -2h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What child processes were spawned by the beacon process?
    context: Identifies commands executed by the APT malware after C2 communication.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            ParentProcessGuid|expand: '%ProcessGuid%'
          condition: selection
        fields:
          - Image
          - CommandLine
          - ProcessGuid
          - User
          - ParentImage
  - question: What persistence mechanisms were established by this APT malware?
    context: LetsGo APT typically establishes registry-based persistence for survival.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of lateral movement from this compromised host?
    context: APT groups commonly spread internally after initial compromise.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What files were created or modified by the beacon process?
    context: Identifies downloaded payloads, configuration files, or stolen data staging.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            ProcessGuid|expand: '%ProcessGuid%'
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - User
  - question: What DNS queries preceded this C2 communication?
    context: Reveals domain resolution patterns and potential DNS-based C2 channels.
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are other hosts in the network contacting the same C2 infrastructure?
    context: Determines campaign scope and identifies additional compromised systems.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What related alerts indicate broader APT campaign activity?
    context: Correlates with other indicators to understand complete attack chain.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: How does this C2 activity compare to historical baselines for this host?
    context: Establishes deviation from normal behavior patterns to confirm malicious activity.
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
