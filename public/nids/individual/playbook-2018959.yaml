name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: |
  Detects HTTP downloads of Windows PE executable files (.exe/.dll) from external sources.
  May be legitimate software downloads or malicious payload delivery.
type: detection
detection_id: 2018959
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What specific executable file was downloaded and from which URL?
    context: Identifies the exact PE file and source location for threat assessment.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is downloading executables from this domain part of normal business operations?
    context: Determines if this represents authorized software installation or potential malware.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What browser or application initiated this executable download?
    context: Reveals whether the download was user-initiated or automatic/scripted.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the downloaded executable establish any network connections after download?
    context: Indicates if the downloaded file was executed and potentially malicious.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What other files were created or modified during this download activity?
    context: Reveals additional components that may have been installed with the executable.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .msi
            - .tmp
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did this executable attempt to create persistence mechanisms on the system?
    context: Identifies if the downloaded file established startup or persistence entries.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Are other hosts in the environment downloading executables from this same source?
    context: Determines if this is part of a broader malware distribution campaign.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What DNS queries preceded this executable download?
    context: Reveals the domain resolution and potential redirect chains leading to the download.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Did the host attempt to download additional payloads from other sources?
    context: Identifies potential multi-stage malware infections or dropper behavior.
    range: +4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: GET
        filter:
          dst_ip|expand: '%dst_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - http.virtual_host
        - http.uri
        - http.user_agent
  - question: What was the file size and hash of the downloaded executable?
    context: Provides forensic identifiers for threat intelligence correlation.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          file.name|endswith:
            - ".exe"
            - ".dll"
      condition: selection
      fields:
        - file.path
        - file.name
        - file.size
        - file.hash.md5
        - file.hash.sha256
  - question: Are there related alerts indicating suspicious behavior from this downloaded file?
    context: Correlates with other security events that may indicate successful malware execution.
    range: +6h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
