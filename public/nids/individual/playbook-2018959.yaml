name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: |
  Detects Windows PE (Portable Executable) files being downloaded over HTTP.
  Could indicate malware download, legitimate software installation, or system updates.
type: detection
detection_id: 2018959
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request and response for this PE file download?
    context: Understanding the full HTTP transaction reveals the source URL and file details.
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.uri
          - http.method
          - http.user_agent
          - http.virtual_host
          - http.status_code
  - question: What process initiated the connection to download this PE file?
    context: Identifies if this was user-initiated, automated update, or malicious process.
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - User
          - ParentImage
          - Image
          - ProcessGuid
          - CommandLine
  - question: Is this PE file download part of normal business operations for this host?
    context: Determines if this represents authorized software installation or potential threat.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this host around the same time?
    context: Identifies additional download attempts or C2 communications.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What DNS queries preceded this PE file download?
    context: Reveals the domain resolution that led to this download.
    range: -5m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Did the downloaded PE file execute on the target system?
    context: Determines if the download resulted in actual malware execution.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            Image|contains:
            - rundll32.exe
            - regsvr32.exe
            - mshta.exe
            - powershell.exe
          condition: selection
        fields:
          - User
          - Image
          - CommandLine
          - ParentImage
          - ProcessGuid
  - question: Are there signs of persistence mechanisms created after this download?
    context: Identifies if the downloaded PE established persistence for survival.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What file system activity occurred after this PE download?
    context: Shows if the downloaded file was moved, renamed, or extracted.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are other hosts in the network downloading PE files from the same source?
    context: Identifies potential campaign targeting multiple systems.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What child processes were spawned if this PE file executed?
    context: Reveals the behavior and capabilities of the downloaded executable.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            ParentProcessGuid|expand: '%ProcessGuid%'
          condition: selection
        fields:
          - Image
          - CommandLine
          - ProcessGuid
          - User
          - ParentImage
  - question: Are there indicators of lateral movement from this host after the download?
    context: Determines if the downloaded PE enabled network propagation.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
