name: ET MALWARE Zbot POST Request to C2
id: 22019141
description: |
  Detects Zbot (Zeus) banking trojan communicating with command and control servers via characteristic HTTP POST requests.
  This indicates active banking malware infection and credential theft.
type: detection
detection_id: 2019141
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What sensitive data is being exfiltrated in this Zbot C2 communication?
    context: Reveals the specific credentials or banking information being stolen.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this host authorized to make automated POST requests to external PHP scripts?
    context: Determines if this represents unauthorized malware communication.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process is executing the Zbot malware and sending these C2 requests?
    context: Identifies the infected executable responsible for the banking trojan activity.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: How frequently is this Zbot malware communicating with its C2 server?
    context: Establishes the communication pattern and potential data exfiltration schedule.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%related_ip%'
            dst_ip|expand: '%related_ip%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.protocol
          - event.duration
          - client.ip_bytes
          - server.ip_bytes
          - connection.state_description
  - question: What banking or financial websites has this infected host accessed?
    context: Identifies potential targets of credential theft and financial fraud.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host|contains:
            - "bank"
            - "credit"
            - "paypal"
            - "financial"
            - "online"
            - "secure"
      condition: selection
      fields:
        - http.virtual_host
        - http.uri
        - http.user_agent
  - question: Did the Zbot malware create persistence mechanisms on the infected system?
    context: Shows how the banking trojan maintains persistence for ongoing credential theft.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Are other hosts in the network infected with this same Zbot campaign?
    context: Determines the scope of the banking malware infection across the organization.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files were modified or created during the Zbot infection?
    context: Identifies malware components and potential configuration files.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
            - .cfg
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: How did this Zbot malware initially infect the system?
    context: Reveals the infection vector such as email attachment or drive-by download.
    range: -6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Has this infected host attempted to access other internal systems?
    context: Assesses potential lateral movement and broader network compromise.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_ip|expand: '%private_ip%'
          filter:
            src_ip|expand: '%src_ip%'
            dst_ip|expand: '%dst_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What other C2 servers has this Zbot-infected host communicated with?
    context: Identifies additional malware infrastructure and potential multi-stage infections.
    range: +/-12h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: "POST"
          http.uri|contains: ".php"
        filter:
          dst_ip|expand: '%dst_ip%'
      condition: selection and not filter
      fields:
        - dst_ip
        - http.virtual_host
        - http.uri
        - http.user_agent
  - question: Are there related alerts indicating credential theft or fraudulent banking activity?
    context: Correlates with other security events showing successful financial fraud.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
