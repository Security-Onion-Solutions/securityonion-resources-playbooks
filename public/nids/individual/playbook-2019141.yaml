name: ET MALWARE Zbot POST Request to C2
id: 22019141
description: |
  Detects Zbot/Zeus banking trojan HTTP POST requests to command and control servers.
  Identifies specific HTTP header patterns and POST requests to PHP endpoints typical of Zbot C2 communication.
type: detection
detection_id: 2019141
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP POST request that triggered this alert?
    context: Understanding the full request reveals the Zbot C2 communication details and payload.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What process initiated this suspicious HTTP connection?
    context: Identifies the Zbot-infected process making the C2 communication.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Has this host established other external connections recently?
    context: Reveals additional C2 channels or data exfiltration attempts by Zbot.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What DNS queries preceded this C2 communication?
    context: Shows domain resolution for the C2 server and potential DGA activity.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is this POST pattern normal for this host?
    context: Determines if this represents new Zbot activity or ongoing infection.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What files have been created on this system recently?
    context: Identifies Zbot payload drops, configuration files, or stolen data.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
            - .cfg
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of banking credential theft or keylogging activity?
    context: Assesses if Zbot has successfully harvested sensitive data.
    range: +/-1h
    query:
      logsource:
        category: file_event
      selection:
        host.ip|expand: '%src_ip%'
        file.name|contains:
          - login
          - bank
          - credential
          - password
          - keylog
  - question: Has this host attempted lateral movement or credential dumping?
    context: Determines if Zbot is spreading or harvesting additional credentials.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: Are there registry modifications indicating Zbot persistence?
    context: Identifies autostart entries or configuration changes for persistence.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Have other hosts in the network exhibited similar Zbot C2 patterns?
    context: Assesses the scope of Zbot infection across the enterprise.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Are there related alerts for this IP address or host?
    context: Correlates with other malware detections or suspicious activities.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
