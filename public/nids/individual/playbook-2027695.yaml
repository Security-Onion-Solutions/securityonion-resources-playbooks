name: ET INFO Observed Cloudflare DNS over HTTPS Domain (cloudflare-dns.com in TLS SNI)
id: 22027695
description: |
  Detects TLS connections to cloudflare-dns.com indicating DNS over HTTPS usage.
  May represent legitimate privacy-focused DNS resolution or attempts to bypass DNS monitoring.
type: detection
detection_id: 2027695
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection details to the cloudflare-dns.com domain?
    context: Reveals the specific SSL handshake and certificate information for the DoH connection.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this host normally establish connections to Cloudflare DNS services?
    context: Determines if this represents a change from normal DNS resolution patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What process initiated the connection to the cloudflare-dns.com domain?
    context: Identifies the specific application or service making DNS over HTTPS requests.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What DNS queries were made through traditional DNS before this DoH connection?
    context: Shows what DNS queries may have triggered the switch to encrypted DNS.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Are other hosts on the network also connecting to cloudflare-dns.com?
    context: Determines if this is part of a broader pattern of DoH adoption or configuration change.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What other external connections occurred from this host after the DoH connection?
    context: Identifies what domains may be resolved through encrypted DNS channels.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Is this host configured to use traditional DNS servers for normal queries?
    context: Shows whether the host is bypassing configured DNS infrastructure.
    range: +/-1h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|expand: '%dns.query.name%'
        condition: selection
      fields:
        - dns.query.name
  - question: What web browsers or applications were active during the DoH connection timeframe?
    context: Identifies applications that may have DoH capabilities enabled.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          Image|contains:
          - firefox.exe
          - chrome.exe
          - msedge.exe
          - iexplore.exe
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: Are there multiple repeated connections to cloudflare-dns.com indicating persistent usage?
    context: Determines if this represents ongoing DoH usage rather than a one-time connection.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%related_ip%'
          dst_ip|expand: '%related_ip%'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
