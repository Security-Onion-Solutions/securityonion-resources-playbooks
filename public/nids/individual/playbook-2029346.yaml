name: ET MALWARE Possible Winnti DNS Lookup Investigation
id: 1200001
description: |
  Detects DNS queries to livehost.live domain associated with Winnti group operations.
  May trigger on legitimate traffic if domain is reused or benign applications use similar patterns.
type: detection
detection_id: 2029346
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-06-14
questions:
  - question: What was the exact DNS query that triggered this alert?
    context: Understanding the specific domain query reveals the infrastructure being contacted.
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          document_id|expand: '%document_id%'
        condition: selection
      fields:
        - dns.question.name
        - src_ip
        - dst_ip
        - dns.question.type

  - question: Has this system queried Winnti-associated domains before?
    context: Historical DNS patterns indicate ongoing compromise or reconnaissance.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.question.name|contains: '.live'
        condition: selection
      fields:
        - dns.question.name
        - dns.answers.data

  - question: What process initiated this DNS query?
    context: Process context reveals if legitimate application or malicious payload performed lookup.
    range: +/-5m
    query: |
      aggregation: false
      logsource:
        category: network_connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port: 53
        filter:
          Image|exists: true
        condition: selection and not filter
      fields:
        - Image
        - CommandLine
        - User
        - ProcessGuid

  - question: Are there network connections to resolved IP addresses?
    context: DNS queries followed by connections indicate active C2 communication.
    range: +/-15m
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - bytes_out
        - bytes_in

  - question: What other DNS queries occurred around the same time?
    context: Clustered DNS activity may reveal additional malicious infrastructure.
    range: +/-30m
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.question.name
        - dns.question.type
        - dns.answers.data

  - question: Has this system shown other Winnti-related activity?
    context: Multiple Winnti indicators suggest active compromise requiring immediate response.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          rule.name|contains: 'Winnti'
        condition: selection
      fields:
        - rule.name
        - alert.category
        - dst_ip

  - question: Are other systems querying similar domains?
    context: Multiple infected systems indicate widespread compromise or campaign targeting.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.question.name|contains: '.live'
        condition: selection
      fields:
        - src_ip
        - dns.question.name
        - dns.answers.data

  - question: What file or process activity preceded this DNS query?
    context: Recent file creation or process execution may indicate initial infection vector.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          hostname|expand: '%hostname%'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User