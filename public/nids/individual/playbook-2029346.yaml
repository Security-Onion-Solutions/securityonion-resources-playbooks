name: ET MALWARE Possible Winnti DNS Lookup
id: 22029346
description: |
  Detects DNS queries to .livehost.live domains associated with Winnti APT group.
  May trigger on legitimate DNS queries if domains are repurposed for benign use.
type: detection
detection_id: 2029346
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query to the Winnti-associated domain?
    context: Reveals the specific subdomain structure used by the malware for C2 communication.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is DNS resolution to .livehost.live domains part of normal business operations?
    context: Determines if this represents legitimate traffic or actual malware communication.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What process initiated the DNS query to the Winnti domain?
    context: Identifies the specific malware executable or compromised application making the query.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the infected host establish connections to the resolved IP addresses?
    context: Confirms whether the DNS query led to actual C2 communication attempts.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files were recently created or modified on this host?
    context: Identifies the Winnti malware dropper or payload files on the infected system.
    range: -2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did the malware establish persistence through registry modifications?
    context: Detects Winnti's common persistence mechanisms in the Windows registry.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Are there indicators of lateral movement from this compromised host?
    context: Assesses whether Winnti has begun spreading to other internal systems.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What other hosts in the network are communicating with Winnti infrastructure?
    context: Identifies the scope of the Winnti campaign within the organization.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Did the malware attempt to access sensitive file shares or databases?
    context: Evaluates whether Winnti achieved its typical objectives of data theft.
    range: +4h
    query:
      logsource:
        category: network
        service: connection
      selection:
        src_ip|expand: '%src_ip%'
        dst_port:
          - 445
          - 139
          - 1433
          - 3389
          - 22
      condition: selection
  - question: Are there other DNS queries to domains with similar suspicious patterns?
    context: Identifies additional Winnti C2 domains that may not be in known IOC lists.
    range: +/-6h
    query:
      logsource:
        category: network
        service: dns
      selection:
        src_ip|expand: '%src_ip%'
        dns.query.name|contains: .live
      filter:
        dns.query.name|expand: '%dns.query.name%'
      condition: selection and not filter
