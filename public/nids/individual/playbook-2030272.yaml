name: ET SCAN UPnP SUBSCRIBE Inbound - Possible CallStranger Scan (CVE-2020-12695)
id: 22030272
description: |
  Detects UPnP SUBSCRIBE requests with callback headers from external sources, potentially indicating CallStranger vulnerability scanning.
  May trigger on legitimate UPnP traffic or network discovery tools.
type: detection
detection_id: 2030272
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP SUBSCRIBE request that triggered this alert?
    context: Understanding the full request reveals the UPnP scanning attempt details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What other external connections occurred from this source IP?
    context: Identifies additional scanning activity from the same attacker.
    range: +/-1h
    query:
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%dst_ip%'
          dst_ip|expand: '%private_ip%'
        condition: selection
  - question: Are there other UPnP-related requests from this source?
    context: Reveals broader UPnP enumeration or exploitation attempts.
    range: +/-2h
    query:
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%dst_ip%'
        upnp_methods:
          http.method:
            - SUBSCRIBE
            - NOTIFY
            - M-SEARCH
            - UNSUBSCRIBE
        condition: selection and upnp_methods
  - question: What process is listening on the targeted port?
    context: Identifies the vulnerable UPnP service or application.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Is this scanning activity targeting multiple internal hosts?
    context: Determines the scope of the CallStranger scanning campaign.
    range: +/-2h
    query:
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%dst_ip%'
          http.method: SUBSCRIBE
        condition: selection
      fields:
        - dst_ip
        - http.virtual_host
        - http.uri
  - question: Has this target shown historical UPnP activity?
    context: Helps determine if this is a legitimate UPnP device or unexpected service.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: Are there DNS queries for UPnP-related domains before this activity?
    context: May reveal reconnaissance phase of the attack.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What callback URLs were specified in the SUBSCRIBE headers?
    context: Reveals potential callback destinations for exploitation.
    range: +/-15m
    query:
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.request.headers
        - http.method
        - src_ip
        - dst_ip
  - question: Are there connections to any callback URLs specified in the request?
    context: Indicates successful CallStranger exploitation with callback execution.
    range: +2h
    query:
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%dst_ip%'
        condition: selection
  - question: What other scanning signatures triggered from this source IP?
    context: Reveals the broader scanning campaign and attacker methodology.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Are there signs of lateral movement after this scanning activity?
    context: Determines if scanning led to successful compromise and internal movement.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: Is this part of a broader CallStranger campaign across the network?
    context: Identifies enterprise-wide scanning attempts.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
