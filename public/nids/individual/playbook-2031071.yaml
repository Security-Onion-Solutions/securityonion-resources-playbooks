name: ET INFO Microsoft Connection Test
id: 22031071
description: |
  Detects Windows connection tests to Microsoft's connectivity test service.
  This is normal Windows behavior for network connectivity validation but may indicate network changes or troubleshooting activity.
type: detection
detection_id: 2031071
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request to the Microsoft connectivity test service?
    context: Shows the exact connectivity test request pattern and timing.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.method
        - http.useragent
        - http.virtual_host
        - http.uri
        - http.status_code
  - question: Does this host normally perform Microsoft connectivity tests?
    context: Determines if this represents normal behavior or indicates network troubleshooting.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What process initiated the connection to the Microsoft connectivity test service?
    context: Identifies whether this was triggered by Windows system processes or user applications.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What other Microsoft services was this host connecting to during this timeframe?
    context: Provides context for broader Microsoft service connectivity patterns.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host|contains:
            - microsoft.com
            - msft
            - live.com
            - outlook.com
            - office.com
        filter:
          http.virtual_host: "www.msftconnecttest.com"
        condition: selection and not filter
      fields:
        - http.virtual_host
        - http.uri
        - http.method
        - http.status_code
  - question: Were there network connectivity issues or changes preceding this test?
    context: Identifies potential network problems that triggered the connectivity test.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          connection.state: "S0"
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state_description
        - network.protocol
  - question: What DNS queries were made for Microsoft connectivity services?
    context: Shows DNS resolution patterns for Microsoft connectivity test domains.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - msftconnecttest
            - msftncsi
            - microsoft.com
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name
  - question: Did this host establish other external connections after the connectivity test?
    context: Determines if successful connectivity testing led to additional network activity.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Are multiple hosts performing Microsoft connectivity tests simultaneously?
    context: Identifies whether this is isolated activity or part of broader network validation.
    range: +/-1h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What was the response status for the Microsoft connectivity test request?
    context: Confirms whether the connectivity test succeeded or failed.
    range: +/-5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - http.status_code
        - http.response.body.length
        - http.method
        - http.uri
