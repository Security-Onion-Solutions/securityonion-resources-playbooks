name: ET INFO Session Traversal Utilities for NAT (STUN) Binding Request On Non-Standard High Port
id: 22033078
description: |
  Detects STUN binding requests on non-standard high ports which may indicate WebRTC communications,
  VoIP applications, or peer-to-peer applications establishing NAT traversal. Could also indicate
  applications using STUN for firewall bypass or covert communications.
type: detection
detection_id: 2033078
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What application initiated the STUN binding request to the non-standard port?
    context: Identifies the specific process making STUN requests outside normal port ranges.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Does this host normally communicate using STUN protocol?
    context: Determines if STUN usage represents normal behavior for this host.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What was the complete UDP packet content of the STUN binding request?
    context: Reveals the full STUN message structure and any additional attributes.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
  - question: Are legitimate VoIP or WebRTC applications configured on this host?
    context: Assesses whether STUN usage aligns with documented business applications.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          Image|contains:
          - chrome.exe
          - firefox.exe
          - teams.exe
          - zoom.exe
          - skype.exe
          - webex.exe
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: Did this host establish peer-to-peer connections after the STUN binding request?
    context: Identifies whether STUN successfully facilitated direct host-to-host communication.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What ports were accessed on the remote STUN server after the binding request?
    context: Reveals the communication pattern and whether standard STUN flows were followed.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_port
        - network.transport
        - connection.state_description
        - connection.history
  - question: Were media or data transfer protocols observed after the STUN negotiation?
    context: Determines if STUN led to RTP, SRTP, or other media streaming protocols.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port:
            - 5004  # RTP
            - 5005  # RTCP
            - 1024  # Dynamic RTP range start
        high_ports:
          src_ip|expand: '%src_ip%'
          dst_port|gte: 16384  # Typical RTP dynamic range
          dst_port|lte: 32767
        condition: selection or high_ports
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state_description
  - question: Are other hosts on the network making STUN requests to similar high ports?
    context: Identifies whether this represents isolated activity or broader application deployment.
    range: +/-6h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What files were accessed by the application making STUN requests?
    context: Reveals configuration files, media files, or other resources used by the STUN application.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          ProcessGuid|expand: '%ProcessGuid%'
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - User
  - question: Did the host attempt STUN requests to multiple external servers?
    context: Assesses whether the application is using multiple STUN servers for redundancy or discovery.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port:
            - 3478   # Standard STUN
            - 5349   # STUN over TLS
        high_ports:
          src_ip|expand: '%src_ip%'
          dst_port|gte: 1024
          dst_port|lte: 65535
          network.transport: udp
        filter:
          dst_ip|expand: '%dst_ip%'  # Exclude the known connection
        condition: (selection or high_ports) and not filter
      fields:
        - dst_ip
        - dst_port
        - connection.state_description
