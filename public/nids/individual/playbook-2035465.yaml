name: ET INFO Observed Discord Domain in DNS Lookup (discord.com)
id: 22035465
description: |
  Detects DNS queries for Discord domains. May represent legitimate gaming/communication usage
  or unauthorized applications bypassing corporate policies.
type: detection
detection_id: 2035465
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete Discord domain queried in the DNS request?
    context: Reveals the specific Discord subdomain being accessed.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Does this host normally query Discord or gaming-related domains?
    context: Determines if Discord access represents normal user behavior patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|expand: '%dns.query.name%'
        condition: selection
      fields:
        - dns.query.name
  - question: What application initiated the DNS query for the Discord domain?
    context: Identifies whether this came from a browser, Discord client, or other application.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Did this host establish connections to Discord services after the DNS query?
    context: Confirms whether the DNS query resulted in actual Discord communication.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What other gaming or social media domains were queried from this host?
    context: Reveals broader patterns of gaming or social application usage.
    range: +/-2h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n  selection:\n    src_ip|expand: '%src_ip%'\n    dns.query.name|contains:\n      - steam\n      - twitch\n      - youtube\n      - reddit\n      - twitter\n      - facebook\n      - instagram\n      - snapchat\n      - tiktok\n      - spotify\n  condition: selection\nfields:\n  - dns.query.name\n  - dns.resolved_ip\n  \n"
  - question: Are Discord applications or files present on this host?
    context: Identifies installed Discord client software or related executables.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          Image|contains:
          - Discord.exe
          - DiscordPTB.exe
          - DiscordCanary.exe
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: What HTTP requests were made to Discord services after the DNS query?
    context: Shows the actual Discord service interactions and user-agent patterns.
    range: +1h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n  selection:\n    src_ip|expand: '%src_ip%'\n    http.virtual_host|contains: discord\n  condition: selection\nfields:\n  - http.virtual_host\n  - http.uri\n  - http.user_agent\n  - http.method\n  \n"
  - question: Is this Discord access occurring during business hours or after hours?
    context: Helps determine if usage aligns with corporate policy expectations.
    range: +/-4h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n  selection:\n    src_ip|expand: '%src_ip%'\n    dns.query.name|contains: discord\n  condition: selection\nfields:\n  - dns.query.name\n  - src_ip\n  \n"
  - question: Are other users on the network also accessing Discord services?
    context: Determines if this represents isolated usage or broader organizational activity.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What file downloads occurred from Discord CDN services?
    context: Identifies files downloaded through Discord, which could include media or executables.
    range: +2h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n  selection:\n    src_ip|expand: '%src_ip%'\n    http.virtual_host|contains: \n      - cdn.discord\n      - media.discord\n  condition: selection\nfields:\n  - http.virtual_host\n  - http.uri\n  - http.response.body.bytes"
