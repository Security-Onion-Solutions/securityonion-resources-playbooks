name: ET INFO Observed Discord Domain in DNS Lookup (discordapp .com)
id: 22035466
description: |
  Detects DNS queries to Discord application domains (discordapp.com).
  May represent legitimate Discord application usage or potential data exfiltration through Discord channels.
type: detection
detection_id: 2035466
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the exact Discord subdomain being queried?
    context: Reveals the specific Discord service or channel being accessed.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Does this host normally query Discord domains during business hours?
    context: Determines if Discord access represents normal user behavior patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|expand: '%dns.query.name%'
        condition: selection
      fields:
        - dns.query.name
  - question: What application initiated the DNS query to the Discord domain?
    context: Identifies whether Discord access came from a browser, application, or script.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Did the host establish HTTPS connections to Discord after the DNS query?
    context: Confirms whether the DNS resolution led to actual Discord communication.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What user activity preceded the Discord domain query?
    context: Shows the context that led to Discord access attempts.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Were any files uploaded or downloaded during Discord communication?
    context: Assesses whether Discord was used for file transfer activities.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          file.name|endswith:
          - .doc
          - .docx
          - .xls
          - .xlsx
          - .pdf
          - .rtf
          - .ppt
          - .pptx
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Did the host access other communication or file-sharing platforms?
    context: Reveals broader communication patterns that may indicate data exfiltration.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - telegram
            - slack
            - teams
            - dropbox
            - googledrive
            - onedrive
            - pastebin
            - github
        filter:
          dns.query.name|contains: discordapp
        condition: selection and not filter
      fields:
        - dns.query.name
        - dns.resolved_ip
  - question: Are other users on the network also accessing Discord domains?
    context: Determines if this is part of normal organizational communication patterns.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What other Discord-related domains were queried from this host?
    context: Shows the full scope of Discord service usage.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - discord
            - discordcdn
            - discordapp
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
