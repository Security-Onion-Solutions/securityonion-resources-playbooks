name: ET INFO Observed Collaboration/File Sharing Platform Domain (www.notion.so in TLS SNI)
id: 22038646
description: |
  Detects TLS connections to www.notion.so collaboration platform.
  May represent legitimate business use or data exfiltration activities.
type: detection
detection_id: 2038646
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection to www.notion.so?
    context: Reveals the specific SSL/TLS handshake details and connection parameters.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this user normally access collaboration platforms like Notion?
    context: Determines if this represents normal work behavior or unusual activity.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What application initiated the connection to www.notion.so?
    context: Identifies the specific process or browser that accessed the platform.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What DNS queries were made before the Notion access?
    context: Shows the DNS resolution pattern that led to the platform access.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: What other collaboration or file-sharing platforms were accessed?
    context: Identifies broader pattern of collaboration platform usage or data transfer activities.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          ssl.server_name|contains:
            - dropbox
            - googledrive
            - onedrive
            - sharepoint
            - slack
            - discord
            - teams
            - zoom
            - webex
            - github
            - gitlab
            - bitbucket
            - pastebin
        condition: selection
      fields:
        - ssl.server_name
        - dst_ip
  - question: What files were accessed or created during the Notion session?
    context: Identifies document activity that may indicate data preparation for sharing.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%private_ip%'
          file.name|endswith:
          - .doc
          - .docx
          - .xls
          - .xlsx
          - .pdf
          - .rtf
          - .ppt
          - .pptx
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Did this host establish connections to other external services after Notion access?
    context: Assesses whether the platform access was part of broader external communication patterns.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Are other users in the organization accessing www.notion.so?
    context: Determines if this is isolated activity or part of broader organizational usage.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What was the data transfer volume during the Notion connection?
    context: Assesses the amount of data potentially shared through the platform.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%dst_ip%'
          dst_port: 443
        condition: selection
      fields:
        - connection.bytes_sent
        - connection.bytes_received
        - connection.history
        - connection.state_description
