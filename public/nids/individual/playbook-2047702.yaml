name: ET INFO External IP Lookup Domain (ipify .org) in DNS Lookup
id: 22047702
description: |
  Detects DNS queries to ipify.org service used for external IP address discovery.
  May indicate legitimate network troubleshooting or malware reconnaissance activity.
type: detection
detection_id: 2047702
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query for the ipify.org service?
    context: DNS query details reveal the specific subdomain and query type used.
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
        - dns.authoritative

  - question: Is this external IP lookup part of legitimate network diagnostics?
    context: Network administrators and troubleshooting tools commonly check external IP addresses.
    range: -1h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - "whatismyip"
            - "ipinfo"
            - "checkip"
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip

  - question: What process initiated this external IP discovery request?
    context: Process context helps distinguish between legitimate tools and malware reconnaissance.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid

  - question: What HTTP connections were made to ipify.org after DNS resolution?
    context: Actual HTTP requests reveal if the IP lookup service was contacted successfully.
    range: +15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host|contains: "ipify"
        condition: selection
      fields:
        - url.full
        - http.method
        - http.response.status_code
        - http.user_agent

  - question: Are there signs of malware using IP discovery for C2 communication?
    context: Malware often checks external IP before establishing command and control channels.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - dst_ip
        - dst_port
        - Image
        - connection.state

  - question: What other external reconnaissance DNS queries were made?
    context: Multiple external service queries may indicate systematic network reconnaissance.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - "whatismyip"
            - "ipinfo"
            - "checkip"
            - "myip"
            - "getip"
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name

  - question: Are there file downloads or updates occurring after IP discovery?
    context: External IP checks often precede software updates or payload downloads.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: "GET"
        condition: selection
      fields:
        - url.full
        - http.response.body.bytes
        - http.user_agent

  - question: What SSL/TLS connections were established to external services?
    context: Encrypted connections may indicate secure C2 communications or legitimate updates.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dst_ip
        - ssl.server_name
        - ssl.established
        - ssl.version

  - question: Are there registry or file modifications suggesting malware configuration?
    context: Malware may store discovered IP information for later use in configuration.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - TargetObject
        - Details
        - EventType
        - Image

  - question: Are other systems performing similar external IP discovery?
    context: Multiple systems checking external IPs may indicate coordinated malware activity.
    range: +/-4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|endswith: ".ipify.org"
        condition: selection
      fields:
        - src_ip
        - dns.query.name
        - dns.resolved_ip

  - question: What user context was associated with this IP discovery activity?
    context: User information helps determine if this is authorized administrative activity.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          Image|contains:
            - "curl"
            - "wget"
            - "powershell"
            - "cmd"
        condition: selection
      fields:
        - Image
        - CommandLine
        - User
        - ProcessGuid