name: ET INFO External IP Lookup Domain (ipify.org) in DNS Lookup
id: 22047702
description: |
  Detects DNS queries to ipify.org, a service that returns the public IP address of the requesting host.
  May indicate legitimate network troubleshooting or malicious reconnaissance activity.
type: detection
detection_id: 2047702
detection_category: null
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query pattern for the ipify.org lookup?
    context: Understanding the exact subdomain queried reveals the specific service
      used.
    query: |-
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: What process initiated the DNS query to ipify.org?
    context: Identifies whether this was user-initiated troubleshooting or automated
      malware reconnaissance.
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - User
        - ParentImage
        - Image
        - ProcessGuid
        - CommandLine
  - question: Is this normal network troubleshooting activity for this user or system?
    context: Determines if this aligns with documented IT operations or user behavior
      patterns.
    range: -7d
    query: |-
      aggregation: true
      logsource:
        category: network
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What other external IP lookup services were queried from this host?
    context: Multiple IP lookup services may indicate systematic reconnaissance efforts.
    range: +/-1h
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - 'whatismyip'
            - 'checkip'
            - 'myip'
            - 'ipecho'
            - 'icanhazip'
            - 'ipinfo.io'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dns.query.name
        - dns.query.type_name
  - question: What network connections occurred immediately after the IP lookup?
    context: Reveals if the discovered IP was used for subsequent malicious activities.
    range: +30m
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What processes were executed around the time of this DNS query?
    context: Identifies potential malware or scripts performing network reconnaissance.
    range: +/-15m
    query: |
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User
  - question: Are there signs of data exfiltration following this reconnaissance?
    context: IP discovery often precedes data theft to external destinations.
    range: +1h
    query: |
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%network.public_ip%'
        large_transfer:
          connection.orig_bytes|gt: 1048576
        condition: selection and large_transfer
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - connection.orig_bytes
        - connection.resp_bytes
  - question: What timing pattern exists for these IP lookup queries?
    context: Regular intervals may indicate automated malware beaconing behavior.
    range: -24h/+24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains: 'ipify.org'
        condition: selection
      fields:
        - src_ip
        - dns.query.name
  - question: Are other internal hosts performing similar IP lookup activities?
    context: Widespread IP lookups may indicate lateral movement or coordinated reconnaissance.
    range: +/-2h
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|contains: 'ipify.org'
        filter:
          src_ip|expand: '%src_ip%'
        condition: selection and not filter
      fields:
        - src_ip
        - dns.query.name
        - dns.query.type_name
  - question: What user account context exists for this reconnaissance activity?
    context: Determines if this occurred during legitimate user sessions or suspicious
      automated activity.
    range: +/-30m
    query: |
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%src_ip%'
          Image|contains:
            - 'browser'
            - 'curl'
            - 'wget'
            - 'powershell'
            - 'cmd'
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Is this part of a broader reconnaissance campaign across the enterprise?
    context: Correlates IP lookup activity with other reconnaissance indicators organization-wide.
    range: +/-4h
    query: |-
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
