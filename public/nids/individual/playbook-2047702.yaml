name: ET INFO External IP Lookup Domain (ipify.org) in DNS Lookup
id: 22047702
description: |
  Detects DNS queries to ipify.org for external IP address discovery.
  May be legitimate network troubleshooting or reconnaissance by attackers.
type: detection
detection_id: 2047702
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query to ipify.org?
    context: Understanding the full DNS request reveals the specific lookup details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What DNS queries occurred before this ipify.org lookup?
    context: Reveals the sequence of DNS activity leading to IP discovery.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What process initiated this DNS query?
    context: Identifies the application or tool performing IP discovery.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Is this normal behavior for this host?
    context: Determines if IP discovery is part of regular operations.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this host?
    context: Identifies additional network reconnaissance or C2 activity.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there signs of lateral movement after IP discovery?
    context: Determines if reconnaissance led to internal network scanning.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What files were created around this time?
    context: Reveals downloaded tools or payloads that may perform reconnaissance.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .bat
            - .ps1
            - .py
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Were any scheduled tasks created for persistence?
    context: Identifies attempts to maintain access after reconnaissance.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
  - question: Are there other hosts performing similar IP discovery?
    context: Reveals broader reconnaissance campaign across the network.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
