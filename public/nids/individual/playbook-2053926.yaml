name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad .disroot .org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org pastebin-like service.
  May indicate legitimate document sharing or malware C2/data exfiltration activity.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query to cryptpad.disroot.org that triggered this alert?
    context: Reveals the specific pastebin service lookup and resolution details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Does this user typically access document sharing or collaboration services?
    context: Determines if this represents normal business activity or suspicious behavior.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - src_ip
  - question: What application or process initiated the connection to this pastebin service?
    context: Identifies whether this was user-initiated or automated by malware.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What HTTP activity occurred to cryptpad.disroot.org after the DNS lookup?
    context: Reveals whether data was uploaded, downloaded, or just accessed.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host: "cryptpad.disroot.org"
        condition: selection
      fields:
        - http.method
        - http.uri
        - http.status_code
        - http.user_agent
  - question: Did this host attempt to access any other pastebin or file-sharing services?
    context: Reveals broader data exfiltration or malware distribution patterns.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - pastebin
            - paste
            - hastebin
            - ghostbin
            - justpaste
            - controlc
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
  - question: What other external connections occurred from this host during the same timeframe?
    context: Identifies potential C2 communications or additional data exfiltration channels.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are other employees accessing similar pastebin services during this time?
    context: Determines if this is part of a coordinated attack or legitimate business activity.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What files were accessed or created around the time of this pastebin activity?
    context: Reveals potential data staging for exfiltration or payload downloads.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .txt
            - .doc
            - .pdf
            - .zip
            - .exe
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there related security alerts from this host indicating compromise?
    context: Correlates pastebin access with other indicators of malicious activity.
    range: +/-12h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: What DNS queries preceded this pastebin service lookup?
    context: Reveals the chain of activities that led to accessing the pastebin service.
    range: -2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
