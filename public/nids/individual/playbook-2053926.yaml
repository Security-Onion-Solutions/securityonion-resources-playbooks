name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org, a collaborative document editing service.
  May indicate legitimate document collaboration or potential data exfiltration attempts.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-06-26
questions:
  - question: What was the complete DNS query for the cryptpad service?
    context: Reveals the full DNS request details and resolution information.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is accessing cryptpad.disroot.org part of authorized business activities?
    context: Determines if this collaborative document service is approved for organizational use.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What application or process initiated this DNS lookup?
    context: Identifies whether the query originated from a browser, malware, or automated script.
    range: +/-10m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other pastebin or file-sharing services has this host accessed?
    context: Reveals patterns of data sharing service usage that may indicate policy violations.
    range: +/-24h
    query:
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - pastebin
            - paste
            - cryptpad
            - sharetext
            - justpaste
            - dpaste
        condition: selection
  - question: Were any files uploaded or downloaded during this cryptpad session?
    context: Assesses whether sensitive data was potentially exfiltrated through the service.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What documents or files were accessed before this cryptpad lookup?
    context: Identifies potential source material that may have been shared externally.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .doc
            - .docx
            - .pdf
            - .txt
            - .xlsx
            - .ppt
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did this user exhibit other suspicious data handling behaviors?
    context: Looks for additional indicators of potential data exfiltration or policy violations.
    range: +/-4h
    query:
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.method: POST
          http.request.body.length|gt: 1000
        condition: selection
  - question: Are other employees accessing similar collaborative document services?
    context: Determines if this is part of a broader pattern of unapproved service usage.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What web browsing activity led to this cryptpad access?
    context: Reveals the referrer or browsing path that resulted in accessing the service.
    range: -15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Did this session involve any encrypted file transfers?
    context: Assesses whether the cryptpad service was used to transfer sensitive encrypted data.
    range: +1h
    query:
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%dst_ip%'
          connection.history|contains: D
        condition: selection
