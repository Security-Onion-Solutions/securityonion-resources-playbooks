name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org, a collaborative document editing platform.
  May indicate legitimate use of privacy-focused collaboration tools or potential data exfiltration.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-06-26
questions:
  - question: What was the complete DNS query for cryptpad.disroot.org?
    context: Reveals the full DNS request details and resolution information.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is accessing collaborative document platforms part of normal business operations for this user?
    context: Determines if cryptpad usage aligns with documented business workflows.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            dns.query.name|expand: '%dns.query.name%'
          condition: selection
        fields:
          - dns.query.name
  - question: What process initiated the connection to cryptpad.disroot.org?
    context: Identifies the application making the request to the collaborative platform.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other privacy-focused or collaboration domains were queried by this host?
    context: Reveals broader patterns of privacy-focused service usage or data sharing activities.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - disroot
            - cryptpad
            - etherpad
            - hackmd
            - framapad
            - riseup
            - protonmail
            - tutanota
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
  - question: Did the host establish HTTP connections to cryptpad.disroot.org after the DNS query?
    context: Confirms whether the DNS resolution led to actual platform usage.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          http.virtual_host: cryptpad.disroot.org
        condition: selection
      fields:
        - http.method
        - http.uri
        - http.user_agent
        - http.status_code
  - question: What files were accessed or downloaded during the cryptpad session?
    context: Identifies document or file activity associated with the collaborative platform usage.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .pdf
            - .doc
            - .docx
            - .txt
            - .md
            - .odt
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are other users in the organization also accessing cryptpad or similar collaboration platforms?
    context: Determines if this represents isolated usage or broader organizational adoption of privacy tools.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What was the timing pattern of cryptpad access relative to business hours?
    context: Assesses whether platform usage aligns with normal work schedules or occurs during suspicious timeframes.
    range: -24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - cryptpad
            - disroot
        condition: selection
      fields:
        - dns.query.name
        - src_ip
  - question: Did the host query any suspicious domains before or after the cryptpad lookup?
    context: Identifies potential data exfiltration patterns or malicious domain sequences.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What internal resources were accessed before the cryptpad query?
    context: Reveals what data or systems were accessed prior to using the external collaboration platform.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%private_ip%'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - network.protocol
