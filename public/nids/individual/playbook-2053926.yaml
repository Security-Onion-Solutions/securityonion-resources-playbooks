name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org, a pastebin-like service.
  May indicate legitimate collaborative document sharing or malicious data exfiltration/command distribution.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-06-26
questions:
  - question: What was the complete DNS query for the cryptpad.disroot.org domain?
    context: Reveals the exact DNS request details and resolution information.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is accessing cryptpad.disroot.org part of normal business operations for this user?
    context: Determines if this represents authorized collaborative document sharing or suspicious activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            dns.query.name|expand: '%dns.query.name%'
          condition: selection
        fields:
          - dns.query.name
  - question: What application or process initiated this DNS query to the pastebin service?
    context: Identifies whether a browser, script, or malware made the connection.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other external connections occurred after this DNS lookup?
    context: Reveals if the pastebin access led to additional suspicious network activity.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Was any sensitive data accessed or copied before this pastebin connection?
    context: Assesses potential data exfiltration preceding the pastebin upload.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .txt
            - .doc
            - .docx
            - .pdf
            - .xlsx
            - .csv
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did the host download any executable files after accessing the pastebin?
    context: Identifies potential malware downloads from pastebin-hosted payloads.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
            - .scr
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are other employees in the organization accessing the same pastebin service?
    context: Determines if this is part of a broader campaign or legitimate business use.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What registry modifications occurred after the pastebin access?
    context: Identifies potential persistence mechanisms installed via pastebin-hosted scripts.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Did this host attempt to access any other pastebin or file-sharing services?
    context: Reveals broader data exfiltration or malware distribution patterns.
    range: +/-6h
    query:
      logsource:
        category: network
        service: dns
      selection:
        src_ip|expand: '%src_ip%'
        dns.query.name|contains:
          - pastebin
          - paste
          - hastebin
          - ghostbin
          - justpaste
          - controlc
      condition: selection
  - question: Are there related alerts involving this host and external file sharing?
    context: Correlates with other security alerts for comprehensive threat assessment.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
