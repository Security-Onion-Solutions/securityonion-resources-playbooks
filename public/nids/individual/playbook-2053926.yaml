name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to CryptPad hosted on disroot.org, a privacy-focused collaborative document platform.
  May indicate legitimate privacy-conscious document sharing or potential data exfiltration activities.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-06-26
questions:
  - question: What was the complete DNS query that triggered this alert?
    context: Reveals the full DNS request details and resolution for the CryptPad service.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is accessing privacy-focused document sharing services normal for this user?
    context: Determines if this represents a deviation from typical user behavior patterns.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            dns.query.name|expand: '%dns.query.name%'
          condition: selection
        fields:
          - dns.query.name
  - question: What application or process initiated this DNS lookup?
    context: Identifies whether this was browser-based access or potentially automated tool usage.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the user successfully connect to the CryptPad service after the DNS resolution?
    context: Confirms whether the DNS lookup resulted in actual service usage.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What other pastebin or document sharing services has this host accessed?
    context: Reveals patterns of document sharing behavior that may indicate data exfiltration.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - pastebin
            - paste
            - cryptpad
            - etherpad
            - framapad
            - disroot
            - riseup.net
            - pad.
        filter:
          dns.query.name: "cryptpad.disroot.org"
        condition: selection and not filter
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dst_ip
  - question: Are there any suspicious file transfers or uploads during this timeframe?
    context: Identifies potential data exfiltration activities associated with document sharing service usage.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .txt
            - .doc
            - .docx
            - .pdf
            - .zip
            - .7z
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: What time of day is this access occurring and is it consistent with business hours?
    context: Unusual timing may indicate unauthorized or suspicious document sharing activities.
    range: +/-4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - cryptpad
            - disroot
            - pastebin
            - paste
      condition: selection
      fields:
        - dns.query.name
        - timestamp
        - src_ip
  - question: Is this part of a broader pattern of privacy service usage across the organization?
    context: Determines if multiple users are adopting privacy-focused tools, which may require policy review.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Did this host perform any registry modifications related to browser or document handling?
    context: Identifies potential changes to system configuration related to document sharing workflows.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: What other privacy-focused or encrypted communication services has this host accessed?
    context: Reveals broader privacy tool adoption patterns that may indicate security-conscious behavior or evasion attempts.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dns.query.name|contains:
            - protonmail
            - tutanota
            - signal
            - wickr
            - element.io
            - matrix.org
            - tor
            - onion
            - disroot
            - riseup
            - tails
      condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - timestamp
