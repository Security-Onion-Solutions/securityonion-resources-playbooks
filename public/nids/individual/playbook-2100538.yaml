name: GPL NETBIOS SMB IPC$ unicode share access
id: 22100538
description: |
  Detects SMB connection to the IPC$ administrative share using unicode encoding.
  This can indicate legitimate Windows administration or potential lateral movement attempts.
type: detection
detection_id: 2100538
detection_category: null
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB session establishment sequence?
    context: Understanding the full SMB handshake reveals authentication method and
      session context.
    query:
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields: null
  - question: What other SMB connections occurred from this external source?
    context: Identifies if this is part of broader SMB enumeration or lateral movement
      campaign.
    range: +/-30m
    query:
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%network.public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Is this connection part of documented administrative activity?
    context: Determines if this represents authorized remote administration versus
      unauthorized access.
    range: +/-15m
    query:
      aggregation: true
      logsource:
        category: network
      detection:
        selection:
          dst_ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - dst_ip
  - question: What authentication events occurred around this SMB connection?
    context: Correlates SMB access with login attempts to identify successful compromise.
    range: +/-5m
    query:
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%dst_ip%'
          Image|contains:
            - lsass.exe
            - winlogon.exe
        condition: selection
      fields:
        - host.ip
        - User
        - Image
        - CommandLine
        - ParentImage
  - question: What file access occurred after this IPC$ connection?
    context: IPC$ access often precedes file operations - reveals attacker objectives.
    range: +30m
    query:
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip|expand: '%network.private_ip%'
          file.name|endswith:
            - exe
            - dll
            - bat
            - ps1
            - vbs
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Are there signs of lateral movement to other internal hosts?
    context: Determines if this represents the start of internal network compromise.
    range: +1h
    query:
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%network.private_ip%'
          dst_port|contains:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.transport
  - question: What processes were created on the target host after SMB access?
    context: Identifies potential remote code execution or administrative tools deployment.
    range: +30m
    query:
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip|expand: '%dst_ip%'
        condition: selection
      fields:
        - host.ip
        - User
        - Image
        - CommandLine
        - ParentImage
        - ParentCommandLine
  - question: What persistence mechanisms were established after this connection?
    context: SMB access can be used to install services or modify registry for persistence.
    range: +1h
    query:
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip|expand: '%network.private_ip%'
          TargetObject|contains:
            - Services
            - Run
            - RunOnce
        condition: selection
      fields:
        - TargetObject
        - Details
        - Image
        - ProcessGuid
  - question: What DNS queries preceded this SMB connection?
    context: Reveals if attacker performed reconnaissance to identify the target host.
    range: -15m
    query:
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Are other internal hosts showing similar SMB access patterns?
    context: Identifies if this is part of a broader internal network compromise campaign.
    range: +/-2h
    query:
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: SMB
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - alert.severity_label
  - question: What network reconnaissance occurred from this source before the SMB
      connection?
    context: Reveals scanning patterns that preceded the targeted SMB access attempt.
    range: -1h
    query:
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port:
            - 139
            - 445
            - 135
            - 3389
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - connection.state
        - network.transport
