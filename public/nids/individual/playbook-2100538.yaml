name: GPL NETBIOS SMB IPC$ unicode share access
id: 22100538
description: |
  Detects external access to Windows administrative shares via SMB IPC$ connection.
  May indicate lateral movement attempts or legitimate administrative access from external sources.
type: detection
detection_id: 2100538
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB IPC$ connection attempt details?
    context: Reveals the specific administrative share access pattern and authentication details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: Is external SMB access to this system authorized for administrative purposes?
    context: Determines if this represents unauthorized access versus legitimate remote administration.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - src_ip
  - question: What Windows system is exposing SMB services to external networks?
    context: Identifies the specific host with potentially dangerous SMB exposure.
    range: +/-30m
    query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\ndetection:\n  selection:\n    dst_ip|expand: '%dst_ip%'\n    dst_port: \n      - 139\n      - 445\n    network.transport: \"tcp\"\n  condition: selection\nfields:\n  - src_ip\n  - connection.state\n  - connection.history\n"
  - question: Did this SMB connection result in successful authentication?
    context: Assesses whether the external access attempt was successful or blocked.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What other SMB shares or services did this source attempt to access?
    context: Reveals the scope of SMB enumeration and lateral movement attempts.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_port:
            - 139
            - 445
            - 135
          network.transport: "tcp"
        filter:
          community_id|expand: '%community_id%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - connection.state
  - question: Are there file access activities following this SMB IPC$ connection?
    context: Identifies potential file access or malware deployment via SMB shares.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did this external access lead to process execution on the target system?
    context: Determines if SMB access resulted in remote code execution or service installation.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What credentials or authentication methods were used for this SMB access?
    context: Reveals potential credential compromise or brute force authentication attempts.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          src_ip|expand: '%src_ip%'
          dst_ip|expand: '%dst_ip%'
          rule.name|contains:
            - "SMB"
            - "authentication"
            - "login"
            - "brute"
        condition: selection
      fields:
        - rule.name
        - alert.severity_label
  - question: Are other Windows systems in our network under similar SMB attack?
    context: Assesses the scope of external SMB reconnaissance across the organization.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What registry or system changes occurred after this SMB access?
    context: Identifies potential persistence mechanisms installed via SMB administrative access.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%related_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
