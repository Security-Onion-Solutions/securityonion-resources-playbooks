name: GPL NETBIOS SMB-DS IPC$ unicode share access
id: 22102466
description: |
  Detects SMB connections to the IPC$ administrative share using unicode encoding.
  Legitimate for domain operations and admin tools, but also used by attackers for reconnaissance and lateral movement.
type: detection
detection_id: 2102466
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB request that triggered this alert?
    context: Understanding the full SMB request reveals the specific IPC$ access attempt.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: smb
        detection:
          selection:
            community_id|expand: '%community_id%'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: Is this normal SMB activity for this source IP?
    context: Establishes baseline to distinguish legitimate admin activity from reconnaissance.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip|expand: '%dst_ip%'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this external host?
    context: Identifies if this is part of broader scanning or targeted attack.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          filter:
            dst_ip|expand: '%public_ip%'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there signs of lateral movement from this connection?
    context: Determines if attacker is using IPC$ access to spread internally.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip|expand: '%private_ip%'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What process initiated the SMB connection on the target host?
    context: Identifies if connection was initiated by expected services or suspicious processes.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id|expand: '%community_id%'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What files were accessed or created during this SMB session?
    context: Reveals if IPC$ access led to file operations or payload deployment.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of persistence mechanisms being established?
    context: Checks if IPC$ access was used to install persistence via registry or scheduled tasks.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip|expand: '%private_ip%'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What DNS queries occurred before this SMB connection?
    context: Reveals how the external host discovered the target system.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip|expand: '%src_ip%'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are there other hosts connecting to the same external IP?
    context: Identifies if this is part of a broader campaign targeting multiple systems.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          filter:
            src_ip|expand: '%src_ip%'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What other related alerts occurred around this timeframe?
    context: Correlates with other suspicious activity that may be part of the same attack chain.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip|expand: '%related_ip%'
          filter:
            document_id|expand: '%document_id%'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Is this part of a broader SMB reconnaissance campaign?
    context: Identifies coordinated scanning across multiple targets.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip|expand: '%public_ip%'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
