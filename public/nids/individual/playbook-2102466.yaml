name: GPL NETBIOS SMB-DS IPC$ unicode share access
id: 22102466
description: |
  Detects SMB connections to the IPC$ administrative share using unicode encoding.
  This can indicate legitimate Windows administration or potential lateral movement attempts.
type: detection
detection_id: 2102466
detection_category: null
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB session and authentication details for this
      IPC$ connection?
    context: Understanding the full SMB handshake reveals authentication method and
      user context.
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        condition: selection
      fields:
  - question: Is this IPC$ access part of documented administrative activity for this
      user or system?
    context: Determines if this represents authorized network administration versus
      suspicious access.
    range: +/-1h
    query: "aggregation: true\nlogsource:\n  category: network\n  \ndetection:\n \
      \ selection:\n    dst_ip|expand: '%dst_ip%'\n  condition: selection\nfields:\n\
      \  - dst_ip"
  - question: What other SMB connections occurred from this external source around
      the same time?
    context: Identifies if this is isolated administrative access or part of broader
      SMB enumeration.
    range: +/-15m
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        filter:
          dst_ip|expand: '%public_ip%'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What processes on the target system initiated outbound connections after
      this SMB access?
    context: Determines if the IPC$ access led to command execution or lateral movement.
    range: +30m
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id|expand: '%community_id%'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - User
        - ParentImage
        - Image
        - ProcessGuid
        - CommandLine
  - question: Are there signs of lateral movement to other internal systems from this
      target host?
    context: Identifies if this IPC$ access was used as a pivot point for internal
      spread.
    range: +1h
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%private_ip%'
          dst_port|contains:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.transport
  - question: What administrative tools or processes were executed on the target system
      after this connection?
    context: Reveals if legitimate admin tools or suspicious commands were run via
      the IPC$ share.
    range: +30m
    query: "aggregation: false\nlogsource:\n  category: process_creation\ndetection:\n\
      \  selection:\n    host.ip|expand: '%private_ip%'\n    Image|contains:\n   \
      \ \n      - net.exe\n    \n      - sc.exe\n    \n      - wmic.exe\n    \n  \
      \    - psexec.exe\n    \n      - cmd.exe\n    \n      - powershell.exe\n   \
      \ \n  condition: selection\nfields:\n  - User\n  - Image\n  - CommandLine\n\
      \  - ParentImage\n  - ProcessGuid"
  - question: What persistence mechanisms were created on the target system following
      this SMB access?
    context: Identifies if the IPC$ connection was used to install services or scheduled
      tasks.
    range: +1h
    query: "aggregation: false\nlogsource:\n  category: registry_event\ndetection:\n\
      \  selection:\n    host.ip|expand: '%private_ip%'\n    TargetObject|contains:\n\
      \    \n      - Services\n    \n      - Run\n    \n      - RunOnce\n    \n  condition:\
      \ selection\nfields:\n  - TargetObject\n  - Details\n  - Image\n  - ProcessGuid"
  - question: What files were accessed or modified on the target system after this
      IPC$ connection?
    context: Determines if sensitive files were accessed or malicious files were dropped.
    range: +30m
    query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n \
      \ selection:\n    host.ip|expand: '%private_ip%'\n    file.name|endswith:\n\
      \    \n      - .exe\n    \n      - .dll\n    \n      - .bat\n    \n      - .ps1\n\
      \    \n      - .vbs\n    \n  condition: selection\nfields:\n  - file.path\n\
      \  - file.name\n  - Image\n  - ProcessGuid\n  - User"
  - question: Are there other systems in the network showing similar IPC$ access patterns
      from external sources?
    context: Identifies if this represents a broader campaign targeting multiple systems.
    range: +/-2h
    query: |-
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip|expand: '%public_ip%'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What was the frequency and timing pattern of SMB connections from this
      external source?
    context: Distinguishes between automated attacks and manual administrative access.
    range: +/-4h
    query: |-
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip|expand: '%src_ip%'
        condition: selection
      fields:
        - dst_ip
