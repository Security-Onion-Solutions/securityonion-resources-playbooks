name: ET P2P BitTorrent peer sync
id: 22000334
description: |
  Detects BitTorrent peer synchronization traffic based on protocol handshake patterns.
  May indicate policy violations if P2P traffic is prohibited, but could be legitimate file sharing.
type: detection
detection_id: 2000334
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete network connection that triggered this BitTorrent detection?
    context: Understanding the full connection details reveals the extent of P2P activity.
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: What other external connections occurred from this host performing P2P activity?
    context: Identifies additional P2P peers or other network activity from the same system.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What process initiated this BitTorrent connection?
    context: Identifies the specific P2P application being used for policy enforcement.
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Is this normal P2P activity for this user and system?
    context: Determines if this represents authorized usage or policy violation.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What is the frequency and pattern of BitTorrent activity from this host?
    context: Reveals if this is occasional usage or heavy P2P file sharing.
    range: -24h/+2h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: Are there signs of file download or sharing activity associated with this P2P connection?
    context: Identifies actual file transfer operations for bandwidth and content analysis.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .torrent
            - .part
            - .!ut
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: What other hosts in the network are showing similar BitTorrent activity?
    context: Determines scope of P2P usage across the organization.
    range: +/-1h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Are there connections to known BitTorrent tracker or DHT networks?
    context: Confirms active participation in BitTorrent swarms and protocol usage.
    range: +/-30m
    aggregation: false
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{source.ip}'
        dst_port:
          - 6881
          - 6882
          - 6883
          - 6969
          - 8080
    fields:
      - src_ip
      - dst_ip
      - dst_port
      - connection.state
  - question: What DNS queries preceded this BitTorrent activity?
    context: Reveals tracker domains or P2P-related infrastructure lookups.
    range: -15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is there evidence of bandwidth-intensive file transfers associated with this P2P activity?
    context: Quantifies the network impact and data volume of P2P usage.
    range: +/-1h
    aggregation: true
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{source.ip}'
        connection.bytes_out|gte: 1000000
    fields:
      - dst_ip
      - connection.bytes_out
      - connection.duration
  - question: Are other systems showing related alerts for P2P or policy violations?
    context: Identifies enterprise-wide P2P usage patterns for policy enforcement.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
