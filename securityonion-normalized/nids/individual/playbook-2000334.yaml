name: ET P2P BitTorrent peer sync
id: 22000334
description: |
  Detects BitTorrent peer synchronization traffic based on protocol signatures.
  May indicate policy violations if P2P traffic is prohibited, but could be legitimate file sharing.
type: detection
detection_id: 2000334
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete connection that triggered this BitTorrent alert?
    context: Understanding the full connection details reveals the P2P communication pattern.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: What process initiated this BitTorrent connection?
    context: Identifies the specific P2P application or client being used.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other external connections occurred from this host?
    context: Reveals additional P2P peers and potential seeding/downloading activity.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Is this BitTorrent activity normal for this host?
    context: Determines if this represents new or unusual P2P behavior.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What DNS queries occurred before this P2P activity?
    context: May reveal tracker domains or DHT bootstrap queries.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What connections to the same peer have occurred?
    context: Shows the persistence and duration of P2P relationships.
    range: -24h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          filter:
            src_ip: '{source.ip}'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files were created during this P2P activity?
    context: Identifies downloaded content and potential policy violations.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .torrent
            - .part
            - .!ut
            - .bc!
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of internal file sharing or lateral movement?
    context: Determines if P2P activity is spreading internally.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What is the communication pattern for this BitTorrent session?
    context: Analyzes data transfer patterns typical of P2P protocols.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{related.ip}'
            dst_ip: '{related.ip}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.protocol
          - event.duration
          - client.ip_bytes
          - server.ip_bytes
          - connection.state_description
  - question: Are there other hosts with similar BitTorrent activity?
    context: Identifies broader P2P usage patterns across the network.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What related P2P alerts have occurred from this IP?
    context: Shows the scope of P2P policy violations.
    range: -24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
