name: ET USER_AGENTS Suspicious User-Agent - Possible Trojan Downloader (ver18/ver19 etc)
id: 22003380
description: |
  Detects suspicious user-agent strings containing ")ver" followed by digits, commonly used by trojan downloaders.
  May trigger on legitimate applications with similar user-agent patterns.
type: detection
detection_id: 2003380
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request with the suspicious user-agent?
    context: Understanding the full request reveals the exact user-agent pattern and destination.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is this user-agent pattern normal for this host?
    context: Determines if this represents a change in baseline behavior.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this host?
    context: Identifies additional C2 channels or download sources.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What process initiated this suspicious HTTP connection?
    context: Identifies the specific application making requests with suspicious user-agent.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What DNS queries occurred before this HTTP activity?
    context: Reveals domain resolution that led to this connection.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What files were downloaded during this activity?
    context: Identifies potential malware payloads retrieved by the trojan downloader.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .scr
            - .zip
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of persistence mechanisms being created?
    context: Determines if downloaded malware established persistence.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Has this host attempted lateral movement?
    context: Checks if compromised system is spreading to other internal hosts.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What scheduled tasks were created around this time?
    context: Identifies potential persistence via task scheduler.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip: '{network.private_ip}'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
  - question: Are other hosts exhibiting similar user-agent patterns?
    context: Determines scope of potential trojan downloader campaign.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other alerts are associated with this host?
    context: Provides broader context of suspicious activity on this system.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
