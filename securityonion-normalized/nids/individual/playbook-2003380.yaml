name: ET USER_AGENTS Suspicious User-Agent - Possible Trojan Downloader (ver18/ver19 etc)
id: 22003380
description: |
  Detects HTTP requests with suspicious user-agent strings containing version patterns typical of trojan downloaders.
  May occasionally trigger on legitimate software with similar naming conventions.
type: detection
detection_id: 2003380
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the exact user-agent string and requested URL?
    context: The complete user-agent pattern and destination URL reveal the specific malware family and target infrastructure.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.user_agent
        - url.full
        - http.request.method
        - http.response.status_code

  - question: Is this user-agent pattern associated with known legitimate software?
    context: Some legitimate applications may use similar versioning patterns in their user-agent strings.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - http.user_agent
        - url.domain
        - http.response.status_code

  - question: What process initiated this HTTP request?
    context: Identifying the source process helps distinguish between browser-based and malware-generated requests.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          host.ip: '{source.ip}'
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: What file was downloaded or what response was received?
    context: Understanding the server response reveals whether malicious payload delivery was successful.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.response.status_code
        - http.response.body.bytes
        - http.response.mime_type
        - file.name

  - question: Are there other suspicious HTTP requests from this host?
    context: Trojan downloaders often make multiple requests to download additional payloads or communicate with C2.
    range: +2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dst_ip
        - url.domain
        - http.user_agent
        - http.response.status_code

  - question: What DNS queries preceded this HTTP request?
    context: DNS resolution patterns can reveal if the domain was recently resolved or part of DGA activity.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: Has executable content been written to disk recently?
    context: Successful trojan downloader activity results in malicious files being written to the filesystem.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{source.ip}'
          file.extension|contains:
            - "exe"
            - "dll"
            - "scr"
            - "bat"
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid

  - question: Are there signs of payload execution after the download?
    context: Downloaded trojans typically execute shortly after being written to disk.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: What is the reputation and hosting details of the destination server?
    context: Trojan downloaders often connect to compromised or malicious hosting infrastructure.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_port
        - connection.state
        - connection.history

  - question: Are there other hosts in the environment with similar user-agent patterns?
    context: Trojan infections often spread across multiple systems or indicate a broader campaign.
    range: -24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: "Suspicious User-Agent"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - alert.severity_label

  - question: Has this host established persistence mechanisms?
    context: Successful trojan execution often involves creating persistence through registry or file system modifications.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip: '{source.ip}'
          TargetObject|contains:
            - "Run"
            - "RunOnce"
            - "Services"
        condition: selection
      fields:
        - TargetObject
        - Details
        - Image
        - EventType