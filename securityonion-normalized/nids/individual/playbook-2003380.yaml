name: ET USER_AGENTS Suspicious User-Agent - Possible Trojan Downloader (ver18/ver19 etc)
id: 22003380
description: |
  Detects suspicious User-Agent strings containing ")ver" followed by digits, commonly used by trojan downloaders.
  May occasionally trigger on legitimate software with unusual version strings in User-Agent headers.
type: detection
detection_id: 2003380
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request with the suspicious User-Agent string?
    context: Understanding the full request reveals the exact User-Agent pattern and target URL.
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.uri
          - http.method
          - http.useragent
          - http.virtual_host
          - http.status_code
  - question: What other external connections occurred from this potentially compromised host?
    context: Identifies additional C2 channels or malware communication patterns.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What process initiated the HTTP connection with the suspicious User-Agent?
    context: Identifies the potentially malicious application making the request.
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - Hostname
          - User
          - Image
          - ProcessGuid
          - CommandLine
  - question: Is this User-Agent pattern part of normal activity for this host?
    context: Establishes baseline behavior to distinguish legitimate from malicious activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What files were downloaded or executed around the time of this suspicious request?
    context: Identifies potential malware payloads or secondary stage downloads.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
            - .scr
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of persistence mechanisms created after this activity?
    context: Determines if downloaded malware established survival techniques.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What DNS queries preceded this suspicious HTTP request?
    context: Reveals domain resolution patterns that may indicate C2 infrastructure.
    range: -5m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are other hosts in the network exhibiting similar User-Agent patterns?
    context: Identifies potential campaign scope and multiple infected systems.
    range: +/-1h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What was the frequency and timing of requests with this User-Agent?
    context: Distinguishes between one-time downloads and persistent C2 communication.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: Are there signs of lateral movement from this potentially compromised host?
    context: Determines if the attacker is spreading internally after initial infection.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What other network activity occurred from the same process that made this request?
    context: Reveals additional malicious network behavior from the same application.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            host.ip: '{related.ip}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
          - Image
          - ProcessGuid
          - User
          - CommandLine
