name: ET SHELLCODE Rothenberg Shellcode
id: 22009247
description: |
  Detects specific byte patterns characteristic of Rothenberg shellcode in network traffic.
  May trigger on legitimate software with similar byte sequences or encrypted protocols with coincidental patterns.
type: detection
detection_id: 2009247
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete network payload containing the Rothenberg shellcode pattern?
    context: Reveals the full context and delivery method of the detected shellcode bytes.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
  - question: Does this host normally communicate with the destination containing the shellcode pattern?
    context: Determines if the connection represents normal business traffic or anomalous behavior.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What process established the connection that contained the shellcode bytes?
    context: Identifies the application or service involved in transmitting the Rothenberg pattern.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Were any executable files created on the host after the shellcode pattern was detected?
    context: Assesses whether the shellcode successfully delivered additional payloads.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .exe
          - .dll
          - .bat
          - .cmd
          - .ps1
          - .vbs
          - .js
          - .scr
          - .com
          - .pif
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Did the host establish additional external connections after the shellcode detection?
    context: Determines if the shellcode enabled further communication or data exfiltration.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What DNS queries occurred before the connection containing the shellcode pattern?
    context: Reveals how the host discovered or was directed to the shellcode source.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Were any new processes spawned after the shellcode pattern was observed?
    context: Identifies potential code execution resulting from the Rothenberg shellcode.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|contains:
          - cmd.exe
          - powershell.exe
          - rundll32.exe
          - regsvr32.exe
          - mshta.exe
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: Are other hosts receiving traffic with similar Rothenberg shellcode patterns?
    context: Determines if this is part of a coordinated attack campaign using the same shellcode.
    range: +/-6h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What registry modifications occurred after the shellcode pattern detection?
    context: Identifies persistence mechanisms or system changes following potential code execution.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip: '{related.ip}'
          TargetObject|contains:
          - Run
          - RunOnce
          - Services
          - Startup
          - Winlogon
          - Explorer
          - Shell
          - AppInit_DLLs
          - Image File Execution Options
          - Class
          - ContextMenuHandlers
          - ShellExecuteHooks
        condition: selection
      fields:
        - User
        - Image
        - ProcessGuid
        - TargetObject
        - Details
  - question: Did the host attempt to access any file-sharing or command-and-control domains?
    context: Reveals potential follow-up activities after successful shellcode execution.
    range: +4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name|contains:
            - paste
            - upload
            - share
            - temp
            - bit.ly
            - tinyurl
            - t.co
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
