name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: 'Detects suspicious HTTP requests with malformed Internet Explorer headers
  characteristic of Hiloti malware family.

  May occasionally trigger on legitimate but misconfigured applications.

  '
type: detection
detection_id: 2012612
detection_category: ''
detection_type: nids
contributors:
- SecurityOnionSolutions
created: 2024-01-15
questions:
- question: What specific PHP endpoint was accessed with these malformed headers?
  context: Identifies the target resource and potential web shell or malicious script.
  range: +/-15m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    community_id: '{network.community_id}'\n  condition: selection\n\
    fields:\n  - http.method\n  - http.useragent\n  - http.virtual_host\n  - http.uri\n\
    \  - http.status_code\n"
- question: Does this host normally access PHP applications with Internet Explorer?
  context: Establishes if this represents a change from typical user browsing patterns.
  range: -7d
  query: "aggregation: true\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    http.user_agent: '{http.useragent}'\n  condition: selection\n\
    fields:\n  - http.user_agent\n"
- question: What process or application generated this suspicious HTTP request?
  context: Determines if this was browser-initiated or from malware automation.
  range: +/-30m
  query: "aggregation: false\nlogsource:\n  category: network\ndetection:\n  selection:\n\
    \    community_id: '{network.community_id}'\n  filter:\n    Image|exists: true\n\
    \  condition: selection and filter\nfields:\n  - hostname\n  - User\n  - Image\n\
    \  - CommandLine\n  - ProcessGuid\n"
- question: Did this suspicious request receive a successful response from the server?
  context: Indicates whether the malicious communication was successful.
  range: +/-15m
  query: "aggregation: false\ndetection:\n  condition: selection\n  selection:\n \
    \   community_id: '{network.community_id}'\n    http.status_code:\n    - '200'\n\
    \    - '301'\n    - '302'\nfields:\n- http.status_code\n- http.response.body.length\n\
    - dst_ip\nlogsource:\n  category: network\n  service: http"
- question: Are there other hosts making similar requests with malformed MSIE headers?
  context: Identifies the scope of potential Hiloti malware infections.
  range: +/-6h
  query: "aggregation: true\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    dst_ip: '{network.public_ip}'\n  condition: selection\nfields:\n  - src_ip\n\
    \  - rule.name\n  - alert.category\n"
- question: What other suspicious network activity originated from this compromised
    host?
  context: Reveals additional malicious communications beyond the initial detection.
  range: +/-2h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{source.ip}'\n  filter:\n    dst_ip: '{network.public_ip}'\n\
    \  condition: selection and not filter\nfields:\n  - dst_ip\n  - dst_port\n  -\
    \ network.transport\n  - connection.state\n"
- question: Did this host download any executables before making these suspicious
    requests?
  context: Identifies the potential infection vector or malware dropper.
  range: -4h
  query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n  selection:\n\
    \    host.ip: '{network.private_ip}'\n    file.name|endswith:\n    - .exe\n  \
    \  - .scr\n    - .bat\n    - .com\n  condition: selection\nfields:\n  - file.path\n\
    \  - file.name\n  - Image\n  - ProcessGuid\n  - User\n"
- question: What DNS queries were made to resolve the suspicious PHP server?
  context: Shows the domain resolution chain and potential DNS tunneling.
  range: -30m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n\
    \  selection:\n    src_ip: '{source.ip}'\n  condition: selection\nfields:\n  -\
    \ dns.query.name\n  - dns.query.type_name\n  - dns.resolved_ip\n"
- question: Has this host established any unauthorized internal network connections?
  context: Assesses potential lateral movement from the compromised system.
  range: +2h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{network.private_ip}'\n    dst_ip: '{network.private_ip}'\n\
    \  filter:\n    src_ip: '{source.ip}'\n    dst_ip: '{destination.ip}'\n  condition:\
    \ selection and not filter\nfields:\n  - src_ip\n  - dst_ip\n  - dst_port\n  -\
    \ network.transport\n"
- question: Are there similar malformed header patterns targeting other web applications?
  context: Identifies broader scanning or exploitation attempts across the network.
  range: +/-24h
  query: "aggregation: true\ndetection:\n  condition: selection and not filter\n \
    \ filter:\n    dst_ip: '{destination.ip}'\n  selection:\n    http.uri|contains:\
    \ .php\n    http.user_agent|contains: MSIE\n    src_ip: '{source.ip}'\nfields:\n\
    - dst_ip\n- http.virtual_host\n- http.uri\n- http.user_agent\nlogsource:\n  category:\
    \ network\n  service: http"
- question: Are there related alerts indicating web application compromise or exploitation?
  context: Correlates with other security events showing successful web-based attacks.
  range: +/-6h
  query: "aggregation: false\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    related_ip: '{related.ip}'\n  filter:\n    document_id: '{soc_id}'\n  condition:\
    \ selection and not filter\nfields:\n  - rule.name\n  - alert.category\n  - src_ip\n\
    \  - dst_ip\n"
