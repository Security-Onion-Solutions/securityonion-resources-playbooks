name: ET HUNTING Hiloti Style GET to PHP with invalid terse MSIE headers
id: 22012612
description: |
  Detects HTTP requests with suspicious User-Agent patterns characteristic of Hiloti malware.
  This signature identifies outdated Internet Explorer user agents making requests to PHP scripts,
  which may indicate malware communication or compromised systems.
type: detection
detection_id: 2012612
detection_category: null
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request including URI and headers?
    context: Understanding the full request reveals the target PHP script and malicious
      payload structure.
    query: |-
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:

        - http.uri

        - http.method

        - http.user_agent

        - http.virtual_host

        - http.status_code
  - question: What process on the compromised host initiated this suspicious HTTP
      request?
    context: Identifies the malware executable or compromised application making the
      request.
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - User
        - ParentImage
        - Image
        - ProcessGuid
        - CommandLine
  - question: Is this User-Agent pattern normal for this host and user?
    context: Determines if this is legitimate IE usage or malicious activity masquerading
      as a browser.
    range: -7d
    query: "aggregation: true\nlogsource:\n  category: network\n  \ndetection:\n \
      \ selection:\n    dst_ip: '{destination.ip}'\n  condition: selection\nfields:\n\
      \  - dst_ip"
  - question: What other external connections occurred from this potentially compromised
      host?
    context: Identifies additional C2 channels or data exfiltration attempts beyond
      the detected request.
    range: +/-30m
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Are there other hosts in the network exhibiting similar User-Agent patterns?
    context: Determines campaign scope and identifies other potentially infected systems.
    range: +/-2h
    query: |-
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What DNS queries preceded this HTTP request?
    context: Reveals domain resolution that led to this connection and potential DNS
      tunneling.
    range: -15m
    query: |-
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: What file modifications occurred around the time of this request?
    context: Identifies payload downloads or configuration changes associated with
      malware activity.
    range: +/-15m
    query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n \
      \ selection:\n    host.ip: '{network.private_ip}'\n    file.name|endswith:\n\
      \    \n      - .exe\n    \n      - .dll\n    \n      - .tmp\n    \n      - .dat\n\
      \    \n      - .bin\n    \n  condition: selection\nfields:\n  - file.path\n\
      \  - file.name\n  - Image\n  - ProcessGuid\n  - User"
  - question: Are there signs of lateral movement from this compromised host?
    context: Determines if the malware is attempting to spread to other internal systems.
    range: +/-1h
    query: |-
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{network.private_ip}'
          dst_port|contains:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.transport
  - question: What persistence mechanisms were established after this communication?
    context: Identifies survival techniques used by the malware for complete remediation.
    range: +30m
    query: "aggregation: false\nlogsource:\n  category: registry_event\ndetection:\n\
      \  selection:\n    host.ip: '{network.private_ip}'\n    TargetObject|contains:\n\
      \    \n      - Run\n    \n      - RunOnce\n    \n      - Services\n    \n  \
      \    - Startup\n    \n  condition: selection\nfields:\n  - TargetObject\n  -\
      \ Details\n  - Image\n  - ProcessGuid"
  - question: How frequently is this host making similar suspicious requests?
    context: Determines if this is part of regular C2 beaconing or a one-time event.
    range: +/-24h
    query: |-
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What scheduled tasks were created following this network activity?
    context: Identifies task-based persistence mechanisms commonly used by malware.
    range: +1h
    query: |-
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
        condition: selection
      fields:
        - CommandLine
        - Image
        - ProcessGuid
        - User
        - ParentImage
