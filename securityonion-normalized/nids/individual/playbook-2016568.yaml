name: ET MALWARE W32/LetsGo.APT Sleep CnC Beacon
id: 22016568
description: |
  Detects W32/LetsGo.APT malware beacon with distinctive "sleep" user agent pattern.
  Legitimate applications rarely use "sleep" as a user agent string.
type: detection
detection_id: 2016568
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request containing the sleep beacon?
    context: Understanding the full request reveals the malware's C2 communication pattern.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: What process initiated this suspicious connection?
    context: Identifies the infected process making the beacon request.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Is this beacon pattern normal for this host?
    context: Determines if this is new suspicious activity or ongoing infection.
    range: -24h
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this infected host?
    context: Identifies additional C2 channels or data exfiltration attempts.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What DNS queries preceded this beacon activity?
    context: Reveals how the malware resolved the C2 server address.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What files were created or modified around this beacon time?
    context: Identifies potential payload drops or configuration changes.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .tmp
            - .dat
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of lateral movement from this host?
    context: Determines if the attacker is spreading to other systems.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What persistence mechanisms were established?
    context: Identifies how the malware maintains access after reboot.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Are other hosts showing similar LetsGo.APT beacon patterns?
    context: Determines the scope of the campaign across the network.
    range: +/-4h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other alerts are related to this C2 server?
    context: Provides broader context of malicious activity from this infrastructure.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: What bidirectional communication patterns exist with this C2?
    context: Analyzes data flow to identify potential exfiltration or command delivery.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{related.ip}'
            dst_ip: '{related.ip}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.protocol
          - event.duration
          - client.ip_bytes
          - server.ip_bytes
          - connection.state_description
