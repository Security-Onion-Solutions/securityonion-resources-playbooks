name: ET MALWARE W32/LetsGo.APT Sleep CnC Beacon
id: 22016568
description: 'Detects W32/LetsGo APT malware communicating with command and control
  servers using characteristic sleep beacon patterns.

  This is highly suspicious activity indicating APT compromise.

  '
type: detection
detection_id: 2016568
detection_category: ''
detection_type: nids
contributors:
- SecurityOnionSolutions
created: 2024-01-15
questions:
- question: What are the exact C2 beacon parameters and sleep intervals used by this
    malware?
  context: Reveals the specific command and control communication pattern and timing.
  range: +/-15m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    community_id: '{network.community_id}'\n  condition: selection\n\
    fields:\n  - http.method\n  - http.useragent\n  - http.virtual_host\n  - http.uri\n\
    \  - http.status_code\n"
- question: Is this host authorized to make automated HTTP requests to external sites?
  context: Determines if this represents a deviation from normal host behavior patterns.
  range: -7d
  query: "aggregation: true\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    dst_ip: '{destination.ip}'\n  condition: selection\nfields:\n\
    \  - dst_ip\n"
- question: What process is generating these malicious C2 communications?
  context: Identifies the infected executable responsible for the APT beacon traffic.
  range: +/-30m
  query: "aggregation: false\nlogsource:\n  category: network\ndetection:\n  selection:\n\
    \    community_id: '{network.community_id}'\n  filter:\n    Image|exists: true\n\
    \  condition: selection and filter\nfields:\n  - hostname\n  - User\n  - Image\n\
    \  - CommandLine\n  - ProcessGuid\n"
- question: How long has this APT malware been beaconing to the C2 server?
  context: Establishes the timeline and persistence of the compromise.
  range: -24h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{related.ip}'\n    dst_ip: '{related.ip}'\n\
    \  condition: selection\nfields:\n  - src_ip\n  - dst_ip\n  - dst_port\n  - network.protocol\n\
    \  - event.duration\n  - client.ip_bytes\n  - server.ip_bytes\n  - connection.state_description\n"
- question: What sensitive internal systems has this compromised host attempted to
    access?
  context: Assesses the scope of lateral movement and data access by the APT.
  range: +/-6h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{network.private_ip}'\n    dst_ip: '{network.private_ip}'\n\
    \  filter:\n    src_ip: '{source.ip}'\n    dst_ip: '{destination.ip}'\n  condition:\
    \ selection and not filter\nfields:\n  - src_ip\n  - dst_ip\n  - dst_port\n  -\
    \ network.transport\n"
- question: Are there other hosts infected with this same W32/LetsGo APT malware?
  context: Determines the breadth of the APT campaign within the organization.
  range: +/-24h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    dst_ip: '{network.public_ip}'\n  filter:\n    src_ip:\
    \ '{source.ip}'\n  condition: selection and not filter\nfields:\n  - src_ip\n\
    \  - dst_port\n  - network.transport\n  - connection.state\n"
- question: What files or executables were created around the time of initial infection?
  context: Identifies the APT malware components and potential dropper files.
  range: -2h
  query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n  selection:\n\
    \    host.ip: '{network.private_ip}'\n    file.name|endswith:\n    - .exe\n  \
    \  - .dll\n    - .tmp\n    - .bat\n  condition: selection\nfields:\n  - file.path\n\
    \  - file.name\n  - Image\n  - ProcessGuid\n  - User\n"
- question: Did this APT malware establish persistence mechanisms on the infected
    system?
  context: Reveals how the malware maintains persistence across system reboots.
  range: +/-2h
  query: "aggregation: false\nlogsource:\n  category: registry_event\ndetection:\n\
    \  selection:\n    host.ip: '{related.ip}'\n    TargetObject|contains:\n    -\
    \ Run\n    - RunOnce\n    - Services\n    - Startup\n  condition: selection\n\
    fields:\n  - User\n  - Image\n  - ProcessGuid\n  - TargetObject\n  - Details\n"
- question: What DNS queries preceded the initial C2 communication?
  context: Shows the domain resolution pattern used to locate the C2 infrastructure.
  range: -1h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n\
    \  selection:\n    src_ip: '{source.ip}'\n  condition: selection\nfields:\n  -\
    \ dns.query.name\n  - dns.query.type_name\n  - dns.resolved_ip\n"
- question: Has this C2 server been used in other APT campaigns against our organization?
  context: Correlates with historical threat intelligence to identify repeat targeting.
  range: -30d
  query: "aggregation: true\ndetection:\n  condition: selection\n  selection:\n  \
    \  dst_ip: '{destination.ip}'\n    http.uri|contains: .html\n    http.user_agent|startswith:\
    \ 'sleep '\nfields:\n- src_ip\n- http.uri\n- http.user_agent\nlogsource:\n  category:\
    \ network\n  service: http"
- question: Are there related security alerts indicating data exfiltration or credential
    theft?
  context: Assesses the impact and success of the APT attack beyond initial compromise.
  range: +/-12h
  query: "aggregation: false\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    related_ip: '{related.ip}'\n  filter:\n    document_id: '{soc_id}'\n  condition:\
    \ selection and not filter\nfields:\n  - rule.name\n  - alert.category\n  - src_ip\n\
    \  - dst_ip\n"
