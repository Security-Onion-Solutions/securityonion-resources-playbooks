name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: |
  Detects HTTP downloads of Windows PE executables or DLL files based on file headers.
  Can indicate legitimate software downloads or malicious payload delivery.
type: detection
detection_id: 2018959
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete URL and filename of the downloaded PE file?
    context: The download URL and filename provide crucial context for determining if this is legitimate software or malware.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - url.full
        - url.path
        - http.request.method
        - http.response.status_code
        - http.response.body.bytes

  - question: Is this download from a trusted software vendor or repository?
    context: Legitimate PE downloads typically originate from known software vendors, update servers, or trusted repositories.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - url.domain
        - http.response.status_code
        - src_ip

  - question: What process or user initiated this download?
    context: Understanding the source process helps distinguish between user-initiated downloads and automated malware activity.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          host.ip: '{source.ip}'
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: Was the downloaded file written to disk and where?
    context: File system activity reveals the storage location and whether the download completed successfully.
    range: +15m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{source.ip}'
          file.extension|contains:
            - "exe"
            - "dll"
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid

  - question: Has the downloaded PE file been executed?
    context: Execution of downloaded PE files may indicate successful malware installation or legitimate software usage.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: Are there multiple PE downloads from this source in a short timeframe?
    context: Bulk PE downloads may indicate malware staging, software deployment, or automated attack tools.
    range: -2h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
          rule.name|contains: "PE EXE or DLL"
        condition: selection
      fields:
        - dst_ip
        - url.domain
        - alert.severity_label

  - question: What DNS queries preceded this PE download?
    context: DNS resolution patterns can reveal if the download domain was recently resolved or part of malicious infrastructure.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: Are there signs of the PE file establishing persistence?
    context: Malicious PE files often create persistence mechanisms through registry modifications or service installation.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip: '{source.ip}'
          TargetObject|contains:
            - "Run"
            - "RunOnce"
            - "Services"
            - "Winlogon"
        condition: selection
      fields:
        - TargetObject
        - Details
        - Image
        - EventType

  - question: What network connections were made after the PE download?
    context: Post-download network activity may indicate C2 communication or additional payload retrieval.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - connection.history

  - question: Are there other hosts downloading PE files from the same source?
    context: Multiple hosts downloading from the same source may indicate a coordinated attack or legitimate software deployment.
    range: -4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - src_ip
        - url.path
        - http.response.status_code

  - question: What is the SSL certificate and hosting reputation of the download server?
    context: Certificate details and hosting information help assess the legitimacy of the download source.
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.established
        - hash.ja3
