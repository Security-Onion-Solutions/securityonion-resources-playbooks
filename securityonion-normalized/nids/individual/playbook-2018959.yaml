name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: |
  Detects Windows PE (Portable Executable) files being downloaded over HTTP.
  Could indicate malware download, legitimate software installation, or system updates.
type: detection
detection_id: 2018959
detection_category: 
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request and response for this PE file download?
    context: Understanding the full HTTP transaction reveals the source URL and file details.
    query:
      template: complete_request
      params:
        service: http
        
  - question: What process initiated the connection to download this PE file?
    context: Identifies if this was user-initiated, automated update, or malicious process.
    query:
      template: process_initiated_connection
      
  - question: Is this PE file download part of normal business operations for this host?
    context: Determines if this represents authorized software installation or potential threat.
    range: -7d
    query:
      template: historical_baseline
      params:
        activity_type: pe_downloads
        
  - question: What other external connections occurred from this host around the same time?
    context: Identifies additional download attempts or C2 communications.
    range: +/-15m
    query:
      template: other_external_connections
      
  - question: What DNS queries preceded this PE file download?
    context: Reveals the domain resolution that led to this download.
    range: -5m
    query:
      template: dns_before_activity
      
  - question: Did the downloaded PE file execute on the target system?
    context: Determines if the download resulted in actual malware execution.
    range: +30m
    query:
      template: search_by_image
      params:
        image_names: ["*.exe", "*.dll"]
        
  - question: Are there signs of persistence mechanisms created after this download?
    context: Identifies if the downloaded PE established persistence for survival.
    range: +1h
    query:
      template: persistence_check
      params:
        persistence_keys:
          - "Run"
          - "RunOnce"
          - "Services"
          - "Startup"
          
  - question: What file system activity occurred after this PE download?
    context: Shows if the downloaded file was moved, renamed, or extracted.
    range: +30m
    query:
      template: file_activity_by_extension
      params:
        extensions: [".exe", ".dll", ".tmp"]
        
  - question: Are other hosts in the network downloading PE files from the same source?
    context: Identifies potential campaign targeting multiple systems.
    range: +/-2h
    query:
      template: campaign_detection
      
  - question: What child processes were spawned if this PE file executed?
    context: Reveals the behavior and capabilities of the downloaded executable.
    range: +1h
    query:
      template: child_processes
      
  - question: Are there indicators of lateral movement from this host after the download?
    context: Determines if the downloaded PE enabled network propagation.
    range: +2h
    query:
      template: lateral_movement_check