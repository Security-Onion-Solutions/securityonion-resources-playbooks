name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: |
  Detects HTTP downloads of Windows PE executables or DLL files based on PE header signatures.
  May trigger on legitimate software downloads, updates, or administrative file transfers.
type: detection
detection_id: 2018959
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP request that downloaded this PE file?
    context: Understanding the full request reveals the source and method of download.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Is downloading PE files normal behavior for this host?
    context: Establishes baseline to differentiate legitimate vs suspicious downloads.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this host around the same time?
    context: Identifies potential additional malware downloads or C2 communications.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What DNS queries preceded this download?
    context: Reveals how the host discovered the download server.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What process initiated this HTTP connection?
    context: Identifies the application responsible for the download.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Have any new processes executed after this download?
    context: Determines if the downloaded PE file has been executed.
    range: +2h
    query:
      logsource:
        category: process_creation
      selection:
        host.ip: '{source.ip}'
      condition: selection
  - question: What executable files were created on disk during this timeframe?
    context: Identifies if the downloaded PE was saved to disk.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .scr
            - .com
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of persistence mechanisms being established?
    context: Determines if malware is attempting to maintain access.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Has this host made connections to other internal systems?
    context: Identifies potential lateral movement attempts.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: Are there other hosts downloading PE files from the same server?
    context: Identifies broader campaign or legitimate software distribution.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other alerts have been generated for this host?
    context: Provides broader security context for this activity.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
