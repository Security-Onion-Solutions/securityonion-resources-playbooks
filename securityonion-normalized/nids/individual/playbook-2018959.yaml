name: ET INFO PE EXE or DLL Windows file download HTTP
id: 22018959
description: 'Detects HTTP downloads of Windows PE executable files (.exe/.dll) from
  external sources.

  May be legitimate software downloads or malicious payload delivery.

  '
type: detection
detection_id: 2018959
detection_category: ''
detection_type: nids
contributors:
- SecurityOnionSolutions
created: 2024-01-15
questions:
- question: What specific executable file was downloaded and from which URL?
  context: Identifies the exact PE file and source location for threat assessment.
  range: +/-15m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    community_id: '{network.community_id}'\n  condition: selection\n\
    fields:\n  - http.method\n  - http.useragent\n  - http.virtual_host\n  - http.uri\n\
    \  - http.status_code\n"
- question: Is downloading executables from this domain part of normal business operations?
  context: Determines if this represents authorized software installation or potential
    malware.
  range: -7d
  query: "aggregation: true\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    dst_ip: '{destination.ip}'\n  condition: selection\nfields:\n\
    \  - dst_ip\n"
- question: What browser or application initiated this executable download?
  context: Reveals whether the download was user-initiated or automatic/scripted.
  range: +/-30m
  query: "aggregation: false\nlogsource:\n  category: network\ndetection:\n  selection:\n\
    \    community_id: '{network.community_id}'\n  filter:\n    Image|exists: true\n\
    \  condition: selection and filter\nfields:\n  - hostname\n  - User\n  - Image\n\
    \  - CommandLine\n  - ProcessGuid\n"
- question: Did the downloaded executable establish any network connections after
    download?
  context: Indicates if the downloaded file was executed and potentially malicious.
  range: +2h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{source.ip}'\n  filter:\n    dst_ip: '{network.public_ip}'\n\
    \  condition: selection and not filter\nfields:\n  - dst_ip\n  - dst_port\n  -\
    \ network.transport\n  - connection.state\n"
- question: What other files were created or modified during this download activity?
  context: Reveals additional components that may have been installed with the executable.
  range: +/-1h
  query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n  selection:\n\
    \    host.ip: '{network.private_ip}'\n    file.name|endswith:\n    - .exe\n  \
    \  - .dll\n    - .bat\n    - .msi\n    - .tmp\n  condition: selection\nfields:\n\
    \  - file.path\n  - file.name\n  - Image\n  - ProcessGuid\n  - User\n"
- question: Did this executable attempt to create persistence mechanisms on the system?
  context: Identifies if the downloaded file established startup or persistence entries.
  range: +2h
  query: "aggregation: false\nlogsource:\n  category: registry_event\ndetection:\n\
    \  selection:\n    host.ip: '{related.ip}'\n    TargetObject|contains:\n    -\
    \ Run\n    - RunOnce\n    - Services\n    - Startup\n  condition: selection\n\
    fields:\n  - User\n  - Image\n  - ProcessGuid\n  - TargetObject\n  - Details\n"
- question: Are other hosts in the environment downloading executables from this same
    source?
  context: Determines if this is part of a broader malware distribution campaign.
  range: +/-24h
  query: "aggregation: true\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    dst_ip: '{network.public_ip}'\n  condition: selection\nfields:\n  - src_ip\n\
    \  - rule.name\n  - alert.category\n"
- question: What DNS queries preceded this executable download?
  context: Reveals the domain resolution and potential redirect chains leading to
    the download.
  range: -30m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n\
    \  selection:\n    src_ip: '{source.ip}'\n  condition: selection\nfields:\n  -\
    \ dns.query.name\n  - dns.query.type_name\n  - dns.resolved_ip\n"
- question: Did the host attempt to download additional payloads from other sources?
  context: Identifies potential multi-stage malware infections or dropper behavior.
  range: +4h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    src_ip: '{source.ip}'\n    http.method: GET\n  filter:\n  \
    \  dst_ip: '{destination.ip}'\n  condition: selection and not filter\nfields:\n\
    \  - dst_ip\n  - http.virtual_host\n  - http.uri\n  - http.user_agent\n"
- question: What was the file size and hash of the downloaded executable?
  context: Provides forensic identifiers for threat intelligence correlation.
  range: +/-15m
  query: "aggregation: false\ndetection:\n  condition: selection\n  selection:\n \
    \   file.name|endswith:\n    - .exe\n    - .dll\n    host.ip: '{network.private_ip}'\n\
    fields:\n- file.path\n- file.name\n- file.size\n- file.hash.md5\n- file.hash.sha256\n\
    logsource:\n  category: file_event"
- question: Are there related alerts indicating suspicious behavior from this downloaded
    file?
  context: Correlates with other security events that may indicate successful malware
    execution.
  range: +6h
  query: "aggregation: false\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    related_ip: '{related.ip}'\n  filter:\n    document_id: '{soc_id}'\n  condition:\
    \ selection and not filter\nfields:\n  - rule.name\n  - alert.category\n  - src_ip\n\
    \  - dst_ip\n"
