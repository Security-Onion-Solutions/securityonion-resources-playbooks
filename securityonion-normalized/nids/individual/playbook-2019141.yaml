name: ET MALWARE Zbot POST Request to C2
id: 22019141
description: 'Detects Zbot (Zeus) banking trojan communicating with command and control
  servers via characteristic HTTP POST requests.

  This indicates active banking malware infection and credential theft.

  '
type: detection
detection_id: 2019141
detection_category: ''
detection_type: nids
contributors:
- SecurityOnionSolutions
created: 2024-01-15
questions:
- question: What sensitive data is being exfiltrated in this Zbot C2 communication?
  context: Reveals the specific credentials or banking information being stolen.
  range: +/-15m
  query: "aggregation: false\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    community_id: '{network.community_id}'\n  condition: selection\n\
    fields:\n  - http.method\n  - http.useragent\n  - http.virtual_host\n  - http.uri\n\
    \  - http.status_code\n"
- question: Is this host authorized to make automated POST requests to external PHP
    scripts?
  context: Determines if this represents unauthorized malware communication.
  range: -7d
  query: "aggregation: true\nlogsource:\n  category: network\n  service: http\ndetection:\n\
    \  selection:\n    dst_ip: '{destination.ip}'\n  condition: selection\nfields:\n\
    \  - dst_ip\n"
- question: What process is executing the Zbot malware and sending these C2 requests?
  context: Identifies the infected executable responsible for the banking trojan activity.
  range: +/-30m
  query: "aggregation: false\nlogsource:\n  category: network\ndetection:\n  selection:\n\
    \    community_id: '{network.community_id}'\n  filter:\n    Image|exists: true\n\
    \  condition: selection and filter\nfields:\n  - hostname\n  - User\n  - Image\n\
    \  - CommandLine\n  - ProcessGuid\n"
- question: How frequently is this Zbot malware communicating with its C2 server?
  context: Establishes the communication pattern and potential data exfiltration schedule.
  range: +/-4h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{related.ip}'\n    dst_ip: '{related.ip}'\n\
    \  condition: selection\nfields:\n  - src_ip\n  - dst_ip\n  - dst_port\n  - network.protocol\n\
    \  - event.duration\n  - client.ip_bytes\n  - server.ip_bytes\n  - connection.state_description\n"
- question: What banking or financial websites has this infected host accessed?
  context: Identifies potential targets of credential theft and financial fraud.
  range: +/-24h
  query: "aggregation: false\ndetection:\n  condition: selection\n  selection:\n \
    \   http.virtual_host|contains:\n    - bank\n    - credit\n    - paypal\n    -\
    \ financial\n    - online\n    - secure\n    src_ip: '{source.ip}'\nfields:\n\
    - http.virtual_host\n- http.uri\n- http.user_agent\nlogsource:\n  category: network\n\
    \  service: http"
- question: Did the Zbot malware create persistence mechanisms on the infected system?
  context: Shows how the banking trojan maintains persistence for ongoing credential
    theft.
  range: +/-2h
  query: "aggregation: false\nlogsource:\n  category: registry_event\ndetection:\n\
    \  selection:\n    host.ip: '{related.ip}'\n    TargetObject|contains:\n    -\
    \ Run\n    - RunOnce\n    - Services\n    - Startup\n  condition: selection\n\
    fields:\n  - User\n  - Image\n  - ProcessGuid\n  - TargetObject\n  - Details\n"
- question: Are other hosts in the network infected with this same Zbot campaign?
  context: Determines the scope of the banking malware infection across the organization.
  range: +/-24h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    dst_ip: '{network.public_ip}'\n  filter:\n    src_ip:\
    \ '{source.ip}'\n  condition: selection and not filter\nfields:\n  - src_ip\n\
    \  - dst_port\n  - network.transport\n  - connection.state\n"
- question: What files were modified or created during the Zbot infection?
  context: Identifies malware components and potential configuration files.
  range: +/-1h
  query: "aggregation: false\nlogsource:\n  category: file_event\ndetection:\n  selection:\n\
    \    host.ip: '{network.private_ip}'\n    file.name|endswith:\n    - .exe\n  \
    \  - .dll\n    - .tmp\n    - .dat\n    - .cfg\n  condition: selection\nfields:\n\
    \  - file.path\n  - file.name\n  - Image\n  - ProcessGuid\n  - User\n"
- question: How did this Zbot malware initially infect the system?
  context: Reveals the infection vector such as email attachment or drive-by download.
  range: -6h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n\
    \  selection:\n    src_ip: '{source.ip}'\n  condition: selection\nfields:\n  -\
    \ dns.query.name\n  - dns.query.type_name\n  - dns.resolved_ip\n"
- question: Has this infected host attempted to access other internal systems?
  context: Assesses potential lateral movement and broader network compromise.
  range: +2h
  query: "aggregation: false\nlogsource:\n  category: network\n  service: connection\n\
    detection:\n  selection:\n    src_ip: '{network.private_ip}'\n    dst_ip: '{network.private_ip}'\n\
    \  filter:\n    src_ip: '{source.ip}'\n    dst_ip: '{destination.ip}'\n  condition:\
    \ selection and not filter\nfields:\n  - src_ip\n  - dst_ip\n  - dst_port\n  -\
    \ network.transport\n"
- question: What other C2 servers has this Zbot-infected host communicated with?
  context: Identifies additional malware infrastructure and potential multi-stage
    infections.
  range: +/-12h
  query: "aggregation: false\ndetection:\n  condition: selection and not filter\n\
    \  filter:\n    dst_ip: '{destination.ip}'\n  selection:\n    http.method: POST\n\
    \    http.uri|contains: .php\n    src_ip: '{source.ip}'\nfields:\n- dst_ip\n-\
    \ http.virtual_host\n- http.uri\n- http.user_agent\nlogsource:\n  category: network\n\
    \  service: http"
- question: Are there related alerts indicating credential theft or fraudulent banking
    activity?
  context: Correlates with other security events showing successful financial fraud.
  range: +/-24h
  query: "aggregation: false\nlogsource:\n  category: alert\ndetection:\n  selection:\n\
    \    related_ip: '{related.ip}'\n  filter:\n    document_id: '{soc_id}'\n  condition:\
    \ selection and not filter\nfields:\n  - rule.name\n  - alert.category\n  - src_ip\n\
    \  - dst_ip\n"
