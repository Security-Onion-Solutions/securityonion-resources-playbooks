name: ET MALWARE Zbot POST Request to C2
id: 22019141
description: |
    Detects Zbot (Zeus) banking trojan POST requests to command and control servers.
    Identified by specific HTTP header patterns and URI structure typical of Zbot C2 communication.
    Legitimate traffic would not match this precise header sequence and user-agent combination.
type: detection
detection_id: 2019141
detection_category: ''
detection_type: nids
contributors:
    - SecurityOnionSolutions
created: 2024-01-15
questions:
    -   question: What was the complete HTTP POST request to the C2 server?
        context: Reveals the full Zbot C2 communication including payload and target
            PHP endpoint.
        query: |
            aggregation: false
            logsource:
              category: network
              service: http
            detection:
              selection:
                community_id: '{network.community_id}'
              condition: selection
            fields:
              - http.uri
              - http.method
              - http.user_agent
              - http.virtual_host
              - http.status_code
    -   question: What process on the infected host initiated this C2 communication?
        context: Identifies the specific Zbot malware executable or infected legitimate
            process.
        query: |
            aggregation: false
            logsource:
              category: network
              service: connection
            detection:
              selection:
                community_id: '{network.community_id}'
              filter:
                Image|exists: true
              condition: selection and filter
            fields:
              - User
              - ParentImage
              - Image
              - ProcessGuid
              - CommandLine
    -   question: What other external connections occurred from this infected host?
        context: Discovers additional C2 servers, update channels, or data exfiltration
            endpoints.
        range: +/-30m
        query: |
            aggregation: false
            logsource:
              category: network
              service: connection
            detection:
              selection:
                src_ip: '{source.ip}'
              filter:
                dst_ip: '{network.public_ip}'
              condition: selection and not filter
            fields:
              - dst_ip
              - dst_port
              - network.transport
              - connection.state
    -   question: Is this Zbot activity part of a broader campaign affecting multiple
            hosts?
        context: Determines enterprise-wide infection scope for coordinated response.
        range: +/-2h
        query: |
            aggregation: true
            logsource:
              category: alert
            detection:
              selection:
                dst_ip: '{network.public_ip}'
              condition: selection
            fields:
              - src_ip
              - rule.name
              - alert.category
    -   question: What DNS queries preceded this C2 connection?
        context: Reveals domain generation algorithm patterns or hardcoded C2 domains.
        range: -5m
        query: |
            aggregation: false
            logsource:
              category: network
              service: dns
            detection:
              selection:
                src_ip: '{source.ip}'
              condition: selection
            fields:
              - dns.query.name
              - dns.query.type_name
              - dns.resolved_ip
    -   question: What persistence mechanisms were established by this Zbot infection?
        context: Identifies registry modifications, scheduled tasks, or service installations
            for complete removal.
        range: -1h/+30m
        query: |
            aggregation: false
            logsource:
              category: registry_event
            detection:
              selection:
                host.ip: '{network.private_ip}'
                TargetObject|contains:
                  - Run
                  - RunOnce
                  - Services
                  - Winlogon
              condition: selection
            fields:
              - TargetObject
              - Details
              - Image
              - ProcessGuid
    -   question: What file system activity occurred around the time of C2 communication?
        context: Discovers downloaded updates, stolen credential files, or configuration
            changes.
        range: +/-15m
        query: |
            aggregation: false
            logsource:
              category: file_event
            detection:
              selection:
                host.ip: '{network.private_ip}'
                file.name|endswith:
                  - .exe
                  - .dll
                  - .dat
                  - .cfg
                  - .tmp
              condition: selection
            fields:
              - file.path
              - file.name
              - Image
              - ProcessGuid
              - User
    -   question: Are there signs of lateral movement from this infected host?
        context: Determines if Zbot is attempting to spread or access additional network
            resources.
        range: +/-1h
        query: |
            aggregation: false
            logsource:
              category: network
              service: connection
            detection:
              selection:
                src_ip: '{network.private_ip}'
                dst_port|contains:
                  - 445
                  - 139
                  - 3389
                  - 5985
                  - 5986
              condition: selection
            fields:
              - src_ip
              - dst_ip
              - dst_port
              - network.transport
    -   question: What other hosts are communicating with the same C2 infrastructure?
        context: Identifies additional infected systems requiring remediation.
        range: +/-24h
        query: |
            aggregation: false
            logsource:
              category: network
              service: connection
            detection:
              selection:
                dst_ip: '{network.public_ip}'
              filter:
                src_ip: '{source.ip}'
              condition: selection and not filter
            fields:
              - src_ip
              - dst_port
              - network.transport
              - connection.state
    -   question: What banking or financial websites were accessed from this infected
            host?
        context: Assesses potential credential theft and financial fraud risk.
        range: +/-2h
        query:
            aggregation: false
            logsource:
                category: network
                service: http
            detection:
                selection:
                    src_ip: '{source.ip}'
                banking_sites:
                    http.virtual_host|contains:
                        - bank
                        - credit
                        - financial
                        - paypal
                        - wellsfargo
                        - chase
                        - bankofamerica
                condition: selection and banking_sites
            fields:
                - src_ip
                - dst_ip
                - http.virtual_host
                - http.uri
                - http.method
    -   question: Has this host shown baseline deviation in network communication
            patterns?
        context: Establishes if this represents new malicious behavior versus ongoing
            infection.
        query: |
            aggregation: true
            logsource:
              category: network
            detection:
              selection:
                dst_ip: '{destination.ip}'
              condition: selection
            fields:
              - dst_ip
