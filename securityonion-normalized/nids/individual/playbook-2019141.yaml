name: ET MALWARE Zbot POST Request to C2
id: 22019141
description: |
  Detects Zbot (Zeus) malware making POST requests to command and control servers.
  Identifies specific HTTP header patterns characteristic of Zbot C2 communication.
type: detection
detection_id: 2019141
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the exact POST request payload sent to the C2 server?
    context: Analyzing the request body reveals what data Zbot is exfiltrating or commands being received.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.request.body.content
        - http.request.method
        - url.full
        - http.request.body.length

  - question: What specific PHP endpoint was contacted on the C2 server?
    context: The PHP script path indicates the specific C2 functionality being accessed.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - url.path
        - url.query
        - http.virtual_host

  - question: Is this system known to make legitimate POST requests to this destination?
    context: Establishing baseline behavior helps distinguish malware from legitimate application traffic.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          http.method: "POST"
        condition: selection
      fields:
        - url.path
        - http.user_agent
        - http.status_code

  - question: What process initiated this HTTP connection on the host?
    context: Identifying the source process helps determine if this is malware or legitimate software.
    range: +/-5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - ProcessGuid
        - User
        - CommandLine

  - question: What other C2 communication occurred around the same time?
    context: Zbot often makes multiple C2 requests in sequence for different functions.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          http.method: "POST"
          url.path|contains: ".php"
        condition: selection
      fields:
        - dst_ip
        - url.full
        - http.status_code
        - http.user_agent

  - question: Was the C2 server responsive to this request?
    context: HTTP response codes indicate if the C2 infrastructure is active and responding.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.status_code
        - http.response.body.length
        - http.response.body.content

  - question: What other malware-related network activity occurred on this host?
    context: Zbot infections often involve additional malware or reconnaissance activity.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
          rule.category|contains:
            - "MALWARE"
            - "TROJAN"
            - "C2"
        condition: selection
      fields:
        - rule.name
        - dst_ip
        - alert.severity_label

  - question: Are there signs of credential theft or data exfiltration?
    context: Zbot is primarily a banking trojan that steals credentials and financial data.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          http.method: "POST"
        filter:
          http.request.body.length|gte: 100
        condition: selection and filter
      fields:
        - dst_ip
        - url.full
        - http.request.body.length
        - http.user_agent

  - question: What DNS queries preceded this C2 communication?
    context: DNS lookups reveal how the malware resolved the C2 server address.
    range: -10m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name: '{destination.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name

  - question: Are other hosts in the network communicating with the same C2 server?
    context: Identifying the scope of Zbot infection across the enterprise.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
          http.method: "POST"
          url.path|contains: ".php"
        condition: selection
      fields:
        - src_ip
        - url.path
        - http.user_agent

  - question: What file system activity occurred around the time of C2 communication?
    context: Zbot may write stolen data to temporary files before exfiltration.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{source.ip}'
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid