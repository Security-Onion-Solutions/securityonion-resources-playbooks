name: ET SHELLCODE Linux/x86-64 - Polymorphic Flush IPTables Shellcode
id: 22024057
description: |
  Detects Linux x86-64 shellcode that flushes iptables rules, commonly used to disable firewall protections.
  May trigger on legitimate network traffic containing similar binary patterns or security research activities.
type: detection
detection_id: 2024057
detection_category: shellcode-detect
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete network payload containing the iptables flush shellcode pattern?
    context: Reveals the full context and delivery method of the shellcode pattern.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
  - question: Is this Linux host normally receiving external connections on this port?
    context: Determines if this represents unusual network access patterns for this system.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What process on the Linux host was listening on the destination port?
    context: Identifies the service that received the potential shellcode payload.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Did the Linux host establish new outbound connections after receiving this payload?
    context: Assesses whether the shellcode resulted in callback connections or additional network activity.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Were iptables rules or firewall configurations modified on this host?
    context: Determines if the shellcode successfully executed and modified firewall settings.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|contains:
            - iptables
            - ufw
            - firewalld
        flush_commands:
          CommandLine|contains:
            - "-F"
            - "flush"
            - "--flush"
        condition: selection and flush_commands
      fields:
        - Image
        - CommandLine
        - User
        - ParentImage
  - question: What executable files were created on the Linux host after this network activity?
    context: Identifies potential payloads or backdoors installed following shellcode execution.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .exe
          - .dll
          - .bat
          - .cmd
          - .ps1
          - .vbs
          - .js
          - .scr
          - .com
          - .pif
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Were any network configuration files modified after receiving this payload?
    context: Checks for persistence mechanisms or configuration changes beyond iptables.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.path|contains:
            - /etc/iptables/
            - /etc/sysconfig/iptables
            - /etc/ufw/
            - /etc/firewalld/
            - /etc/network/
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - User
  - question: Did shell processes execute with elevated privileges after this network connection?
    context: Identifies potential privilege escalation following successful shellcode execution.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|endswith:
            - /sh
            - /bash
            - /dash
        elevated:
          User: root
        condition: selection and elevated
      fields:
        - Image
        - CommandLine
        - User
        - ParentImage
        - ParentCommandLine
  - question: Are other Linux hosts receiving similar binary patterns in network traffic?
    context: Determines if this is part of a broader campaign targeting Linux systems with shellcode.
    range: +/-6h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What was the communication pattern between the external host and this Linux system?
    context: Analyzes bidirectional traffic to understand the full attack sequence.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
  - question: Did this Linux host attempt to connect to other internal systems after receiving the payload?
    context: Assesses potential lateral movement following successful shellcode execution.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{network.private_ip}'
          dst_port:
          - 445    # SMB
          - 139    # NetBIOS
          - 3389   # RDP
          - 5985   # WinRM HTTP
          - 5986   # WinRM HTTPS
          - 22     # SSH
          - 23     # Telnet
          - 135    # RPC
          - 5900   # VNC
        condition: selection
      fields:
        - src_ip
        - src_port
        - dst_ip
        - dst_port
        - network.transport
