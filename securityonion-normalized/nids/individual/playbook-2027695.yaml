name: ET INFO Observed Cloudflare DNS over HTTPS Domain (cloudflare-dns.com in TLS SNI)
id: 22027695
description: |
  Detects TLS connections to cloudflare-dns.com domains indicating DNS over HTTPS usage.
  May represent legitimate privacy-focused DNS resolution or attempts to bypass DNS monitoring.
type: detection
detection_id: 2027695
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection details to the cloudflare-dns.com domain?
    context: Reveals the specific Cloudflare DoH endpoint being accessed.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this host normally access Cloudflare DNS services?
    context: Determines if DoH usage represents a change from normal DNS resolution patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name|contains: cloudflare-dns
        condition: selection
      fields:
        - src_ip
        - ssl.server_name
  - question: What application initiated the connection to cloudflare-dns.com?
    context: Identifies the specific software performing DNS over HTTPS queries.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What other external connections occurred from this host?
    context: Identifies additional network activity that may be using DoH for DNS resolution.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Are other hosts also connecting to Cloudflare DNS over HTTPS services?
    context: Determines scope of DoH adoption across the network.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        filter:
          src_ip: '{source.ip}'
        condition: selection and not filter
      fields:
        - src_ip
        - dst_port
        - network.transport
        - connection.state
  - question: What is the pattern of DNS over HTTPS connections from this host?
    context: Analyzes frequency and timing of DoH usage for baseline establishment.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
  - question: Did any applications change their DNS configuration recently?
    context: Identifies configuration changes that may have enabled DoH usage.
    range: -24h
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          host.ip: '{related.ip}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.transport
        - Image
        - ProcessGuid
        - User
        - CommandLine
  - question: Are there related network policy or DNS filtering alerts?
    context: Reveals whether DoH usage is circumventing network security controls.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          related_ip: '{related.ip}'
        filter:
          document_id: '{soc_id}'
        condition: selection and not filter
      fields:
        - rule.name
        - alert.category
        - src_ip
        - dst_ip
  - question: What domains are being resolved through the DoH connection?
    context: Identifies what DNS queries are being sent through the encrypted channel.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name: "*"
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
