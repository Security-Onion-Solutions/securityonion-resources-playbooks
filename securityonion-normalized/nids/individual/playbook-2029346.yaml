name: ET MALWARE Possible Winnti DNS Lookup
id: 22029346
description: |
  Detects DNS queries to domains associated with Winnti APT group infrastructure.
  Legitimate applications rarely query .livehost.live domains, making false positives unlikely.
type: detection
detection_id: 2029346
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query to the Winnti-associated domain?
    context: Reveals the specific C2 domain and DNS resolution details used by Winnti malware.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is this host authorized to query suspicious domains during business operations?
    context: Determines if this represents a deviation from normal DNS query patterns.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            dns.query.name: '{dns.query_name}'
          condition: selection
        fields:
          - dns.query.name
  - question: What process triggered this suspicious DNS query to Winnti infrastructure?
    context: Identifies the specific malware executable responsible for the C2 communication attempt.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the host establish connections to the resolved Winnti C2 server?
    context: Determines if the DNS resolution led to successful C2 communication.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What files were created around the time of this Winnti DNS activity?
    context: Identifies potential Winnti malware samples or downloaded payloads.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .dat
            - .tmp
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: How did the Winnti malware establish persistence on this system?
    context: Reveals the persistence mechanisms typical of Winnti APT operations.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{related.ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Did the compromised host attempt to access other internal systems?
    context: Assesses potential lateral movement consistent with Winnti APT tactics.
    range: +24h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_ip: '{network.private_ip}'
          filter:
            src_ip: '{source.ip}'
            dst_ip: '{destination.ip}'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: Are other systems in our network communicating with Winnti infrastructure?
    context: Determines the scope of the APT compromise across the organization.
    range: +/-7d
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other suspicious domains has this host queried recently?
    context: Reveals additional Winnti C2 infrastructure or related malicious domains.
    range: -24h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: dns\ndetection:\n  selection:\n    src_ip: '{source.ip}'\n    dns.query.name|contains:\n      - \".tk\"\n      - \".ml\" \n      - \".cf\"\n      - \".ga\"\n      - \"livehost\"\n      - \"hopto\"\n      - \"zapto\"\n  condition: selection\nfields:\n  - dns.query.name\n  - dns.resolved_ip\n"
