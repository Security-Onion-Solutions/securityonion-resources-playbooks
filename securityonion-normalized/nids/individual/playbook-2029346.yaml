name: ET MALWARE Possible Winnti DNS Lookup
id: 22029346
description: |
  Detects DNS queries to livehost.live domain associated with Winnti APT group infrastructure.
  This domain has been observed in targeted attacks against universities and research institutions.
type: detection
detection_id: 2029346
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the exact DNS query that triggered this alert?
    context: Reveals the full domain queried and helps confirm if it matches known Winnti infrastructure.
    range: +/-5m
    query: |
      logsource:
        category: alert
      detection:
        selection:
          document_id: '{soc_id}'
        condition: selection
      fields:
        - rule.name
        - dns.query.name
        - src_ip
        - dst_ip
        - dns.query.type_name
  - question: Is this DNS activity normal for this host?
    context: Helps distinguish between legitimate and suspicious DNS queries by examining baseline behavior.
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other DNS queries occurred from this host around the same time?
    context: Identifies additional suspicious domains or infrastructure in the same campaign.
    range: +/-15m
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
        - dst_ip
  - question: What other external connections occurred from this potentially compromised host?
    context: Identifies additional C2 channels or data exfiltration attempts following DNS resolution.
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Which process initiated the DNS query for this suspicious domain?
    context: Identifies the potentially compromised application or malware responsible for the lookup.
    range: +/-10m
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - ProcessGuid
        - ParentImage
        - CommandLine
        - User
  - question: What network connections were made to IPs resolved from this domain?
    context: Tracks the complete attack chain from DNS resolution to actual communication.
    range: +/-30m
    query: |
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          network.transport: tcp
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - connection.history
  - question: Are there signs of data exfiltration or C2 communication patterns?
    context: Identifies suspicious connection patterns that indicate active compromise.
    range: +/-1h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What processes were spawned after this DNS lookup?
    context: Identifies potential malware execution or lateral movement tools deployed post-compromise.
    range: +30m
    query: |
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
        - User
  - question: Were any persistence mechanisms established after this DNS activity?
    context: Identifies survival techniques for complete remediation of Winnti compromise.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: Are there signs of lateral movement from this potentially compromised host?
    context: Determines if the attacker is spreading internally using Winnti tools and techniques.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What other hosts in the network have queried similar suspicious domains?
    context: Identifies the scope of potential Winnti campaign across the organization.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|contains:
            - ".livehost.live"
            - "winnti"
        condition: selection
      fields:
        - src_ip
        - dns.query.name
  - question: Are there other alerts involving this host that suggest broader compromise?
    context: Correlates with other detection rules to build complete attack timeline.
    range: +/-4h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
