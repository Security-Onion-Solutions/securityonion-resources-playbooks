name: ET SCAN UPnP SUBSCRIBE Inbound - Possible CallStranger Scan (CVE-2020-12695)
id: 22030272
description: |
  Detects inbound UPnP SUBSCRIBE requests that may exploit CallStranger vulnerability.
  May indicate legitimate UPnP device discovery or CallStranger exploitation attempts.
type: detection
detection_id: 2030272
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete malicious UPnP SUBSCRIBE request sent to our network?
    context: Reveals the specific CallStranger exploitation attempt and callback URL.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.method
          - http.useragent
          - http.virtual_host
          - http.uri
          - http.status_code
  - question: Do we normally receive UPnP traffic from external sources?
    context: Determines if this represents unusual network activity for our environment.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: http
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - src_ip
  - question: What UPnP-enabled device or service received this malicious request?
    context: Identifies the vulnerable internal system targeted by the CallStranger attack.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{destination.ip}'
          Image|contains:
            - upnp
            - ssdp
            - miniupnp
        condition: selection
      fields:
        - Image
        - CommandLine
        - ParentImage
  - question: Did our system make any callback connections to the attacker's server?
    context: Determines if the CallStranger vulnerability was successfully exploited.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{destination.ip}'
          dst_ip: '{source.ip}'
        condition: selection
      fields:
        - src_port
        - dst_port
        - network.transport
        - connection.state
  - question: What specific UPnP services are exposed on the targeted internal host?
    context: Assesses the attack surface and potential impact of the vulnerability.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
          dst_port:
            - 1900
            - 5000
            - 49152
        condition: selection
      fields:
        - src_ip
        - dst_port
        - network.transport
  - question: Are other internal hosts being targeted with similar CallStranger attacks?
    context: Determines the scope of the UPnP exploitation campaign.
    range: +/-6h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What registry modifications occurred on the targeted host after this scan?
    context: Identifies potential persistence mechanisms installed via CallStranger.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{related.ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Did the attacker attempt to access other network services on the compromised host?
    context: Reveals lateral movement attempts following successful CallStranger exploitation.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_ip: '{network.private_ip}'
          filter:
            src_ip: '{source.ip}'
            dst_ip: '{destination.ip}'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What files were created on the targeted system after the UPnP exploit?
    context: Identifies malicious payloads delivered through the CallStranger vulnerability.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there related network security alerts indicating successful compromise?
    context: Correlates the CallStranger scan with other post-exploitation activities.
    range: +/-12h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
