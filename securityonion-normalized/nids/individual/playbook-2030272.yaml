name: ET SCAN UPnP SUBSCRIBE Inbound - Possible CallStranger Scan (CVE-2020-12695)
id: 22030272
description: |
  Detects potential CallStranger vulnerability scanning via UPnP SUBSCRIBE requests with callback headers.
  May trigger on legitimate UPnP device discovery or subscription requests.
type: detection
detection_id: 2030272
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete HTTP SUBSCRIBE request including callback URL?
    context: Understanding the full request reveals scanning intent and callback destination.
    query: |
        aggregation: false
        logsource:
          category: network
          service: http
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - http.uri
          - http.method
          - http.useragent
          - http.virtual_host
          - http.status_code
  - question: What other HTTP requests came from this external scanner?
    context: Identifies broader scanning patterns and targeted services.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Is this scanning activity part of a larger reconnaissance campaign?
    context: Determines if multiple internal hosts are being scanned for UPnP vulnerabilities.
    range: +/-30m
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What UPnP services are running on the targeted internal host?
    context: Assesses actual exposure to CallStranger exploitation attempts.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            host.ip: '{related.ip}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
          - Image
          - ProcessGuid
          - User
          - CommandLine
  - question: Are there any successful callback connections to external URLs?
    context: Indicates if the UPnP device responded to malicious callback requests.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          filter:
            src_ip: '{source.ip}'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What is the frequency and pattern of these UPnP scanning attempts?
    context: Helps distinguish between automated scanning and targeted attacks.
    range: -2h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: Are there other hosts in the network receiving similar UPnP SUBSCRIBE requests?
    context: Identifies scope of scanning activity across the organization.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_ip: '{network.private_ip}'
          filter:
            src_ip: '{source.ip}'
            dst_ip: '{destination.ip}'
          condition: selection and not filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What DNS queries preceded this scanning activity?
    context: Reveals reconnaissance methods used to identify target networks.
    range: -15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are there any related alerts from this source IP?
    context: Provides context on attacker's broader activities and techniques.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
