name: ET SCAN UPnP SUBSCRIBE Inbound - Possible CallStranger Scan (CVE-2020-12695)
id: 22030272
description: |
  Detects inbound UPnP SUBSCRIBE requests that may be part of CallStranger vulnerability exploitation.
  Can trigger on legitimate UPnP device discovery but suspicious when from external sources.
type: detection
detection_id: 2030272
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete UPnP SUBSCRIBE request and callback URL?
    context: The callback header reveals the attacker's intended redirect target for CallStranger exploitation.
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.request.method
        - http.request.headers
        - url.full
        - http.request.body.content

  - question: Is this UPnP device expected to receive external SUBSCRIBE requests?
    context: Legitimate UPnP devices typically only receive requests from local network segments.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
          http.request.method: "SUBSCRIBE"
        condition: selection
      fields:
        - src_ip
        - http.request.headers
        - url.path

  - question: What UPnP services are running on the target system?
    context: Understanding available UPnP services helps assess exploitation potential and impact.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
          dst_port|contains:
            - 1900
            - 5000
            - 49152
        condition: selection
      fields:
        - src_ip
        - dst_port
        - connection.state

  - question: Are there signs of successful CallStranger callback exploitation?
    context: Successful exploitation results in the target device making HTTP requests to attacker-controlled servers.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
        - url.full
        - http.request.method
        - http.response.status_code

  - question: What other UPnP scanning activity originated from this source?
    context: CallStranger attacks often involve scanning multiple UPnP devices across the network.
    range: -2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          http.request.method: "SUBSCRIBE"
        condition: selection
      fields:
        - dst_ip
        - url.path
        - http.request.headers

  - question: Are there DNS queries for suspicious callback domains?
    context: Attackers may use DNS to identify callback infrastructure before launching CallStranger attacks.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: What process initiated the UPnP service on the target system?
    context: Understanding the UPnP service process helps determine if it's legitimate software or potential malware.
    range: -24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          host.ip: '{destination.ip}'
          dst_port: '{destination.port}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: Has the target device made outbound connections to external IPs?
    context: Successful CallStranger exploitation causes the device to connect to attacker infrastructure.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{destination.ip}'
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - connection.history

  - question: Are there other CVE-2020-12695 exploitation attempts in the environment?
    context: CallStranger campaigns often target multiple UPnP devices across the network infrastructure.
    range: -4h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          rule.name|contains: "CallStranger"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - alert.severity_label

  - question: What is the geographic and network reputation of the source IP?
    context: External scanning sources often originate from known malicious infrastructure or compromised systems.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state

  - question: Are there indicators of lateral movement from the target system?
    context: Compromised UPnP devices may be used as pivot points for internal network reconnaissance.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{destination.ip}'
          dst_ip: '{network.private_ip}'
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - connection.history
