name: ET INFO Observed Discord Domain (discord .com in TLS SNI)
id: 22035463
description: |
  Detects TLS connections to Discord domains through SNI field analysis.
  May represent legitimate Discord usage or potential data exfiltration via Discord channels.
type: detection
detection_id: 2035463
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection to the Discord domain?
    context: Reveals the specific Discord subdomain and connection details.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this user normally access Discord during business hours?
    context: Determines if Discord usage represents normal behavior for this user.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What application initiated the connection to Discord?
    context: Identifies the specific process making the Discord connection.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What other external connections occurred from this host during the same timeframe?
    context: Reveals broader communication patterns that may indicate data exfiltration.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Were any files uploaded or downloaded during the Discord session?
    context: Assesses whether Discord was used for file transfer activities.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .doc
          - .docx
          - .xls
          - .xlsx
          - .pdf
          - .rtf
          - .ppt
          - .pptx
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: What DNS queries preceded the Discord connection?
    context: Shows the DNS resolution process and any related domain lookups.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Did this host access any other communication platforms during this session?
    context: Identifies use of multiple communication channels which may indicate coordinated activity.
    range: +/-2h
    query: "aggregation: false\nlogsource:\n  category: network\n  service: ssl\ndetection:\n  selection:\n    src_ip: '{source.ip}'\n    ssl.server_name|contains:\n      - telegram\n      - whatsapp\n      - signal\n      - slack\n      - teams\n      - zoom\n      - skype\n  filter:\n    ssl.server_name|contains: discord\n  condition: selection and not filter\nfields:\n  - ssl.server_name\n  - dst_ip\n  - dst_port\n  \n"
  - question: Are other internal hosts also connecting to Discord domains?
    context: Determines if Discord usage is isolated or part of broader organizational activity.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What was the duration and data volume of the Discord connection?
    context: Assesses the extent of Discord usage and potential data transfer.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
