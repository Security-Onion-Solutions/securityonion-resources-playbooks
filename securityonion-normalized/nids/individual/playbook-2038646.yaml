name: ET INFO Observed Collaboration/File Sharing Platform Domain (www.notion.so in TLS SNI)
id: 22038646
description: |
  Detects TLS connections to www.notion.so collaboration platform.
  May represent legitimate business use of Notion for documentation and project management, or potential data exfiltration through collaboration platforms.
type: detection
detection_id: 2038646
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection attempt to www.notion.so?
    context: Reveals the full SSL handshake details and connection metadata.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this host normally access www.notion.so or other collaboration platforms?
    context: Determines if Notion access is part of established user behavior patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name|contains: notion
        condition: selection
      fields:
        - src_ip
        - ssl.server_name
  - question: What application initiated the connection to www.notion.so?
    context: Identifies the specific process or browser making the Notion connection.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Is accessing collaboration platforms like Notion part of normal business operations for this user?
    context: Assesses whether this represents authorized business use or potential policy violation.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name: '{ssl.server_name}'
        condition: selection
      fields:
        - src_ip
        - ssl.server_name
  - question: What other external connections occurred from this host around the same time?
    context: Identifies additional external communications that may indicate broader data movement.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Were any files accessed or modified before the Notion connection?
    context: Determines if sensitive documents were accessed prior to external communication.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .doc
          - .docx
          - .xls
          - .xlsx
          - .pdf
          - .rtf
          - .ppt
          - .pptx
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Did this host establish connections to other file-sharing or collaboration platforms?
    context: Reveals patterns of external platform usage that may indicate data exfiltration.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name|contains:
            - dropbox
            - drive.google
            - onedrive
            - sharepoint
            - slack
            - discord
            - telegram
            - teams
        condition: selection
      fields:
        - ssl.server_name
        - dst_ip
        - dst_port
  - question: What was the timing pattern of the Notion connections?
    context: Analyzes whether connections occur during business hours or match normal usage patterns.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
  - question: Are other users in the organization also accessing www.notion.so?
    context: Determines if this is part of broader organizational adoption or isolated usage.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        filter:
          src_ip: '{source.ip}'
        condition: selection and not filter
      fields:
        - src_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Were there any related alerts involving this host and external communications?
    context: Identifies other security events that may be related to external data movement.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          related_ip: '{related.ip}'
        filter:
          document_id: '{soc_id}'
        condition: selection and not filter
      fields:
        - rule.name
        - alert.category
        - src_ip
        - dst_ip
