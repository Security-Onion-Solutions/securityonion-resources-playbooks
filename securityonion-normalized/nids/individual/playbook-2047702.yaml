name: ET INFO External IP Lookup Domain (ipify .org) in DNS Lookup
id: 22047702
description: |
  Detects DNS queries to ipify.org for external IP address lookup.
  May indicate legitimate network diagnostics or malware performing reconnaissance.
type: detection
detection_id: 2047702
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query to ipify.org that triggered this alert?
    context: Reveals the specific external IP lookup request and response details.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is this host normally performing external IP lookups?
    context: Determines if this represents a change from normal network behavior patterns.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: dns
        detection:
          selection:
            dns.query.name: '{dns.query_name}'
          condition: selection
        fields:
          - dns.query.name
  - question: What process or application initiated this external IP lookup?
    context: Identifies whether this was triggered by legitimate software or malware.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other external connections occurred from this host around the same time?
    context: Reveals potential malware C2 communications or data exfiltration attempts.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Did this host query any other IP lookup or reconnaissance services?
    context: Indicates broader reconnaissance activity or malware information gathering.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name|contains:
            - whatismyip
            - checkip
            - myip
            - ipecho
            - ipchicken
            - whatsmyip
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
  - question: What internal systems are performing similar external IP lookups?
    context: Determines if this is part of coordinated malware activity across multiple hosts.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Did this reconnaissance activity lead to any suspicious file downloads?
    context: Assesses whether the IP lookup was followed by malware payload retrieval.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there any related alerts from this host indicating malware activity?
    context: Correlates the IP lookup with other suspicious behaviors.
    range: +/-12h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: What DNS queries occurred before this external IP lookup?
    context: Reveals the sequence of events that led to this reconnaissance activity.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
