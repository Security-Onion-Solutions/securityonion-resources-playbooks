name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org, a privacy-focused collaborative document platform.
  May indicate legitimate use of privacy tools or potential data exfiltration attempts.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query details including query type and resolution?
    context: Understanding the full DNS transaction reveals the specific service being accessed.
    range: +/-5m
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
        - dns.authoritative
  - question: Is this DNS query part of normal activity patterns for this user or system?
    context: Determines if this represents authorized use of privacy-focused collaboration tools.
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other external connections occurred from this host around the same time?
    context: Identifies if DNS query is part of broader external communication pattern.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What process initiated the DNS query for this privacy service?
    context: Identifies the application making the query to assess legitimacy.
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What HTTP traffic followed this DNS resolution to cryptpad.disroot.org?
    context: Reveals the actual data exchange and usage patterns with the service.
    range: +15m
    query: |
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          http.virtual_host|contains: 'cryptpad.disroot.org'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - http.method
        - http.uri
        - http.user_agent
        - http.status_code
        - http.request.body.length
  - question: Are there DNS queries to other pastebin or file-sharing services from this host?
    context: Identifies broader usage patterns of anonymous sharing platforms.
    range: +/-1h
    query: |
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name|contains:
            - 'pastebin'
            - 'paste'
            - 'cryptpad'
            - 'privatebin'
            - 'hastebin'
            - 'ghostbin'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dns.query.name
        - dns.query.type_name
  - question: What file activity occurred before this DNS query that might indicate data preparation?
    context: Identifies potential data staging before exfiltration attempts.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .txt
            - .doc
            - .docx
            - .pdf
            - .zip
            - .rar
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of data collection or lateral movement preceding this activity?
    context: Determines if DNS query is part of broader compromise or data theft campaign.
    range: -1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445
            - 139
            - 3389
            - 5985
            - 5986
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
  - question: What authentication or process activity occurred around this DNS query?
    context: Provides user and application context for the privacy service access.
    range: +/-10m
    query: |
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
          Image|contains:
            - 'browser'
            - 'chrome'
            - 'firefox'
            - 'edge'
            - 'curl'
            - 'wget'
        condition: selection
      fields:
        - host.ip
        - User
        - Image
        - CommandLine
        - ParentImage
  - question: Is this part of a broader campaign involving multiple hosts accessing privacy services?
    context: Identifies coordinated use of anonymous platforms across the organization.
    range: +/-4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          dns.query.name|contains:
            - 'cryptpad'
            - 'disroot'
            - 'pastebin'
            - 'privatebin'
        condition: selection
      fields:
        - src_ip
        - dns.query.name
  - question: What is the frequency and timing pattern of access to this privacy service?
    context: Distinguishes between one-time legitimate use and systematic data exfiltration.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
