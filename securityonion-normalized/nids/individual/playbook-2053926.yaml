name: ET INFO Pastebin-like Service Domain in DNS Lookup (cryptpad.disroot.org)
id: 22053926
description: |
  Detects DNS queries to cryptpad.disroot.org, a privacy-focused collaborative document editor.
  May indicate legitimate collaboration activities or potential data exfiltration attempts.
type: detection
detection_id: 2053926
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete DNS query that triggered this alert?
    context: Reveals the full DNS request details and resolution.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Is this DNS query normal for this user or system?
    context: Determines if this represents typical user behavior or anomalous activity.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What DNS queries occurred before this cryptpad lookup?
    context: Shows browsing patterns that led to the pastebin service access.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: What process initiated this DNS connection?
    context: Identifies the application making the cryptpad connection.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: What other external connections occurred from this host?
    context: Identifies additional external services accessed during this timeframe.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Were any files created or modified during this activity?
    context: Reveals potential data staging or payload downloads.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .txt
            - .doc
            - .docx
            - .pdf
            - .zip
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there signs of lateral movement after this activity?
    context: Determines if cryptpad access was followed by internal reconnaissance.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: Did other hosts in the network access similar pastebin services?
    context: Identifies potential coordinated data exfiltration activities.
    range: +/-4h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other alerts were generated for this host?
    context: Provides broader security context around the cryptpad access.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Were any persistence mechanisms established after this activity?
    context: Checks if cryptpad access was part of a broader compromise.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
