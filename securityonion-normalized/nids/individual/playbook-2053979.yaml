name: ET INFO Observed Pastebin-like Service Domain (cryptpad.disroot.org)
id: 1210001
description: |
  Detects TLS connections to cryptpad.disroot.org, a collaborative document editing platform.
  This may indicate legitimate document collaboration or potential data exfiltration.
type: detection
detection_id: 2053979
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete TLS connection pattern to cryptpad.disroot.org?
    context: Understanding the connection details helps assess if this is legitimate collaboration.
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          document_id: '{soc_id}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - tls.client.server_name

  - question: Is this user known to use collaborative document platforms?
    context: Regular users of document collaboration tools have different risk profiles.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          tls.client.server_name:
            - '*docs.google.com'
            - '*office.com'
            - '*dropbox.com'
            - '*disroot.org'
        condition: selection
      fields:
        - tls.client.server_name
        - dst_ip

  - question: What DNS queries preceded this connection?
    context: DNS lookups reveal if the domain was accessed directly or through redirects.
    range: +/-15m
    query: |
      aggregation: true
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.question.name: '*disroot.org'
        condition: selection
      fields:
        - dns.question.name
        - dns.answers.data

  - question: What process initiated this connection?
    context: Understanding the originating application helps assess legitimacy.
    range: +/-5m
    query: |
      aggregation: false
      logsource:
        category: network_connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
        filter:
          Image|exists: true
        condition: selection and not filter
      fields:
        - Image
        - User
        - ProcessGuid

  - question: What data volume was transferred in this session?
    context: Large data transfers may indicate document uploads or potential exfiltration.
    range: +/-2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - bytes_out
        - bytes_in
        - duration

  - question: Are there other connections to privacy-focused services?
    context: Multiple privacy tool usage may indicate security-conscious behavior or evasion.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          tls.client.server_name:
            - '*disroot.org'
            - '*protonmail.com'
            - '*tutanota.com'
            - '*riseup.net'
        condition: selection
      fields:
        - tls.client.server_name
        - dst_ip

  - question: Is this access during business hours?
    context: After-hours access to document platforms may require additional scrutiny.
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          document_id: '{soc_id}'
        condition: selection
      fields:
        - event.timestamp
        - src_ip
        - User

  - question: Are there similar connections from other internal systems?
    context: Multiple systems accessing the same service may indicate coordinated activity.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip|cidr: '{network.private_ip}'
          tls.client.server_name: 'cryptpad.disroot.org'
        condition: selection
      fields:
        - src_ip
        - User
        - hostname
