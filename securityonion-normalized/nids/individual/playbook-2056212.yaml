name: ET INFO Internet Printing Protocol (IPP) Get-Printer-Attributes Outbound Request
id: 22056212
description: |
  Detects outbound IPP (Internet Printing Protocol) Get-Printer-Attributes requests using CUPS client.
  May indicate legitimate remote printing activity or reconnaissance of network printing infrastructure.
type: detection
detection_id: 2056212
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete IPP request including the target printer details?
    context: Reveals the specific printer being queried and IPP operation details.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.method
        - http.useragent
        - http.virtual_host
        - http.uri
        - http.status_code
  - question: Does this host normally send IPP requests to external printers?
    context: Determines if outbound IPP communication represents typical printing behavior.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What process initiated the CUPS client connection to the external printer?
    context: Identifies the application or service attempting to use remote printing.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Was the IPP Get-Printer-Attributes request part of normal user printing activity?
    context: Assesses whether this represents legitimate user-initiated printing operations.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
          Image|contains:
            - "lp"
            - "lpr"
            - "cups"
            - "print"
        condition: selection
      fields:
        - Image
        - CommandLine
        - User
  - question: What other network printing protocols were used from this host?
    context: Identifies additional printing-related network activity that may indicate scanning.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port:
            - 631   # IPP
            - 515   # LPD
            - 9100  # Raw printing
            - 161   # SNMP (printer management)
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - network.protocol
  - question: Did the host access any printer web interfaces after the IPP request?
    context: Reveals attempts to access printer management interfaces following IPP queries.
    range: +30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          http.uri|contains:
            - "/admin"
            - "/config"
            - "/setup"
            - "/status"
            - "/web"
        condition: selection
      fields:
        - dst_ip
        - http.virtual_host
        - http.uri
        - http.status_code
  - question: Were any printer-related files or drivers downloaded following the IPP request?
    context: Identifies potential printer driver installations or configuration file downloads.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{source.ip}'
          file.name|contains:
            - ".ppd"
            - ".drv"
            - "printer"
            - "cups"
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
  - question: What DNS queries were made for printer-related hostnames before this request?
    context: Shows printer discovery activity that preceded the IPP communication.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name|contains:
            - "printer"
            - "print"
            - "cups"
            - "ipp"
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
  - question: Are other hosts on the network making similar IPP requests to external printers?
    context: Determines if this is part of broader printer discovery or network reconnaissance.
    range: +/-6h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: Did this host establish persistent connections to the printer after the initial IPP request?
    context: Assesses whether the IPP query led to ongoing printing operations or further interaction.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          dst_port: 631
        condition: selection
      fields:
        - connection.state
        - connection.duration
        - network.bytes
