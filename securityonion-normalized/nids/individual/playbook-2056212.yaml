name: ET INFO Internet Printing Protocol (IPP) Get-Printer-Attributes Outbound Request
id: 22056212
description: |
  Detects outbound Internet Printing Protocol (IPP) Get-Printer-Attributes requests using CUPS.
  May indicate legitimate network printing operations or reconnaissance of print services.
type: detection
detection_id: 2056212
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-12-19
questions:
  - question: What was the complete IPP POST request with the CUPS user-agent?
    context: Reveals the full IPP request details and printer operation being performed.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.method
        - http.useragent
        - http.virtual_host
        - http.uri
        - http.status_code
  - question: Does this host normally send IPP requests to external destinations?
    context: Determines if outbound IPP traffic represents normal printing behavior.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: http
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What process initiated the IPP connection with the CUPS user-agent?
    context: Identifies the application or service making the printer request.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: Is the destination IP a known network printer or print server?
    context: Assesses whether the target represents legitimate printing infrastructure.
    range: -30d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What other HTTP requests were made to the same destination during this timeframe?
    context: Reveals additional printer operations or potential reconnaissance activity.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
        filter:
          community_id: '{network.community_id}'
        condition: selection and not filter
      fields:
        - http.method
        - http.uri
        - http.user_agent
        - http.status_code
  - question: Did the host establish other connections to port 631 or printing-related services?
    context: Identifies additional IPP or printing protocol communications.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: [631, 515, 9100]
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - network.protocol
        - connection.state
  - question: What was the response from the destination after the IPP Get-Printer-Attributes request?
    context: Determines if the printer responded with attribute information or error codes.
    range: +5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - http.status_code
        - http.response.body.length
        - http.content_type
  - question: Were any printer-related processes or services started around this time?
    context: Identifies print spooler or CUPS service activity related to the request.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|contains:
          - cupsd
          - spoolsv.exe
          - lpr
          - lpstat
          - cups-browsed
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: Are other internal hosts making similar IPP requests to external destinations?
    context: Determines if this represents broader network printing activity or scanning.
    range: +/-6h
    query: |
      aggregation: false
      logsource:
        category: network
        service: http
      detection:
        selection:
          http.user_agent|contains: "CUPS/"
          http.content_type: "application/ipp"
          http.method: "POST"
        filter:
          src_ip: '{source.ip}'
        condition: selection and not filter
      fields:
        - src_ip
        - dst_ip
        - http.user_agent
  - question: What DNS queries were made for printer or IPP service discovery before this request?
    context: Reveals printer discovery attempts or service enumeration activity.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.query.name|contains:
            - "_ipp"
            - "_printer"
            - "print"
            - "cups"
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Did this activity trigger any related network or application alerts?
    context: Identifies additional security events related to the IPP communication.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          related_ip: '{related.ip}'
        filter:
          document_id: '{soc_id}'
        condition: selection and not filter
      fields:
        - rule.name
        - alert.category
        - src_ip
        - dst_ip
