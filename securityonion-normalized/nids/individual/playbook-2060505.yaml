name: ET INFO Observed Discord Service Domain (discord.com) in TLS SNI
id: 22060505
description: |
  Detects TLS connections to Discord service domain through SNI analysis.
  May represent legitimate chat application usage or potential data exfiltration channel.
type: detection
detection_id: 2060505
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2025-02-28
questions:
  - question: What was the complete TLS connection to the Discord domain?
    context: Reveals the specific TLS handshake details and connection parameters.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this host normally connect to Discord services?
    context: Determines if Discord access represents normal user behavior patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
  - question: What application initiated the Discord connection?
    context: Identifies the specific process establishing the encrypted channel to Discord.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What other chat or communication services did this host access?
    context: Reveals broader communication patterns that may indicate data exfiltration.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name|contains:
            - slack
            - teams
            - telegram
            - whatsapp
            - signal
            - skype
            - zoom
        condition: selection
      fields:
        - ssl.server_name
        - dst_ip
        - dst_port
  - question: What data transfer patterns occurred during the Discord connection?
    context: Assesses the volume and frequency of data exchange through the encrypted channel.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
  - question: Were any files accessed before the Discord connection was established?
    context: Identifies potential data staging before transmission through the encrypted channel.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .doc
          - .docx
          - .xls
          - .xlsx
          - .pdf
          - .rtf
          - .ppt
          - .pptx
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: What DNS queries preceded the Discord connection?
    context: Shows the domain resolution activity leading to the encrypted channel establishment.
    range: -15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip
  - question: Did this host establish connections to other external services after Discord access?
    context: Reveals additional external communication that may be part of coordinated activity.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Are other hosts in the network accessing Discord services?
    context: Determines if Discord usage is part of normal organizational communication patterns.
    range: +/-24h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        condition: selection
      fields:
        - src_ip
        - rule.name
        - alert.category
  - question: What is the timing pattern of Discord connections from this host?
    context: Analyzes connection frequency to identify potential automated or scripted access.
    range: -24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
        condition: selection
      fields:
        - dst_ip
