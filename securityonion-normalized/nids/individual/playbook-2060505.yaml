name: ET INFO Observed Discord Service Domain in TLS SNI
id: 22060505
description: |
  Detects TLS connections to discord.com through SNI field analysis.
  May represent legitimate Discord application usage or potential C2 communication over Discord platform.
type: detection
detection_id: 2060505
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2025-02-28
questions:
  - question: What was the complete TLS handshake details for the Discord connection?
    context: Reveals the full SSL/TLS connection parameters and certificate information.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - ssl.server_name
        - ssl.version
        - ssl.cipher
        - hash.ja3
  - question: Does this host normally access Discord services?
    context: Determines if Discord usage is part of established communication patterns.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: ssl
      detection:
        selection:
          src_ip: '{source.ip}'
          ssl.server_name|contains: discord
        condition: selection
      fields:
        - src_ip
        - ssl.server_name
  - question: What application initiated the connection to Discord?
    context: Identifies the specific process establishing Discord connectivity.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
      detection:
        selection:
          community_id: '{network.community_id}'
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - hostname
        - User
        - Image
        - CommandLine
        - ProcessGuid
  - question: What other external connections occurred from this host during the same timeframe?
    context: Assesses whether Discord access is part of broader network activity patterns.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
        filter:
          dst_ip: '{network.public_ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Was Discord accessed through a web browser or standalone application?
    context: Distinguishes between browser-based and application-based Discord access patterns.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{network.private_ip}'
          Image|contains:
          - chrome.exe
          - firefox.exe
          - edge.exe
          - discord.exe
          - discordptb.exe
        condition: selection
      fields:
        - User
        - Image
        - CommandLine
        - ParentImage
        - ProcessGuid
  - question: What executable files were created around the time of Discord access?
    context: Identifies potential payloads that might use Discord for C2 communication.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{network.private_ip}'
          file.name|endswith:
          - .exe
          - .dll
          - .bat
          - .cmd
          - .ps1
          - .vbs
          - .js
          - .scr
          - .com
          - .pif
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid
        - User
  - question: Did the host establish persistent or repeated connections to Discord infrastructure?
    context: Analyzes connection patterns that might indicate automated or scripted access.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{related.ip}'
          dst_ip: '{related.ip}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - network.protocol
        - event.duration
        - client.ip_bytes
        - server.ip_bytes
        - connection.state_description
  - question: Are other hosts in the network also connecting to Discord services?
    context: Determines the scope of Discord usage across the organization.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{network.public_ip}'
        filter:
          src_ip: '{source.ip}'
        condition: selection and not filter
      fields:
        - src_ip
        - dst_port
        - network.transport
        - connection.state
  - question: Were there any related alerts involving Discord or chat service indicators?
    context: Correlates with other security events that might involve Discord platform abuse.
    range: +/-24h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          related_ip: '{related.ip}'
        filter:
          document_id: '{soc_id}'
        condition: selection and not filter
      fields:
        - rule.name
        - alert.category
        - src_ip
        - dst_ip
