name: ET INFO Observed Discord Service Domain (discord.com) in TLS SNI
id: 22060505
description: |
  Detects TLS connections to Discord's service domain (discord.com) through SNI analysis.
  May represent legitimate user communication, gaming activity, or potential C2 channels using Discord infrastructure.
type: detection
detection_id: 2060505
detection_category: ''
detection_type: nids
contributors:
- SecurityOnionSolutions
created: 2025-02-28
questions:
- question: What was the complete TLS connection to discord.com?
  context: Understanding the full TLS handshake reveals connection patterns and certificate details.
  range: +/-15m
  query: |
    aggregation: false
    logsource:
      category: network
      service: ssl
    detection:
      selection:
        community_id: '{network.community_id}'
      condition: selection
    fields:
      - ssl.server_name
      - ssl.version
      - ssl.cipher
      - hash.ja3
- question: Does this host normally access discord.com?
  context: Determines if Discord usage is typical for this host's communication patterns.
  range: -7d
  query: |
    aggregation: true
    logsource:
      category: network
      service: ssl
    detection:
      selection:
        src_ip: '{source.ip}'
        ssl.server_name|contains: discord
      condition: selection
    fields:
      - src_ip
      - ssl.server_name
- question: What DNS queries preceded the Discord connection?
  context: Reveals domain resolution patterns and potential subdomain usage.
  range: -15m
  query: |
    aggregation: false
    logsource:
      category: network
      service: dns
    detection:
      selection:
        src_ip: '{source.ip}'
      condition: selection
    fields:
      - dns.query.name
      - dns.query.type_name
      - dns.resolved_ip
- question: What process initiated the connection to Discord?
  context: Identifies the application responsible for Discord communication.
  range: +/-15m
  query: |
    aggregation: false
    logsource:
      category: network
    detection:
      selection:
        community_id: '{network.community_id}'
      filter:
        Image|exists: true
      condition: selection and filter
    fields:
      - hostname
      - User
      - Image
      - CommandLine
      - ProcessGuid
- question: What other external connections occurred from this host?
  context: Identifies additional external communications that may indicate coordinated activity.
  range: +/-30m
  query: |
    aggregation: false
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{source.ip}'
      filter:
        dst_ip: '{network.public_ip}'
      condition: selection and not filter
    fields:
      - dst_ip
      - dst_port
      - network.transport
      - connection.state
- question: Are other hosts connecting to Discord infrastructure?
  context: Determines scope of Discord usage across the organization.
  range: +/-24h
  query: |
    aggregation: false
    logsource:
      category: network
      service: connection
    detection:
      selection:
        dst_ip: '{network.public_ip}'
      filter:
        src_ip: '{source.ip}'
      condition: selection and not filter
    fields:
      - src_ip
      - dst_port
      - network.transport
      - connection.state
- question: What files were created by the process connecting to Discord?
  context: Identifies files that may have been exchanged through Discord channels.
  range: +/-1h
  query: |
    aggregation: false
    logsource:
      category: file_event
    detection:
      selection:
        ProcessGuid: '{event_data.process.entity_id}'
      condition: selection
    fields:
      - file.path
      - file.name
      - Image
      - User
- question: Did any lateral movement occur from this host?
  context: Assesses whether Discord activity correlates with internal network movement.
  range: +/-2h
  query: |
    aggregation: false
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{network.private_ip}'
        dst_port:
        - 445    # SMB
        - 139    # NetBIOS
        - 3389   # RDP
        - 5985   # WinRM HTTP
        - 5986   # WinRM HTTPS
        - 22     # SSH
        - 23     # Telnet
        - 135    # RPC
        - 5900   # VNC
      condition: selection
    fields:
      - src_ip
      - src_port
      - dst_ip
      - dst_port
      - network.transport
- question: Are there related alerts involving Discord or chat services?
  context: Identifies coordinated activity across multiple communication platforms.
  range: +/-24h
  query: |
    aggregation: true
    logsource:
      category: alert
    detection:
      selection:
        dst_ip: '{network.public_ip}'
      condition: selection
    fields:
      - src_ip
      - rule.name
      - alert.category
- question: What is the timing pattern of Discord connections from this host?
  context: Analyzes communication frequency and timing for behavioral patterns.
  range: +/-6h
  query: |
    aggregation: false
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{related.ip}'
        dst_ip: '{related.ip}'
      condition: selection
    fields:
      - src_ip
      - dst_ip
      - dst_port
      - network.protocol
      - event.duration
      - client.ip_bytes
      - server.ip_bytes
      - connection.state_description
- question: Did this host access other Discord subdomains or related services?
  context: Reveals broader Discord ecosystem usage patterns.
  range: +/-6h
  query: |
    aggregation: false
    logsource:
      category: network
      service: ssl
    detection:
      selection:
        src_ip: '{source.ip}'
        ssl.server_name|contains:
          - discord
          - discordapp
          - discord-attachments
          - discordcdn
      condition: selection
    fields:
      - ssl.server_name
      - dst_ip
      - dst_port
      - ssl.established
