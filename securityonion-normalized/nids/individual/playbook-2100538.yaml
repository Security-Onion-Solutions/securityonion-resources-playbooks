name: GPL NETBIOS SMB IPC$ unicode share access
id: 22100538
description: |
  Detects SMB connections to the IPC$ administrative share using unicode encoding.
  This is commonly used for legitimate Windows administration but also for lateral movement and reconnaissance.
type: detection
detection_id: 2100538
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB request that triggered this alert?
    context: Understanding the full SMB packet reveals the specific IPC$ access attempt.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: smb
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: Is this SMB access normal for this external host?
    context: Determines if this is expected administrative activity or potential intrusion.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other SMB connections occurred from this external host?
    context: Identifies potential lateral movement or reconnaissance patterns.
    range: +/-1h
    query:
      logsource:
        category: network
        service: connection
      selection:
        src_ip: '{source.ip}'
        dst_port:
          - 139
          - 445
      condition: selection
  - question: Are there other hosts being targeted by this external IP?
    context: Reveals broader attack campaign targeting multiple systems.
    range: +/-2h
    query:
      logsource:
        category: network
        service: connection
      selection:
        src_ip: '{source.ip}'
        dst_port:
          - 139
          - 445
      condition: selection
  - question: What DNS queries preceded this SMB connection?
    context: Shows reconnaissance activity and target identification methods.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are there signs of successful authentication?
    context: Determines if the IPC$ access was successful and credentials were valid.
    range: +/-15m
    query:
      logsource:
        category: alert
      selection:
        src_ip: '{source.ip}'
        dst_ip: '{destination.ip}'
        rule.category:
          - authentication-success
          - protocol-command-decode
      condition: selection
  - question: What other external connections occurred from the targeted host?
    context: Identifies potential data exfiltration or C2 communications.
    range: +/-1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there related alerts involving this external IP?
    context: Correlates with other malicious activities from the same source.
    range: +/-24h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Has this triggered other lateral movement indicators?
    context: Identifies if the IPC$ access led to further internal compromise.
    range: +/-2h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: Are there signs of file sharing or data access?
    context: Determines if the SMB connection was used for data theft or malware deployment.
    range: +/-30m
    query:
      logsource:
        category: alert
      selection:
        src_ip: '{source.ip}'
        dst_ip: '{destination.ip}'
        rule.category:
          - policy-violation
          - trojan-activity
      condition: selection
  - question: Is this part of a broader SMB-based campaign?
    context: Identifies coordinated attacks targeting SMB services across the network.
    range: +/-4h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
