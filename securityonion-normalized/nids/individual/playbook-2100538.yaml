name: GPL NETBIOS SMB IPC$ unicode share access
id: 22100538
description: |
  Detects SMB connections to the IPC$ administrative share using unicode encoding.
  May indicate legitimate administrative activity or reconnaissance for privilege escalation.
type: detection
detection_id: 2100538
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What SMB authentication was used for this IPC$ connection?
    context: Authentication details reveal if this is legitimate administration or unauthorized access.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - connection.history
        - connection.state
        - network.bytes
        - connection.duration

  - question: Is this SMB access from an authorized administrative system?
    context: Legitimate system administration often requires IPC$ share access.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 139
        condition: selection
      fields:
        - dst_ip
        - network.bytes
        - connection.state

  - question: What process initiated this SMB connection on the source system?
    context: Process context helps distinguish between legitimate tools and malicious activity.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 139
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - ProcessGuid
        - connection.state

  - question: What other SMB shares were accessed during this session?
    context: Multiple share access may indicate lateral movement or data enumeration.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          dst_port|contains:
            - 139
            - 445
        condition: selection
      fields:
        - dst_port
        - network.bytes
        - connection.duration

  - question: Are there signs of SMB enumeration or reconnaissance tools?
    context: Systematic SMB scanning often precedes exploitation attempts.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{source.ip}'
          Image|contains:
            - "net.exe"
            - "smbclient"
            - "enum4linux"
            - "rpcclient"
        condition: selection
      fields:
        - Image
        - CommandLine
        - ProcessGuid

  - question: What DNS resolution occurred for the target system?
    context: Hostname resolution patterns may reveal reconnaissance or targeting methods.
    range: -15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
          dns.resolved_ip: '{destination.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: Are there authentication failures preceding this successful connection?
    context: Failed authentication attempts may indicate brute force or credential stuffing.
    range: -2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          dst_port|contains:
            - 139
            - 445
        condition: selection
      fields:
        - connection.state
        - network.bytes

  - question: What file system activity occurred on the target after SMB access?
    context: Post-connection file access reveals the purpose of IPC$ share usage.
    range: +1h
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{destination.ip}'
        condition: selection
      fields:
        - file.path
        - file.name
        - Image
        - ProcessGuid

  - question: Are there registry modifications suggesting privilege escalation attempts?
    context: IPC$ access may be used to deploy persistence mechanisms or escalate privileges.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: registry_event
      detection:
        selection:
          host.ip: '{destination.ip}'
          TargetObject|contains:
            - "\\Services"
            - "\\Run"
            - "\\Policies"
        condition: selection
      fields:
        - TargetObject
        - Details
        - EventType
        - Image

  - question: What other systems are being targeted for SMB access?
    context: Multiple SMB targets suggest lateral movement or network-wide reconnaissance.
    range: +/-4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port|contains:
            - 139
            - 445
        condition: selection
      fields:
        - dst_ip
        - network.bytes
        - connection.state

  - question: Are there related alerts indicating SMB-based attacks?
    context: IPC$ access often accompanies other SMB exploitation techniques.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          related_ip: '{related.ip}'
          rule.name|contains:
            - "SMB"
            - "NetBIOS"
        condition: selection
      fields:
        - rule.name
        - src_ip
        - dst_ip
        - alert.severity_label