name: GPL SNMP public access udp
id: 22101411
description: |
  Detects SNMP queries using the default "public" community string from external sources.
  May indicate reconnaissance activity or legitimate network monitoring from external systems.
type: detection
detection_id: 2101411
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SNMP request that triggered this alert?
    context: Understanding the full SNMP packet reveals the community string and OIDs queried.
    range: +/-15m
    query:
      logsource:
        category: alert
      selection:
        document_id: '{soc_id}'
      fields:
        - src_ip
        - dst_ip
        - network.transport
        - payload
        - payload_printable
        - rule.name
        - '@timestamp'
  - question: Is this normal SNMP activity for this destination host?
    context: Determines if this host regularly receives SNMP queries.
    range: -7d
    query: |
        aggregation: true
        logsource:
          category: network
          service: snmp
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other SNMP activity occurred from this external source?
    context: Identifies if this is part of broader SNMP reconnaissance.
    range: +/-1h
    query:
      logsource:
        category: network
        service: connection
      selection:
        src_ip: '{source.ip}'
        dst_port: 161
        network.transport: udp
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - '@timestamp'
  - question: What other external connections occurred to this SNMP host?
    context: Identifies additional reconnaissance or exploitation attempts.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there other hosts being targeted with SNMP queries?
    context: Determines scope of SNMP reconnaissance campaign.
    range: +/-2h
    query:
      logsource:
        category: network
        service: connection
      selection:
        src_ip: '{source.ip}'
        dst_port: 161
        network.transport: udp
      fields:
        - src_ip
        - dst_ip
        - dst_port
        - '@timestamp'
  - question: What DNS queries preceded this SNMP activity?
    context: Reveals if attacker performed DNS reconnaissance before SNMP queries.
    range: -30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: dns
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dns.query.name
          - dns.query.type_name
          - dns.resolved_ip
  - question: Are there signs of successful SNMP enumeration responses?
    context: Determines if the SNMP queries returned valuable information.
    range: +/-15m
    query:
      logsource:
        category: network
        service: connection
      selection:
        community_id: '{network.community_id}'
        connection.state: SF
      fields:
        - src_ip
        - dst_ip
        - connection.history
        - connection.state_description
        - '@timestamp'
  - question: What processes are running SNMP services on the target host?
    context: Identifies the SNMP daemon and potential vulnerabilities.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip: '{network.private_ip}'
            Image|contains:
          condition: selection
        fields:
          - User
          - Image
          - CommandLine
          - ParentImage
          - ProcessGuid
  - question: Are there other reconnaissance indicators from this source?
    context: Identifies broader reconnaissance activity patterns.
    range: +/-2h
    query:
      logsource:
        category: alert
      selection:
        src_ip: '{source.ip}'
        rule.category:
          - attempted-recon
          - network-scan
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - rule.category
        - '@timestamp'
  - question: What other systems are conducting similar SNMP reconnaissance?
    context: Identifies coordinated reconnaissance campaigns.
    range: +/-4h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: Are there related alerts targeting the same destination host?
    context: Determines if SNMP reconnaissance led to exploitation attempts.
    range: +2h
    query:
      logsource:
        category: alert
      selection:
        dst_ip: '{destination.ip}'
      filter:
        document_id: '{soc_id}'
      condition: selection and not filter
      fields:
        - src_ip
        - dst_ip
        - rule.name
        - rule.category
        - alert.severity_label
        - '@timestamp'
