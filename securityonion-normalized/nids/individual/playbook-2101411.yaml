name: GPL SNMP public access udp
id: 22101411
description: |
  Detects SNMP queries using the default "public" community string from external sources.
  May indicate reconnaissance attempts or legitimate network monitoring with weak authentication.
type: detection
detection_id: 2101411
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SNMP request containing the public community string?
    context: Understanding the full SNMP packet reveals the specific OIDs requested and attack intent.
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: What other SNMP or UDP connections occurred to this targeted host?
    context: Identifies pattern of network reconnaissance or additional probing attempts.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Is this part of routine network monitoring from known management systems?
    context: Distinguishes between legitimate monitoring and reconnaissance attempts.
    range: -1h
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What network services are exposed on the targeted SNMP host?
    context: Determines the attack surface available if SNMP access is compromised.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            host.ip: '{related.ip}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - src_ip
          - dst_ip
          - dst_port
          - network.transport
          - Image
          - ProcessGuid
          - User
          - CommandLine
  - question: Are there other hosts receiving SNMP queries from the same external source?
    context: Identifies scope of network reconnaissance across the environment.
    range: +/-1h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What information was potentially exposed through successful SNMP queries?
    context: Assesses the impact of unauthorized SNMP access on network security.
    range: +15m
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{source.ip}'
        dst_ip: '{destination.ip}'
        dst_port: 161
        network.transport: udp
      condition: selection
    fields:
      - src_ip
      - dst_ip
      - connection.state
      - connection.history
      - network.bytes
  - question: Does the timing align with known network maintenance windows?
    context: Helps determine if this represents authorized administrative activity.
    range: -2h/+30m
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: Are there signs of follow-up exploitation attempts after SNMP reconnaissance?
    context: Identifies if the SNMP information gathering led to targeted attacks.
    range: +1h
    logsource:
      category: network
      service: connection
    detection:
      selection:
        src_ip: '{source.ip}'
        dst_ip: '{destination.ip}'
      filter:
        dst_port: 161
      condition: selection and not filter
    fields:
      - dst_port
      - network.transport
      - connection.state
      - network.protocol
  - question: What is the reputation and geolocation of the source IP address?
    context: Provides context for threat assessment and potential blocking decisions.
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
  - question: Are there other alerts involving SNMP reconnaissance across the enterprise?
    context: Determines if this is part of broader network mapping campaign.
    range: +/-4h
    logsource:
      category: alert
    detection:
      selection:
        rule.category|contains:
          - snmp
          - recon
          - attempted-recon
      condition: selection
    fields:
      - src_ip
      - dst_ip
      - rule.name
      - alert.severity_label
