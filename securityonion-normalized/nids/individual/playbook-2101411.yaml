name: GPL SNMP public access udp
id: 22101411
description: |
  Detects SNMP queries using the default "public" community string from external sources.
  May indicate reconnaissance attempts or legitimate network monitoring depending on context.
type: detection
detection_id: 2101411
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What specific SNMP requests were made using the public community string?
    context: SNMP packet details reveal the type of information being queried.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - network.protocol
        - network.bytes
        - connection.state
        - connection.duration

  - question: Is this SNMP access from an authorized network management system?
    context: Legitimate monitoring tools may use public community strings for basic queries.
    range: -7d
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 161
        condition: selection
      fields:
        - dst_ip
        - network.bytes
        - connection.state

  - question: What other network reconnaissance activity originated from this source?
    context: SNMP scanning often accompanies broader network enumeration attempts.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port|contains:
            - 22
            - 23
            - 80
            - 443
            - 135
            - 139
            - 445
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
        - network.bytes

  - question: Are there DNS queries indicating reconnaissance tools or scanning?
    context: Attackers may resolve target hostnames before conducting SNMP enumeration.
    range: -30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.resolved_ip
        - dns.query.type_name

  - question: What information could be exposed through this SNMP access?
    context: Understanding target system capabilities helps assess reconnaissance impact.
    range: +15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
          src_port: 161
        condition: selection
      fields:
        - src_ip
        - network.bytes
        - connection.duration

  - question: Are there signs of SNMP brute force or community string enumeration?
    context: Multiple SNMP attempts may indicate systematic community string testing.
    range: +/-1h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 161
        condition: selection
      fields:
        - dst_ip
        - network.bytes
        - connection.state

  - question: What process on the target system handles SNMP requests?
    context: SNMP service configuration reveals potential information disclosure risks.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: process_creation
      detection:
        selection:
          host.ip: '{destination.ip}'
          Image|contains:
            - "snmp"
            - "net-snmp"
        condition: selection
      fields:
        - Image
        - CommandLine
        - ProcessGuid

  - question: Are there file access attempts on SNMP configuration files?
    context: Configuration file access may indicate attempts to modify SNMP settings.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: file_event
      detection:
        selection:
          host.ip: '{destination.ip}'
          file.path|contains:
            - "snmp"
            - "community"
        condition: selection
      fields:
        - file.path
        - file.name
        - Image

  - question: What other systems are being targeted for SNMP reconnaissance?
    context: Multiple targets suggest systematic network enumeration campaign.
    range: +/-4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 161
        condition: selection
      fields:
        - dst_ip
        - network.bytes

  - question: Are there related security alerts indicating broader scanning activity?
    context: SNMP reconnaissance often triggers multiple detection rules simultaneously.
    range: +/-2h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
          rule.category|contains:
            - "recon"
            - "scan"
        condition: selection
      fields:
        - rule.name
        - dst_ip
        - alert.severity_label

  - question: What geolocation and threat intelligence exists for this source IP?
    context: External source reputation helps determine if this is targeted reconnaissance.
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          document_id: '{soc_id}'
        condition: selection
      fields:
        - src_ip
        - network.public_ip
        - alert.category