name: GPL SNMP public access udp
id: 22101411
description: |
  Detects external SNMP queries using default "public" community string against internal systems.
  May indicate reconnaissance activity or legitimate network monitoring from external sources.
type: detection
detection_id: 2101411
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What SNMP information was requested using the public community string?
    context: Reveals the specific network device data being accessed by external sources.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
          dst_port: 161
          network.transport: "udp"
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - connection.history
  - question: Is external SNMP access to this device authorized and documented?
    context: Determines if this represents unauthorized reconnaissance versus legitimate monitoring.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - src_ip
  - question: What network device is exposing SNMP with default community strings?
    context: Identifies the specific infrastructure component with weak SNMP configuration.
    range: +/-30m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
          dst_port: 161
          network.transport: "udp"
        condition: selection
      fields:
        - src_ip
        - connection.state
        - connection.history
  - question: Are there other reconnaissance activities from this external source?
    context: Assesses whether SNMP scanning is part of broader network reconnaissance.
    range: +/-6h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What other SNMP-enabled devices has this source attempted to access?
    context: Reveals the scope of SNMP reconnaissance across network infrastructure.
    range: +/-12h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 161
          network.transport: "udp"
        filter:
          dst_ip: '{destination.ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - connection.state
  - question: Did this SNMP access lead to additional network scanning activity?
    context: Determines if successful SNMP enumeration enabled further reconnaissance.
    range: +4h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{network.private_ip}'
          dst_port:
            - 22
            - 23
            - 80
            - 443
            - 135
            - 139
            - 445
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state
  - question: Are there signs of SNMP configuration changes after this access?
    context: Identifies potential unauthorized modifications to network device settings.
    range: +24h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          dst_ip: '{destination.ip}'
          src_ip: '{source.ip}'
          dst_port: 161
          network.transport: "udp"
        condition: selection
      fields:
        - connection.history
        - connection.state
  - question: What geolocation and reputation data exists for this external scanner?
    context: Assesses the threat level and origin of the SNMP reconnaissance activity.
    range: +/-1h
    query: |
      aggregation: false
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - rule.name
        - rule.category
        - alert.severity_label
  - question: Are other devices in our network vulnerable to similar SNMP attacks?
    context: Identifies additional infrastructure with weak SNMP security configurations.
    range: +/-24h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
