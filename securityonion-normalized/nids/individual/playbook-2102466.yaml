name: GPL NETBIOS SMB-DS IPC$ unicode share access
id: 22102466
description: |
  Detects external access to SMB IPC$ administrative share via SMB protocol.
  May indicate legitimate remote administration or lateral movement attempts.
type: detection
detection_id: 2102466
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB IPC$ share access attempt from the external source?
    context: Reveals the specific administrative share access and authentication details.
    range: +/-15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - src_ip
        - dst_ip
        - src_port
        - dst_port
        - connection.history
  - question: Do we normally allow external SMB access to this internal host?
    context: Determines if this represents authorized remote administration or an attack.
    range: -30d
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            dst_port: '{destination.port}'
          condition: selection
        fields:
          - dst_port
  - question: What process on the target host is handling this SMB connection?
    context: Identifies the specific SMB service being targeted for administrative access.
    range: +/-30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Did the external attacker successfully authenticate to the IPC$ share?
    context: Determines if the administrative share access was successful or failed.
    range: +15m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          dst_port: 445
          connection.state: "established"
        condition: selection
      fields:
        - connection.history
        - connection.state_description
  - question: What other SMB administrative activities occurred from this external source?
    context: Reveals the scope of administrative access and potential lateral movement.
    range: +2h
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port:
            - 445
            - 139
        filter:
          dst_ip: '{destination.ip}'
        condition: selection and not filter
      fields:
        - dst_ip
        - connection.state
        - connection.history
  - question: What files were accessed or created on the target host after the SMB connection?
    context: Identifies potential malware deployment or data access via administrative shares.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Did the attacker create any scheduled tasks for persistence?
    context: Reveals common persistence techniques used after gaining administrative access.
    range: +2h
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip: '{network.private_ip}'
            Image|endswith:
            - schtasks.exe
            - taskeng.exe
            - taskhostw.exe
          condition: selection
        fields:
          - CommandLine
          - Image
          - ProcessGuid
          - User
          - ParentImage
  - question: What registry modifications occurred after the SMB administrative access?
    context: Identifies persistence mechanisms or system configuration changes.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{related.ip}'
            TargetObject|contains:
            - Run
            - RunOnce
            - Services
            - Startup
          condition: selection
        fields:
          - User
          - Image
          - ProcessGuid
          - TargetObject
          - Details
  - question: Are other internal hosts being targeted with similar SMB administrative access?
    context: Determines if this is part of a broader lateral movement campaign.
    range: +/-12h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What other external connections occurred from the targeted host after SMB access?
    context: Reveals potential C2 communications established after successful compromise.
    range: +4h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: Are there related security alerts indicating successful system compromise?
    context: Correlates the SMB access with other post-exploitation indicators.
    range: +/-6h
    query: |
        aggregation: false
        logsource:
          category: alert
        detection:
          selection:
            related_ip: '{related.ip}'
          filter:
            document_id: '{soc_id}'
          condition: selection and not filter
        fields:
          - rule.name
          - alert.category
          - src_ip
          - dst_ip
