name: GPL NETBIOS SMB-DS IPC$ unicode share access
id: 22102466
description: |
  Detects SMB connections attempting to access the IPC$ administrative share with unicode encoding.
  May indicate legitimate administrative activity or reconnaissance for privilege escalation.
type: detection
detection_id: 2102466
detection_category:
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB session establishment sequence?
    context: Understanding the full SMB negotiation reveals authentication methods and client capabilities.
    range: -5m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          community_id: '{network.community_id}'
        condition: selection
      fields:
        - connection.history
        - connection.state
        - network.bytes
        - network.packets

  - question: Is this SMB access from an authorized administrative source?
    context: IPC$ access is common for legitimate domain administration and monitoring tools.
    range: -24h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 445
        condition: selection
      fields:
        - dst_ip
        - connection.state
        - network.bytes

  - question: What authentication was used for this SMB connection?
    context: Authentication context helps distinguish between legitimate admin access and credential abuse.
    range: -10m
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_ip: '{destination.ip}'
          dst_port: 445
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - User
        - CommandLine
        - ParentImage

  - question: Are there signs of SMB enumeration or reconnaissance activity?
    context: IPC$ access often precedes attempts to enumerate shares, users, or system information.
    range: +30m
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 445
        condition: selection
      fields:
        - dst_ip
        - connection.state
        - connection.history

  - question: What other SMB shares were accessed from this source?
    context: Attackers often enumerate multiple shares after gaining IPC$ access for reconnaissance.
    range: +1h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
          rule.name|contains: "SMB"
        condition: selection
      fields:
        - dst_ip
        - rule.name
        - alert.category

  - question: Are there failed authentication attempts from this source?
    context: Failed SMB authentications may indicate credential stuffing or brute force attacks.
    range: -2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 445
          connection.state: "REJ"
        condition: selection
      fields:
        - dst_ip
        - connection.history

  - question: What processes on the target system handled this SMB connection?
    context: Understanding which services processed the connection helps identify potential exploitation targets.
    query: |
      aggregation: false
      logsource:
        category: network
        service: connection
      detection:
        selection:
          host.ip: '{destination.ip}'
          dst_port: 445
        filter:
          Image|exists: true
        condition: selection and filter
      fields:
        - Image
        - CommandLine
        - ParentImage
        - User

  - question: Has the source IP attempted lateral movement to other systems?
    context: SMB reconnaissance often precedes lateral movement attempts across the network.
    range: +2h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port|contains:
            - 445
            - 139
            - 3389
        condition: selection
      fields:
        - dst_ip
        - dst_port
        - connection.state

  - question: Are there DNS queries for internal hostnames from this source?
    context: Attackers often perform DNS reconnaissance to identify additional targets for lateral movement.
    range: -1h
    query: |
      aggregation: false
      logsource:
        category: network
        service: dns
      detection:
        selection:
          src_ip: '{source.ip}'
        condition: selection
      fields:
        - dns.query.name
        - dns.query.type_name
        - dns.resolved_ip

  - question: What is the timing pattern of SMB connections from this source?
    context: Automated tools often show distinctive timing patterns different from human administrative activity.
    range: -4h
    query: |
      aggregation: true
      logsource:
        category: network
        service: connection
      detection:
        selection:
          src_ip: '{source.ip}'
          dst_port: 445
        condition: selection
      fields:
        - dst_ip
        - connection.state
        - connection.duration

  - question: Are there other protocol-based reconnaissance attempts from this source?
    context: SMB scanning is often part of broader network reconnaissance using multiple protocols.
    range: -2h
    query: |
      aggregation: true
      logsource:
        category: alert
      detection:
        selection:
          src_ip: '{source.ip}'
          rule.category|contains:
            - "attempted-recon"
            - "protocol-command-decode"
        condition: selection
      fields:
        - dst_ip
        - rule.name
        - rule.category