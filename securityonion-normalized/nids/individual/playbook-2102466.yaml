name: GPL NETBIOS SMB-DS IPC$ unicode share access
id: 22102466
description: |
  Detects SMB connections to the IPC$ administrative share using unicode encoding.
  This can indicate legitimate Windows administration or potential lateral movement attempts.
type: detection
detection_id: 2102466
detection_category: ''
detection_type: nids
contributors:
  - SecurityOnionSolutions
created: 2024-01-15
questions:
  - question: What was the complete SMB session and authentication details for this IPC$ connection?
    context: Understanding the full SMB handshake reveals authentication method and user context.
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            community_id: '{network.community_id}'
          condition: selection
        fields:
          - src_ip
          - dst_ip
          - dst_port
  - question: Is this IPC$ access part of documented administrative activity for this user or system?
    context: Determines if this represents authorized network administration versus suspicious access.
    range: +/-1h
    query: |
        aggregation: true
        logsource:
          category: network
        detection:
          selection:
            dst_ip: '{destination.ip}'
          condition: selection
        fields:
          - dst_ip
  - question: What other SMB connections occurred from this external source around the same time?
    context: Identifies if this is isolated administrative access or part of broader SMB enumeration.
    range: +/-15m
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          filter:
            dst_ip: '{network.public_ip}'
          condition: selection and not filter
        fields:
          - dst_ip
          - dst_port
          - network.transport
          - connection.state
  - question: What processes on the target system initiated outbound connections after this SMB access?
    context: Determines if the IPC$ access led to command execution or lateral movement.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: network
        detection:
          selection:
            community_id: '{network.community_id}'
          filter:
            Image|exists: true
          condition: selection and filter
        fields:
          - hostname
          - User
          - Image
          - CommandLine
          - ProcessGuid
  - question: Are there signs of lateral movement to other internal systems from this target host?
    context: Identifies if this IPC$ access was used as a pivot point for internal spread.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{network.private_ip}'
            dst_port:
            - 445    # SMB
            - 139    # NetBIOS
            - 3389   # RDP
            - 5985   # WinRM HTTP
            - 5986   # WinRM HTTPS
            - 22     # SSH
            - 23     # Telnet
            - 135    # RPC
            - 5900   # VNC
          condition: selection
        fields:
          - src_ip
          - src_port
          - dst_ip
          - dst_port
          - network.transport
  - question: What administrative tools or processes were executed on the target system after this connection?
    context: Reveals if legitimate admin tools or suspicious commands were run via the IPC$ share.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: process_creation
        detection:
          selection:
            host.ip: '{network.private_ip}'
            Image|contains:
            - net.exe
            - sc.exe
            - wmic.exe
            - psexec.exe
            - cmd.exe
            - powershell.exe
          condition: selection
        fields:
          - User
          - Image
          - CommandLine
          - ParentImage
          - ProcessGuid
  - question: What persistence mechanisms were created on the target system following this SMB access?
    context: Identifies if the IPC$ connection was used to install services or scheduled tasks.
    range: +1h
    query: |
        aggregation: false
        logsource:
          category: registry_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            TargetObject|contains:
            - Services
            - Run
            - RunOnce
          condition: selection
        fields:
          - TargetObject
          - Details
          - Image
          - ProcessGuid
  - question: What files were accessed or modified on the target system after this IPC$ connection?
    context: Determines if sensitive files were accessed or malicious files were dropped.
    range: +30m
    query: |
        aggregation: false
        logsource:
          category: file_event
        detection:
          selection:
            host.ip: '{network.private_ip}'
            file.name|endswith:
            - .exe
            - .dll
            - .bat
            - .ps1
            - .vbs
          condition: selection
        fields:
          - file.path
          - file.name
          - Image
          - ProcessGuid
          - User
  - question: Are there other systems in the network showing similar IPC$ access patterns from external sources?
    context: Identifies if this represents a broader campaign targeting multiple systems.
    range: +/-2h
    query: |
        aggregation: true
        logsource:
          category: alert
        detection:
          selection:
            dst_ip: '{network.public_ip}'
          condition: selection
        fields:
          - src_ip
          - rule.name
          - alert.category
  - question: What was the frequency and timing pattern of SMB connections from this external source?
    context: Distinguishes between automated attacks and manual administrative access.
    range: +/-4h
    query: |
        aggregation: true
        logsource:
          category: network
          service: connection
        detection:
          selection:
            src_ip: '{source.ip}'
          condition: selection
        fields:
          - dst_ip
